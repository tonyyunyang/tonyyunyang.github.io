<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" fill="none">
  <rect width="240" height="200" fill="#F5EFE2"/>
  <g stroke="#0F1417" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Frame -->
    <rect x="8" y="8" width="224" height="184" stroke-width="0.6" stroke-dasharray="2 3" opacity="0.5"/>

    <!-- Axes -->
    <path d="M40 160 L200 160" stroke-width="1.2"/>
    <path d="M40 160 L40 40" stroke-width="1.2"/>
    <path d="M196 156 L200 160 L196 164"/>
    <path d="M36 44 L40 40 L44 44"/>
    <text x="120" y="178" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7" fill="#4A5159" stroke="none" letter-spacing="0.06em">WALL-CLOCK</text>
    <text x="22" y="100" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7" fill="#4A5159" stroke="none" letter-spacing="0.06em" transform="rotate(-90 22 100)">LOSS</text>

    <!-- Shared final-loss baseline -->
    <path d="M40 140 L200 140" stroke-width="0.5" stroke-dasharray="1.4 2.2" opacity="0.42"/>

    <!-- Early checkpoint (shared start) -->
    <circle cx="50" cy="60" r="3" fill="#F5EFE2"/>
    <text x="50" y="50" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="5.5" fill="#4A5159" stroke="none" letter-spacing="0.06em">CKPT</text>

    <!-- SGD path: long, dashed, slow descent -->
    <path d="M50 60 Q70 64 92 78 Q124 100 158 122 Q180 134 192 140" stroke-width="0.9" stroke-dasharray="2.6 3" opacity="0.55"/>
    <circle cx="192" cy="140" r="2.4" fill="#F5EFE2"/>
    <text x="170" y="118" font-family="JetBrains Mono, monospace" font-size="6" fill="#4A5159" stroke="none" letter-spacing="0.06em">SGD</text>

    <!-- Diffusion path: short, solid emerald, three horizons merging -->
    <path d="M50 60 Q54 92 64 116 Q76 134 92 140" stroke-width="1.5" stroke="#0E5347"/>

    <!-- Three forecast horizons (S / M / L) on the diffusion curve -->
    <circle cx="56" cy="84" r="2.4" fill="#F5EFE2" stroke="#0E5347" stroke-width="1"/>
    <text x="56" y="76" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="5.5" fill="#0E5347" stroke="none" letter-spacing="0.05em">S</text>

    <circle cx="68" cy="118" r="2.4" fill="#F5EFE2" stroke="#0E5347" stroke-width="1"/>
    <text x="60" y="120" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="5.5" fill="#0E5347" stroke="none" letter-spacing="0.05em">M</text>

    <circle cx="82" cy="134" r="2.4" fill="#F5EFE2" stroke="#0E5347" stroke-width="1"/>
    <text x="76" y="132" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="5.5" fill="#0E5347" stroke="none" letter-spacing="0.05em">L</text>

    <!-- Merged final state -->
    <circle cx="92" cy="140" r="4" fill="#0E5347" stroke="#0E5347"/>
    <text x="100" y="138" font-family="JetBrains Mono, monospace" font-size="5.5" fill="#0E5347" stroke="none" letter-spacing="0.06em">MERGED</text>

    <!-- 3.2× speedup span between two endpoints -->
    <path d="M96 150 L188 150" stroke-width="0.5" stroke-dasharray="1.4 1.8" opacity="0.55"/>
    <path d="M100 146 L96 150 L100 154" stroke-width="0.5" opacity="0.6"/>
    <path d="M184 146 L188 150 L184 154" stroke-width="0.5" opacity="0.6"/>

    <!-- 3.2× badge — widened so "3.2× FASTER" fits comfortably -->
    <rect x="116" y="46" width="84" height="22" rx="3" fill="#0E5347" stroke="#0E5347"/>
    <text x="158" y="61" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" fill="#FAF1D8" stroke="none" font-weight="700" letter-spacing="0.04em">3.2× FASTER</text>
  </g>
</svg>
