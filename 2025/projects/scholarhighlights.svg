<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" fill="none">
  <rect width="240" height="200" fill="#F5EFE2"/>
  <g stroke="#0F1417" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer frame -->
    <rect x="8" y="8" width="224" height="184" stroke-width="0.6" stroke-dasharray="2 3" opacity="0.5"/>

    <!-- Browser window -->
    <rect x="28" y="32" width="184" height="136" rx="4"/>
    <!-- Title bar -->
    <path d="M28 50 H212" stroke-width="1.2"/>
    <circle cx="38" cy="41" r="2.4" fill="#F5EFE2"/>
    <circle cx="46" cy="41" r="2.4" fill="#F5EFE2"/>
    <circle cx="54" cy="41" r="2.4" fill="#F5EFE2"/>
    <!-- URL bar -->
    <rect x="68" y="36" width="120" height="11" rx="5" stroke-width="0.7" fill="#FAF1D8"/>
    <path d="M76 41 H180" stroke-width="0.5" opacity="0.5"/>

    <!-- Search result entry: paper title (large, accent) -->
    <path d="M40 66 H192" stroke-width="2.2" stroke="#0E5347"/>
    <!-- Highlighted authors row -->
    <rect x="40" y="74" width="118" height="8" rx="2" fill="#FAF1D8" stroke="#0E5347" stroke-width="1"/>
    <path d="M44 78 H88 M94 78 H120 M126 78 H152" stroke="#0E5347" stroke-width="0.7" opacity="0.7"/>
    <!-- Venue tag -->
    <rect x="40" y="86" width="48" height="10" rx="2" fill="#0E5347"/>
    <text x="64" y="93.5" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="6" letter-spacing="0.08em" fill="#FAF1D8" stroke="none">MICCAI '25</text>
    <!-- Year -->
    <rect x="92" y="86" width="26" height="10" rx="2" stroke-width="0.7" fill="#F5EFE2"/>
    <text x="105" y="93.5" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="6" letter-spacing="0.08em" fill="#0F1417" stroke="none">2025</text>

    <!-- Snippet lines (subtle, body text) -->
    <path d="M40 106 H192 M40 112 H188 M40 118 H172" stroke-width="0.6" opacity="0.55"/>

    <!-- Second result -->
    <path d="M40 134 H156" stroke-width="1.6"/>
    <rect x="40" y="142" width="92" height="7" rx="2" fill="#FAF1D8" stroke="#0E5347" stroke-width="0.7"/>
    <rect x="40" y="153" width="40" height="9" rx="2" fill="#0E5347"/>
    <text x="60" y="159.5" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="6" letter-spacing="0.08em" fill="#FAF1D8" stroke="none">IMWUT'25</text>

    <!-- Highlighter pen, sitting at bottom-right corner -->
    <g transform="rotate(-18 196 156)">
      <rect x="186" y="146" width="32" height="10" rx="2" fill="#0E5347"/>
      <path d="M218 146 L226 151 L218 156 Z" fill="#FAF1D8" stroke-width="1"/>
      <path d="M226 151 L232 151" stroke-width="1.4" stroke="#0E5347"/>
      <path d="M186 151 L180 151" stroke-width="0.7" opacity="0.6" stroke-dasharray="1.6 2"/>
    </g>

    <!-- Caption -->
    <text x="120" y="184" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="6" fill="#4A5159" stroke="none" letter-spacing="0.08em">VENUE · AUTHOR-ME · RANKING</text>
  </g>
</svg>
