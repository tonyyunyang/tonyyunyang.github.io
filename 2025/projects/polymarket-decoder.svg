<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" fill="none">
  <rect width="240" height="200" fill="#F5EFE2"/>
  <g stroke="#0F1417" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Frame -->
    <rect x="8" y="8" width="224" height="184" stroke-width="0.6" stroke-dasharray="2 3" opacity="0.5"/>

    <!-- Axes -->
    <path d="M40 160 L200 160" stroke-width="1.2"/>
    <path d="M40 160 L40 40" stroke-width="1.2"/>
    <path d="M196 156 L200 160 L196 164"/>
    <path d="M36 44 L40 40 L44 44"/>

    <!-- Y-axis ticks (no labels; the axis arrow + 50% midline orient enough) -->
    <path d="M40 60 H36 M40 100 H36 M40 140 H36" stroke-width="0.5"/>

    <!-- 50% midline -->
    <path d="M40 100 H200" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.45"/>

    <!-- Event marker (vertical dashed line + label) -->
    <path d="M132 40 V160" stroke-width="0.7" stroke-dasharray="2 2" opacity="0.7"/>
    <text x="132" y="36" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="6.5" fill="#0E5347" stroke="none" letter-spacing="0.08em">EVENT</text>

    <!-- YES probability (accent, solid, sharp jump up at the event) -->
    <path d="M50 110 Q70 108 90 102 Q110 96 130 88 L132 56 Q150 56 170 58 Q190 58 195 56" stroke-width="1.6" stroke="#0E5347"/>

    <!-- NO probability (mirror, dashed grey; its style is its label) -->
    <path d="M50 90 Q70 92 90 98 Q110 104 130 112 L132 144 Q150 144 170 142 Q190 142 195 144" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.55"/>

    <!-- Inflection dot on YES line at the event peak (the moment crowd belief snapped) -->
    <circle cx="132" cy="56" r="2.5" fill="#0E5347" stroke="#0E5347"/>

    <!-- Single right-edge label for the accent line -->
    <text x="205" y="58" font-family="JetBrains Mono, monospace" font-size="6.5" fill="#0E5347" stroke="none" letter-spacing="0.08em">YES</text>

    <!-- Single caption -->
    <text x="120" y="183" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="6.5" fill="#4A5159" stroke="none" letter-spacing="0.08em">P(YES) · POLYMARKET</text>
  </g>
</svg>
