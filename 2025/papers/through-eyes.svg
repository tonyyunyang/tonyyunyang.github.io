<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <rect width="240" height="240" fill="#F5EFE2"/>
  <g stroke="#0F1417" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer dashed plate frame -->
    <rect x="14" y="14" width="212" height="212" stroke-width="0.6" stroke-dasharray="2 3" opacity="0.5"/>

    <!-- 7 emotion glyphs ringed around a central VR headset.
         Glyphs are large (r=15), the main visual focus. No text labels —
         the faces are universal, and the caption already says "7 emotions". -->

    <!-- top: JOY (smiling) — emerald accent ring (the success state) -->
    <g transform="translate(120, 56)">
      <circle cx="0" cy="0" r="16" stroke-width="1.4" fill="#FAF1D8"/>
      <circle cx="0" cy="0" r="12" stroke="#0E5347" stroke-width="0.5" stroke-dasharray="1.4 1.6" fill="none" opacity="0.6"/>
      <circle cx="-5" cy="-3" r="1.7" fill="#0F1417" stroke="none"/>
      <circle cx="5" cy="-3" r="1.7" fill="#0F1417" stroke="none"/>
      <path d="M-7 3 Q0 10 7 3" stroke-width="1.5" stroke="#0E5347"/>
    </g>

    <!-- top-right: SURPRISE (wide eyes, O mouth) -->
    <g transform="translate(174, 84)">
      <circle cx="0" cy="0" r="16" stroke-width="1.4" fill="#FAF1D8"/>
      <circle cx="-5" cy="-4" r="2.4" fill="#0F1417" stroke="none"/>
      <circle cx="5" cy="-4" r="2.4" fill="#0F1417" stroke="none"/>
      <path d="M-3 -10 Q-5 -8 -7 -7 M3 -10 Q5 -8 7 -7" stroke-width="0.8" opacity="0.7"/>
      <ellipse cx="0" cy="5" rx="2.6" ry="3.4" stroke="#0E5347" stroke-width="1.4" fill="#FAF1D8"/>
    </g>

    <!-- right: FEAR (raised brows, trembling mouth) -->
    <g transform="translate(190, 152)">
      <circle cx="0" cy="0" r="16" stroke-width="1.4" fill="#FAF1D8"/>
      <path d="M-8 -7 L-3 -9 M3 -9 L8 -7" stroke-width="1.1"/>
      <circle cx="-5" cy="-3" r="1.5" fill="#0F1417" stroke="none"/>
      <circle cx="5" cy="-3" r="1.5" fill="#0F1417" stroke="none"/>
      <path d="M-4 6 Q-2 3 0 6 Q2 3 4 6" stroke-width="1.1"/>
    </g>

    <!-- bottom-right: ANGER (V brows, gritted teeth) -->
    <g transform="translate(146, 184)">
      <circle cx="0" cy="0" r="16" stroke-width="1.4" fill="#FAF1D8"/>
      <circle cx="0" cy="0" r="12" stroke="#0E5347" stroke-width="0.5" stroke-dasharray="1.4 1.6" fill="none" opacity="0.6"/>
      <path d="M-8 -7 L-3 -4 M3 -4 L8 -7" stroke-width="1.5" stroke="#0E5347"/>
      <circle cx="-4" cy="-1" r="1.5" fill="#0F1417" stroke="none"/>
      <circle cx="4" cy="-1" r="1.5" fill="#0F1417" stroke="none"/>
      <path d="M-5 7 L5 7" stroke-width="1.3"/>
      <path d="M-3 5 L-3 7 M-1 5 L-1 7 M1 5 L1 7 M3 5 L3 7" stroke-width="0.6"/>
    </g>

    <!-- bottom-left: DISGUST (curl of upper lip) -->
    <g transform="translate(94, 184)">
      <circle cx="0" cy="0" r="16" stroke-width="1.4" fill="#FAF1D8"/>
      <circle cx="-5" cy="-3" r="1.5" fill="#0F1417" stroke="none"/>
      <circle cx="5" cy="-3" r="1.5" fill="#0F1417" stroke="none"/>
      <path d="M0 -8 Q-1 -10 0 -12 Q1 -10 0 -8" stroke-width="0.7" opacity="0.7"/>
      <path d="M-7 5 L-3 6 L-2 3 L0 6 L0 3 L2 6 L3 3 L7 5" stroke-width="1.3"/>
    </g>

    <!-- left: SADNESS (drooping mouth) -->
    <g transform="translate(50, 152)">
      <circle cx="0" cy="0" r="16" stroke-width="1.4" fill="#FAF1D8"/>
      <circle cx="-5" cy="-3" r="1.6" fill="#0F1417" stroke="none"/>
      <circle cx="5" cy="-3" r="1.6" fill="#0F1417" stroke="none"/>
      <path d="M-3 -8 L-7 -6 M3 -8 L7 -6" stroke-width="0.7" opacity="0.7"/>
      <path d="M-7 7 Q0 0 7 7" stroke-width="1.4"/>
    </g>

    <!-- top-left: NEUTRAL (flat mouth) -->
    <g transform="translate(66, 84)">
      <circle cx="0" cy="0" r="16" stroke-width="1.4" fill="#FAF1D8"/>
      <circle cx="-5" cy="-2" r="1.5" fill="#0F1417" stroke="none"/>
      <circle cx="5" cy="-2" r="1.5" fill="#0F1417" stroke="none"/>
      <path d="M-7 6 L7 6" stroke-width="1.3"/>
    </g>

    <!-- Central VR headset (smaller, clearly the data source for the emotions around it) -->
    <g>
      <path d="M92 116 Q92 107 102 107 L138 107 Q148 107 148 116 L148 142 Q148 152 138 152 L102 152 Q92 152 92 142 Z" stroke-width="1.4" fill="#FAF1D8"/>
      <!-- Strap arc -->
      <path d="M102 107 Q120 94 138 107" stroke-width="0.7" stroke-dasharray="2.4 2.4" opacity="0.6"/>
      <!-- Side strap nubs -->
      <rect x="86" y="121" width="6" height="14" rx="1.2" fill="#0F1417" stroke-width="0.7" opacity="0.85"/>
      <rect x="148" y="121" width="6" height="14" rx="1.2" fill="#0F1417" stroke-width="0.7" opacity="0.85"/>
      <!-- Two lens openings -->
      <ellipse cx="108" cy="129" rx="9" ry="9" stroke-width="1.2" fill="#FAF1D8"/>
      <ellipse cx="132" cy="129" rx="9" ry="9" stroke-width="1.2" fill="#FAF1D8"/>
      <!-- Iris + pupil -->
      <circle cx="108" cy="129" r="4" fill="#FAF1D8" stroke-width="0.8"/>
      <circle cx="108" cy="129" r="2" fill="#0F1417" stroke="none"/>
      <circle cx="132" cy="129" r="4" fill="#FAF1D8" stroke-width="0.8"/>
      <circle cx="132" cy="129" r="2" fill="#0F1417" stroke="none"/>
      <!-- Center bridge -->
      <rect x="118" y="125" width="4" height="8" rx="0.7" fill="#EDE6D5" stroke-width="0.5"/>
      <!-- Gaze trace inside left lens -->
      <path d="M101 124 L114 127 L102 132 L114 135" stroke-width="0.6" stroke-dasharray="1.4 1.4" stroke="#0E5347" opacity="0.85"/>
      <!-- Gaze trace inside right lens -->
      <path d="M125 124 L138 127 L126 132 L138 135" stroke-width="0.6" stroke-dasharray="1.4 1.4" stroke="#0E5347" opacity="0.85"/>
    </g>

    <!-- Gaze rays from headset OUT to each emotion (the classification mapping) -->
    <g stroke-dasharray="1.2 2" opacity="0.42">
      <path d="M120 107 L120 72" stroke-width="0.6"/>
      <path d="M144 110 L168 96" stroke-width="0.6"/>
      <path d="M148 134 L176 148" stroke-width="0.6"/>
      <path d="M138 152 L142 168" stroke-width="0.6"/>
      <path d="M102 152 L98 168" stroke-width="0.6"/>
      <path d="M92 134 L66 148" stroke-width="0.6"/>
      <path d="M96 110 L72 96" stroke-width="0.6"/>
    </g>

    <!-- 240 Hz badge (top-left, well inset to avoid corner clip) -->
    <rect x="22" y="22" width="44" height="14" rx="2" fill="#0E5347" stroke="#0E5347"/>
    <text x="44" y="32" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" letter-spacing="0.06em" fill="#FAF1D8" stroke="none">240 Hz</text>

    <!-- Caption -->
    <text x="120" y="222" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="6.5" fill="#4A5159" stroke="none" letter-spacing="0.16em">VR GAZE × 7 EMOTIONS · IMWUT '25</text>
  </g>
</svg>
