<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <rect width="240" height="240" fill="#F5EFE2"/>
  <g stroke="#0F1417" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- plate frame -->
    <rect x="14" y="14" width="212" height="212" stroke-width="0.6" stroke-dasharray="2 3" opacity="0.5"/>

    <!-- ============ TWIN HEADERS (outlined tags) ============ -->
    <rect x="24" y="22" width="84" height="20" rx="4" fill="#F5EFE2" stroke-width="1.2"/>
    <text x="66" y="35.5" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" letter-spacing="0.08em" fill="#0F1417" stroke="none" font-weight="600">STATIC</text>
    <rect x="132" y="22" width="84" height="20" rx="4" fill="#F5EFE2" stroke="#0E5347" stroke-width="1.4"/>
    <text x="174" y="35.5" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" letter-spacing="0.08em" fill="#0E5347" stroke="none" font-weight="600">DYNAMIC</text>

    <!-- ============ TWO TRACK PANELS ============ -->
    <rect x="24" y="50" width="84" height="84" rx="4" stroke-width="1"/>
    <rect x="132" y="50" width="84" height="84" rx="4" stroke-width="1"/>

    <!-- dev/val loop in the seam (clockwise) -->
    <path d="M108 70 Q120 61 132 70" stroke-width="1" opacity="0.85"/>
    <path d="M127 66 L132 70 L127 74" stroke-width="0.9" opacity="0.85"/>
    <path d="M132 114 Q120 123 108 114" stroke-width="1" opacity="0.85"/>
    <path d="M113 110 L108 114 L113 118" stroke-width="0.9" opacity="0.85"/>

    <!-- LEFT: offline label bank (rows of verified prefixes, each with a tier tag) -->
    <text x="66" y="62" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="6" letter-spacing="0.1em" fill="#4A5159" stroke="none">LABEL BANK</text>
    <rect x="32" y="71" width="50" height="8" rx="2" stroke-width="0.6" fill="#EDE6D5"/>
    <rect x="88" y="71" width="12" height="8" rx="1.5" stroke-width="1" stroke="#0E5347" fill="#F5EFE2"/>
    <path d="M90.6 75 L92.7 77 L97.4 72.2" stroke="#0E5347" stroke-width="1"/>
    <rect x="32" y="85" width="50" height="8" rx="2" stroke-width="0.6" fill="#EDE6D5"/>
    <rect x="88" y="85" width="12" height="8" rx="1.5" stroke-width="0.8"/>
    <rect x="32" y="99" width="50" height="8" rx="2" stroke-width="0.6" fill="#EDE6D5"/>
    <rect x="88" y="99" width="12" height="8" rx="1.5" stroke-width="1" stroke="#0E5347" fill="#F5EFE2"/>
    <path d="M90.6 103 L92.7 105 L97.4 100.2" stroke="#0E5347" stroke-width="1"/>
    <rect x="32" y="113" width="50" height="8" rx="2" stroke-width="0.6" fill="#EDE6D5"/>
    <rect x="88" y="113" width="12" height="8" rx="1.5" stroke-width="0.8"/>
    <text x="66" y="129" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="6" letter-spacing="0.04em" fill="#0F1417" stroke="none" font-weight="500">970 ROWS · 5 SETS</text>

    <!-- RIGHT: live SWE-bench run that resolves, then reports realized cost -->
    <text x="174" y="62" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="6" letter-spacing="0.1em" fill="#4A5159" stroke="none">SWE-BENCH</text>
    <circle cx="146" cy="84" r="2.6" fill="#F5EFE2"/>
    <circle cx="160" cy="84" r="2.6" fill="#F5EFE2"/>
    <circle cx="174" cy="84" r="2.6" fill="#F5EFE2"/>
    <path d="M148.6 84 H157.4 M162.6 84 H171.4" stroke-width="0.9"/>
    <path d="M177 84 H185" stroke-width="0.9"/>
    <path d="M183 80.5 L188 84 L183 87.5" stroke-width="0.9"/>
    <path d="M191 84 L194 88 L201 79" stroke="#0E5347" stroke-width="1.7"/>
    <text x="174" y="103" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="5.8" letter-spacing="0.06em" fill="#0E5347" stroke="none" font-weight="500">RESOLVED</text>
    <text x="174" y="129" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="6" letter-spacing="0.04em" fill="#4A5159" stroke="none">$ REALIZED COST</text>

    <!-- ============ SHARED LOCKED TIER POOL (uniform, fixed) ============ -->
    <text x="120" y="150" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="5.8" letter-spacing="0.1em" fill="#4A5159" stroke="none">LOCKED TIER POOL</text>
    <rect x="42" y="156" width="156" height="20" rx="4" stroke-width="1"/>
    <rect x="48" y="160" width="32" height="12" rx="2" stroke-width="0.8"/>
    <rect x="86" y="160" width="32" height="12" rx="2" stroke-width="0.8"/>
    <rect x="124" y="160" width="32" height="12" rx="2" stroke-width="0.8"/>
    <rect x="162" y="160" width="32" height="12" rx="2" stroke-width="0.8"/>
    <text x="64" y="168.5" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="5.6" letter-spacing="0.02em" fill="#0F1417" stroke="none">LOW</text>
    <text x="102" y="168.5" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="5.6" letter-spacing="0.02em" fill="#0F1417" stroke="none">MID</text>
    <text x="140" y="168.5" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="5.6" letter-spacing="0.02em" fill="#0F1417" stroke="none">MID+</text>
    <text x="178" y="168.5" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="5.6" letter-spacing="0.02em" fill="#0F1417" stroke="none">HIGH</text>

    <!-- ============ RESULT (both halves: parity + cost) ============ -->
    <text x="120" y="190" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="5.8" letter-spacing="0.06em" fill="#4A5159" stroke="none">AT OPUS 4.6 QUALITY</text>
    <rect x="58" y="196" width="124" height="22" rx="3" fill="#0E5347" stroke="#0E5347"/>
    <text x="120" y="211" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="0.03em" fill="#FAF1D8" stroke="none" font-weight="700">53% CHEAPER</text>

    <!-- caption -->
    <text x="120" y="233" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="6.6" letter-spacing="0.06em" fill="#4A5159" stroke="none" font-weight="500">PER-CALL LLM ROUTING · RLEVAL '26</text>
  </g>
</svg>
