<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <rect width="240" height="240" fill="#F5EFE2"/>
  <g stroke="#0F1417" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer dashed plate frame -->
    <rect x="14" y="14" width="212" height="212" stroke-width="0.6" stroke-dasharray="2 3" opacity="0.5"/>

    <!-- Subtle ribcage / chest contour -->
    <path d="M52 92 Q52 70 88 66 Q120 60 124 66 Q128 60 152 66 Q188 70 188 92 Q190 124 180 152 Q160 178 120 184 Q80 178 60 152 Q50 124 52 92 Z" stroke-width="0.5" stroke-dasharray="1.4 2.4" opacity="0.32"/>
    <!-- Rib hint lines -->
    <path d="M70 96 Q120 102 170 96 M66 110 Q120 118 174 110 M66 124 Q120 132 174 124 M70 140 Q120 148 170 140" stroke-width="0.4" stroke-dasharray="1.4 2.6" opacity="0.28"/>

    <!-- Heart silhouette (anatomical asymmetry: right side fuller than left, narrower apex) -->
    <path d="M122 100 C 100 78, 70 82, 68 112 C 68 140, 96 162, 124 182 C 158 158, 184 134, 182 108 C 180 78, 146 76, 122 100 Z" stroke-width="1.6" fill="#FAF1D8"/>
    <!-- Inner ventricle hints (LV on left, RV on right but smaller per anatomy) -->
    <path d="M98 122 Q104 144 120 158" stroke-width="0.7" opacity="0.55"/>
    <path d="M148 122 Q142 138 130 152" stroke-width="0.7" opacity="0.5"/>
    <!-- Septal line (curved, not perfectly vertical) -->
    <path d="M122 108 Q126 140 124 178" stroke-width="0.5" stroke-dasharray="1.5 2" opacity="0.45"/>
    <!-- Apex tick (narrow, anatomical) -->
    <circle cx="124" cy="182" r="1.4" fill="#0F1417" opacity="0.6" stroke="none"/>

    <!-- Three sequence panels orbiting the heart (top-left, top-right, bottom-center) -->
    <!-- Top-left: T1 panel -->
    <g>
      <rect x="32" y="32" width="42" height="22" rx="2" stroke-width="1" fill="#FAF1D8"/>
      <path d="M38 44 H50 M54 44 H66" stroke-width="0.5" opacity="0.5"/>
      <text x="53" y="48" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="0.08em" fill="#0F1417" stroke="none" font-weight="500">T1</text>
    </g>
    <!-- Top-right: M0 panel -->
    <g>
      <rect x="166" y="32" width="42" height="22" rx="2" stroke-width="1" fill="#FAF1D8"/>
      <path d="M172 44 H184 M188 44 H200" stroke-width="0.5" opacity="0.5"/>
      <text x="187" y="48" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" letter-spacing="0.08em" fill="#0F1417" stroke="none" font-weight="500">M0</text>
    </g>
    <!-- Bottom: T2* synthesized panel (emerald, larger — this is the paper's headline output) -->
    <g>
      <rect x="84" y="196" width="72" height="28" rx="3" stroke-width="1.8" fill="#FAF1D8" stroke="#0E5347"/>
      <path d="M92 210 H108 M114 210 H130 M138 210 H146" stroke-width="0.5" stroke="#0E5347" opacity="0.7"/>
      <text x="120" y="216" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="0.08em" fill="#0E5347" stroke="none" font-weight="700">T2*</text>
      <text x="120" y="227" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="5.5" letter-spacing="0.18em" fill="#0E5347" stroke="none">SYNTHESIZED</text>
    </g>

    <!-- Arrows: T1 → heart, M0 → heart, heart → T2* (the reverse generation) -->
    <!-- T1 → heart (curved down-right) -->
    <path d="M64 56 Q72 70 86 88" stroke-width="0.8" stroke-dasharray="1.8 2.2" opacity="0.65"/>
    <path d="M84 84 L88 90 L82 92" stroke-width="0.8" opacity="0.7"/>

    <!-- M0 → heart (curved down-left) -->
    <path d="M176 56 Q168 70 154 88" stroke-width="0.8" stroke-dasharray="1.8 2.2" opacity="0.65"/>
    <path d="M156 84 L152 90 L158 92" stroke-width="0.8" opacity="0.7"/>

    <!-- Heart → T2* (the REVERSE arrow, solid emerald, prominent) -->
    <path d="M120 188 L120 198" stroke-width="2" stroke="#0E5347"/>
    <path d="M113 190 L120 198 L127 190" stroke-width="1.8" stroke="#0E5347"/>
    <text x="146" y="194" font-family="JetBrains Mono, monospace" font-size="8" letter-spacing="0.12em" fill="#0E5347" stroke="none" font-weight="700">REVERSE</text>

    <!-- Diffusion noise dots (around heart, hinting at the generative process) -->
    <circle cx="78" cy="80" r="1" fill="#0F1417" opacity="0.4"/>
    <circle cx="94" cy="68" r="0.8" fill="#0F1417" opacity="0.35"/>
    <circle cx="146" cy="68" r="0.7" fill="#0F1417" opacity="0.4"/>
    <circle cx="162" cy="80" r="1" fill="#0F1417" opacity="0.4"/>
    <circle cx="64" cy="124" r="0.7" fill="#0F1417" opacity="0.35"/>
    <circle cx="176" cy="124" r="0.8" fill="#0F1417" opacity="0.4"/>
    <circle cx="80" cy="166" r="0.7" fill="#0F1417" opacity="0.35"/>
    <circle cx="160" cy="166" r="0.7" fill="#0F1417" opacity="0.35"/>

    <!-- "DIFFUSION" small label tucked above heart -->
    <text x="120" y="74" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="6" letter-spacing="0.2em" fill="#4A5159" stroke="none">DIFFUSION</text>

    <!-- Caption (well inside safe area) -->
    <text x="120" y="232" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="6.5" fill="#4A5159" stroke="none" letter-spacing="0.14em">CMR · ZERO-SHOT GENERATION · MICCAI '25</text>
  </g>
</svg>
