<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <rect width="240" height="240" fill="#F5EFE2"/>
  <g stroke="#0F1417" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer dashed plate frame -->
    <rect x="14" y="14" width="212" height="212" stroke-width="0.6" stroke-dasharray="2 3" opacity="0.5"/>

    <!-- ============================================================ -->
    <!-- ROW 1 (y 22-48): INPUT PANELS — T1 (left) · DIFFUSION · M0 (right) -->
    <!-- ============================================================ -->
    <!-- T1 panel -->
    <g>
      <rect x="20" y="22" width="48" height="26" rx="3" stroke-width="1" fill="#FAF1D8"/>
      <path d="M28 35 H42 M46 35 H60" stroke-width="0.5" opacity="0.5"/>
      <text x="44" y="40" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="0.08em" fill="#0F1417" stroke="none" font-weight="500">T1</text>
    </g>
    <!-- M0 panel -->
    <g>
      <rect x="172" y="22" width="48" height="26" rx="3" stroke-width="1" fill="#FAF1D8"/>
      <path d="M180 35 H194 M198 35 H212" stroke-width="0.5" opacity="0.5"/>
      <text x="196" y="40" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="0.08em" fill="#0F1417" stroke="none" font-weight="500">M0</text>
    </g>
    <!-- DIFFUSION label between, with hairline rules either side -->
    <path d="M74 36 H98" stroke-width="0.4" stroke-dasharray="1 2" opacity="0.55"/>
    <text x="120" y="38.5" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7.2" letter-spacing="0.16em" fill="#4A5159" stroke="none" font-weight="500">DIFFUSION</text>
    <path d="M142 36 H166" stroke-width="0.4" stroke-dasharray="1 2" opacity="0.55"/>

    <!-- ============================================================ -->
    <!-- ROW 2 (y 50-90): CURVED ARROWS feeding into the heart        -->
    <!-- ============================================================ -->
    <path d="M58 50 Q70 72 90 92" stroke-width="0.8" stroke-dasharray="1.8 2.2" opacity="0.62"/>
    <path d="M86 88 L90 94 L84 94" stroke-width="0.7" opacity="0.7"/>
    <path d="M182 50 Q170 72 150 92" stroke-width="0.8" stroke-dasharray="1.8 2.2" opacity="0.62"/>
    <path d="M154 88 L150 94 L156 94" stroke-width="0.7" opacity="0.7"/>

    <!-- ============================================================ -->
    <!-- ROW 3 (y 80-170): HEART (anatomically asymmetric)            -->
    <!-- ============================================================ -->
    <!-- Subtle ribcage / chest contour behind heart -->
    <path d="M62 100 Q62 82 92 78 Q120 74 128 78 Q134 74 152 78 Q182 82 184 100 Q186 128 176 152 Q156 170 124 174 Q88 170 68 152 Q60 128 62 100 Z" stroke-width="0.5" stroke-dasharray="1.4 2.4" opacity="0.28"/>
    <path d="M76 106 Q124 112 172 106 M72 120 Q124 126 176 120 M72 134 Q124 140 176 134 M76 148 Q124 154 172 148" stroke-width="0.4" stroke-dasharray="1.4 2.6" opacity="0.24"/>

    <!-- Heart silhouette (right side fuller, narrower apex, curved septal) -->
    <path d="M122 96 C 102 78, 76 82, 74 108 C 74 132, 98 152, 124 170 C 154 150, 178 128, 176 104 C 174 78, 144 76, 122 96 Z" stroke-width="1.6" fill="#FAF1D8"/>
    <!-- Inner ventricle hints (LV on left, RV smaller per anatomy) -->
    <path d="M104 118 Q108 138 122 150" stroke-width="0.7" opacity="0.55"/>
    <path d="M148 116 Q142 132 132 146" stroke-width="0.7" opacity="0.5"/>
    <!-- Septal line (curved) -->
    <path d="M122 104 Q126 134 124 168" stroke-width="0.5" stroke-dasharray="1.5 2" opacity="0.45"/>
    <!-- Apex tick -->
    <circle cx="124" cy="170" r="1.3" fill="#0F1417" opacity="0.6" stroke="none"/>

    <!-- Diffusion noise dots around heart (the generative process hint) -->
    <circle cx="84" cy="82" r="0.9" fill="#0F1417" opacity="0.38"/>
    <circle cx="100" cy="72" r="0.6" fill="#0F1417" opacity="0.32"/>
    <circle cx="148" cy="72" r="0.7" fill="#0F1417" opacity="0.36"/>
    <circle cx="164" cy="82" r="0.9" fill="#0F1417" opacity="0.38"/>
    <circle cx="66" cy="124" r="0.7" fill="#0F1417" opacity="0.32"/>
    <circle cx="180" cy="124" r="0.7" fill="#0F1417" opacity="0.36"/>

    <!-- ============================================================ -->
    <!-- ROW 4 (y 172-188): REVERSE ARROW — heart → output           -->
    <!-- ============================================================ -->
    <path d="M124 174 L124 188" stroke-width="2" stroke="#0E5347"/>
    <path d="M118 184 L124 190 L130 184" stroke-width="1.8" stroke="#0E5347"/>
    <!-- REVERSE label to the right of arrow (clear of all panels) -->
    <text x="142" y="188" font-family="JetBrains Mono, monospace" font-size="8" letter-spacing="0.12em" fill="#0E5347" stroke="none" font-weight="700">REVERSE</text>

    <!-- ============================================================ -->
    <!-- ROW 5 (y 192-222): T2* SYNTHESIZED OUTPUT PANEL              -->
    <!-- All labels live INSIDE the panel with proper line spacing.   -->
    <!-- ============================================================ -->
    <g>
      <rect x="74" y="192" width="92" height="30" rx="3.5" stroke-width="1.8" fill="#FAF1D8" stroke="#0E5347"/>
      <!-- Top tag inside the panel -->
      <text x="120" y="202" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="6.2" letter-spacing="0.16em" fill="#0E5347" stroke="none" font-weight="500">SYNTHESIZED</text>
      <!-- Faint texture between labels -->
      <path d="M88 208 H108 M112 208 H132 M138 208 H152" stroke-width="0.5" stroke="#0E5347" opacity="0.55"/>
      <!-- Big T2* label -->
      <text x="120" y="219" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="13" letter-spacing="0.06em" fill="#0E5347" stroke="none" font-weight="700">T2*</text>
    </g>

    <!-- ============================================================ -->
    <!-- ROW 6 (y 230-238): CAPTION                                  -->
    <!-- ============================================================ -->
    <text x="120" y="235" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="6.6" fill="#4A5159" stroke="none" letter-spacing="0.1em" font-weight="500">CMR · ZERO-SHOT GENERATION · MICCAI '25</text>
  </g>
</svg>
