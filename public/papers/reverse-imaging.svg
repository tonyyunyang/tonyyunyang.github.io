<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" fill="none">
  <rect width="240" height="200" fill="#F5EFE2"/>
  <g stroke="#0F1417" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer dashed plate frame -->
    <rect x="8" y="8" width="224" height="184" stroke-width="0.6" stroke-dasharray="2 3" opacity="0.5"/>

    <!-- Subtle ribcage / chest contour behind -->
    <path d="M44 80 Q44 60 80 56 Q116 50 120 56 Q124 50 160 56 Q196 60 196 80 Q198 110 188 138 Q170 162 120 168 Q70 162 52 138 Q42 110 44 80 Z" stroke-width="0.5" stroke-dasharray="1.4 2.4" opacity="0.32"/>
    <!-- Rib hint lines -->
    <path d="M68 82 Q120 88 172 82 M64 96 Q120 104 176 96 M64 110 Q120 118 176 110 M68 124 Q120 132 172 124" stroke-width="0.4" stroke-dasharray="1.4 2.6" opacity="0.28"/>

    <!-- Heart silhouette (cardiac, iconic two-lobe shape) -->
    <path d="M120 78 C 100 58, 72 62, 72 88 C 72 110, 92 128, 120 144 C 148 128, 168 110, 168 88 C 168 62, 140 58, 120 78 Z" stroke-width="1.4" fill="#FAF1D8"/>
    <!-- Inner cardiac chambers (left ventricle hint, soft hatching) -->
    <path d="M100 96 Q104 114 116 124" stroke-width="0.6" opacity="0.55"/>
    <path d="M140 96 Q136 114 124 124" stroke-width="0.6" opacity="0.55"/>
    <!-- Septal line -->
    <path d="M120 84 L120 140" stroke-width="0.5" stroke-dasharray="1.5 2" opacity="0.45"/>
    <!-- Apex tick (subtle anatomical touch) -->
    <circle cx="120" cy="144" r="1.4" fill="#0F1417" opacity="0.5" stroke="none"/>

    <!-- Three sequence panels orbiting the heart -->
    <!-- Top: T1 panel -->
    <g>
      <rect x="100" y="14" width="40" height="22" rx="2" stroke-width="1" fill="#FAF1D8"/>
      <path d="M106 26 H118 M122 26 H134" stroke-width="0.5" opacity="0.5"/>
      <text x="120" y="30" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" letter-spacing="0.08em" fill="#0F1417" stroke="none">T1</text>
    </g>
    <!-- Bottom-left: M0 panel -->
    <g>
      <rect x="22" y="148" width="40" height="22" rx="2" stroke-width="1" fill="#FAF1D8"/>
      <path d="M28 160 H40 M44 160 H56" stroke-width="0.5" opacity="0.5"/>
      <text x="42" y="164" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" letter-spacing="0.08em" fill="#0F1417" stroke="none">M0</text>
    </g>
    <!-- Bottom-right: T2 panel (synthesized — emerald accent) -->
    <g>
      <rect x="178" y="148" width="40" height="22" rx="2" stroke-width="1.3" fill="#FAF1D8" stroke="#0E5347"/>
      <path d="M184 160 H196 M200 160 H212" stroke-width="0.5" stroke="#0E5347" opacity="0.65"/>
      <text x="198" y="164" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="8" letter-spacing="0.08em" fill="#0E5347" stroke="none">T2*</text>
    </g>

    <!-- Curved arrows: T1 → heart, heart → M0 (encoder), heart → T2* (decoder, accent) -->
    <!-- T1 → heart (down arrow) -->
    <path d="M120 38 Q120 50 120 62" stroke-width="0.9" stroke-dasharray="2 2.5" opacity="0.7"/>
    <path d="M116 58 L120 64 L124 58" stroke-width="0.9" opacity="0.75"/>

    <!-- Heart → M0 (curved, dashed) -->
    <path d="M88 134 Q72 144 60 150" stroke-width="0.8" stroke-dasharray="1.8 2.2" opacity="0.65"/>
    <path d="M64 146 L60 152 L66 154" stroke-width="0.8" opacity="0.7"/>

    <!-- Heart → T2* synthesized (solid, emerald accent — the "reverse" generation) -->
    <path d="M152 134 Q170 144 184 150" stroke-width="1.3" stroke="#0E5347"/>
    <path d="M180 146 L186 152 L180 156" stroke-width="1.2" stroke="#0E5347"/>

    <!-- "REVERSE" label near the emerald arrow -->
    <text x="186" y="138" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="6" letter-spacing="0.16em" fill="#0E5347" stroke="none">REVERSE</text>

    <!-- Diffusion noise dots (around heart, hinting at the generative process) -->
    <circle cx="78" cy="64" r="0.9" fill="#0F1417" opacity="0.45"/>
    <circle cx="162" cy="60" r="0.7" fill="#0F1417" opacity="0.45"/>
    <circle cx="174" cy="84" r="0.9" fill="#0F1417" opacity="0.4"/>
    <circle cx="64" cy="88" r="0.8" fill="#0F1417" opacity="0.4"/>
    <circle cx="172" cy="118" r="0.7" fill="#0F1417" opacity="0.4"/>
    <circle cx="60" cy="120" r="0.9" fill="#0F1417" opacity="0.4"/>
    <circle cx="84" cy="156" r="0.6" fill="#0F1417" opacity="0.35"/>
    <circle cx="158" cy="158" r="0.8" fill="#0F1417" opacity="0.4"/>

    <!-- Caption -->
    <text x="120" y="186" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="6" fill="#4A5159" stroke="none" letter-spacing="0.08em">CMR · DIFFUSION · ZERO-SHOT · MICCAI '25</text>
  </g>
</svg>
