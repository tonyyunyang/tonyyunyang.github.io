<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <rect width="240" height="240" fill="#F5EFE2"/>
  <g stroke="#0F1417" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- plate frame -->
    <rect x="14" y="14" width="212" height="212" stroke-width="0.6" stroke-dasharray="2 3" opacity="0.5"/>

    <!-- ============ NEXT-ROUND RETURN ARC (the evolution loop) ============ -->
    <path d="M190 96 C 190 40, 46 40, 46 96" stroke-width="0.9" stroke-dasharray="2.4 2.8" opacity="0.6"/>
    <path d="M42 90 L46 96 L51 91" stroke-width="0.9" opacity="0.75"/>
    <text x="118" y="38" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="6" letter-spacing="0.12em" fill="#4A5159" stroke="none">NEXT ROUND</text>

    <!-- ============ TRACES (left) ============ -->
    <rect x="36" y="110" width="26" height="22" rx="2" fill="#F5EFE2" stroke-width="1"/>
    <rect x="32" y="114" width="26" height="22" rx="2" fill="#F5EFE2" stroke-width="1"/>
    <path d="M36 120 H50 M36 124 H52 M36 128 H48" stroke-width="0.5" opacity="0.5"/>
    <text x="45" y="150" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="5.5" letter-spacing="0.06em" fill="#4A5159" stroke="none">TRACES</text>

    <!-- traces fan out to the three tracks -->
    <path d="M60 122 Q70 90 78 86" stroke-width="0.8" opacity="0.6"/>
    <path d="M60 124 H78" stroke-width="0.8" opacity="0.6"/>
    <path d="M60 126 Q70 152 78 150" stroke-width="0.8" opacity="0.6"/>

    <!-- ============ THREE EVOLVING TRACKS (Skill -> LLM -> Router) ============ -->
    <rect x="78" y="76" width="78" height="20" rx="3" stroke-width="1.1"/>
    <circle cx="88" cy="86" r="5.5" fill="#F5EFE2" stroke-width="1"/>
    <text x="88" y="88.5" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7" fill="#0F1417" stroke="none" font-weight="600">1</text>
    <text x="120" y="89" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7.5" letter-spacing="0.06em" fill="#0F1417" stroke="none" font-weight="500">SKILL</text>
    <!-- schedule order: Skill -> LLM -> Router -->
    <path d="M84 100 L88 104 L92 100" stroke-width="0.9" opacity="0.55"/>

    <rect x="78" y="108" width="78" height="20" rx="3" stroke-width="1.1"/>
    <circle cx="88" cy="118" r="5.5" fill="#F5EFE2" stroke-width="1"/>
    <text x="88" y="120.5" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7" fill="#0F1417" stroke="none" font-weight="600">2</text>
    <text x="120" y="121" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7.5" letter-spacing="0.06em" fill="#0F1417" stroke="none" font-weight="500">LLM</text>
    <path d="M84 132 L88 136 L92 132" stroke-width="0.9" opacity="0.55"/>

    <rect x="78" y="140" width="78" height="20" rx="3" stroke-width="1.1"/>
    <circle cx="88" cy="150" r="5.5" fill="#F5EFE2" stroke-width="1"/>
    <text x="88" y="152.5" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7" fill="#0F1417" stroke="none" font-weight="600">3</text>
    <text x="120" y="153" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7.5" letter-spacing="0.06em" fill="#0F1417" stroke="none" font-weight="500">ROUTER</text>

    <!-- tracks converge into the joint-replay gate -->
    <path d="M156 86 Q172 90 178 110" stroke-width="0.8" opacity="0.6"/>
    <path d="M156 118 H176" stroke-width="0.8" opacity="0.6"/>
    <path d="M156 150 Q172 150 178 128" stroke-width="0.8" opacity="0.6"/>

    <!-- ============ JOINT-REPLAY VERIFIER GATE (right) ============ -->
    <circle cx="190" cy="118" r="13" fill="#F5EFE2" stroke="#0E5347" stroke-width="1.6"/>
    <path d="M184 118 L188 123 L197 112" stroke="#0E5347" stroke-width="1.8"/>
    <text x="190" y="144" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="5" letter-spacing="0.06em" fill="#0E5347" stroke="none" font-weight="500">JOINT</text>
    <text x="190" y="151" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="5" letter-spacing="0.06em" fill="#0E5347" stroke="none" font-weight="500">REPLAY</text>

    <!-- ============ RESULT BADGE (single emerald moment, both stats) ============ -->
    <rect x="46" y="178" width="148" height="20" rx="3" fill="#0E5347" stroke="#0E5347"/>
    <text x="120" y="191.5" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7.2" letter-spacing="0.02em" fill="#FAF1D8" stroke="none" font-weight="700">51.8% COST · 87.3% ACC</text>

    <!-- caption -->
    <text x="120" y="233" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="6.6" letter-spacing="0.06em" fill="#4A5159" stroke="none" font-weight="500">SELF-EVOLVING AGENTS · RLEVAL '26</text>
  </g>
</svg>
