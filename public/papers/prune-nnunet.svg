<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" fill="none">
  <rect width="240" height="240" fill="#F5EFE2"/>
  <g stroke="#0F1417" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer dashed plate frame -->
    <rect x="14" y="14" width="212" height="212" stroke-width="0.6" stroke-dasharray="2 3" opacity="0.5"/>

    <!-- Subtle organ contour behind (medical anatomy hint) -->
    <path d="M76 92 Q60 92 60 108 Q60 132 92 152 Q108 162 124 148 Q134 162 152 152 Q188 132 188 108 Q188 92 168 92 Q148 92 138 108 Q126 92 110 92 Q96 90 76 92 Z" stroke-width="0.5" stroke-dasharray="1.4 2.4" opacity="0.28"/>

    <!-- IN / OUT labels (well inside safe area) -->
    <text x="34" y="68" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="6.5" letter-spacing="0.18em" fill="#4A5159" stroke="none">IN</text>
    <text x="206" y="68" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="6.5" letter-spacing="0.18em" fill="#4A5159" stroke="none">OUT</text>

    <!-- Encoder (descending steps, left side) -->
    <rect x="40" y="74" width="20" height="16" stroke-width="1" fill="#FAF1D8"/>
    <rect x="50" y="98" width="18" height="14" stroke-width="1" fill="#FAF1D8"/>
    <rect x="58" y="120" width="16" height="12" stroke-width="1" fill="#FAF1D8"/>
    <rect x="64" y="140" width="14" height="10" stroke-width="1" fill="#FAF1D8"/>

    <!-- Bottleneck (the surviving "core" — emerald) -->
    <rect x="100" y="156" width="40" height="26" stroke-width="1.6" fill="#FAF1D8" stroke="#0E5347"/>
    <path d="M108 168 H132 M108 174 H128" stroke="#0E5347" stroke-width="0.5" opacity="0.7"/>

    <!-- Decoder (ascending steps, right side) -->
    <rect x="162" y="140" width="14" height="10" stroke-width="1" fill="#FAF1D8"/>
    <rect x="172" y="120" width="16" height="12" stroke-width="1" fill="#FAF1D8"/>
    <rect x="180" y="98" width="18" height="14" stroke-width="1" fill="#FAF1D8"/>
    <rect x="180" y="74" width="20" height="16" stroke-width="1" fill="#FAF1D8"/>

    <!-- Forward connections (encoder, all kept) -->
    <path d="M50 90 L59 98" stroke-width="0.9"/>
    <path d="M59 112 L66 120" stroke-width="0.9"/>
    <path d="M66 132 L71 140" stroke-width="0.9"/>
    <path d="M71 150 L100 168" stroke-width="0.9"/>

    <!-- Forward connections (decoder, all kept) -->
    <path d="M140 168 L169 150" stroke-width="0.9"/>
    <path d="M169 140 L180 132" stroke-width="0.9"/>
    <path d="M180 120 L189 112" stroke-width="0.9"/>
    <path d="M189 98 L190 90" stroke-width="0.9"/>

    <!-- Skip connections — most pruned (dashed), one kept (solid) -->
    <path d="M60 82 L180 82" stroke-width="0.7" stroke-dasharray="2.5 3" opacity="0.45"/>
    <path d="M68 105 L180 105" stroke-width="0.7" stroke-dasharray="2.5 3" opacity="0.45"/>
    <!-- Kept skip (solid, deep) -->
    <path d="M74 126 Q120 116 188 126" stroke-width="1.3"/>
    <path d="M78 145 L162 145" stroke-width="0.7" stroke-dasharray="2.5 3" opacity="0.45"/>

    <!-- Pruned-edge × marks (smaller, less dominant) -->
    <path d="M118 78 L122 86 M118 86 L122 78" stroke-width="0.9" stroke="#0E5347"/>
    <path d="M118 101 L122 109 M118 109 L122 101" stroke-width="0.9" stroke="#0E5347"/>
    <path d="M118 141 L122 149 M118 149 L122 141" stroke-width="0.9" stroke="#0E5347"/>

    <!-- Bottleneck label -->
    <text x="120" y="196" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="6.5" letter-spacing="0.16em" fill="#0E5347" stroke="none">CORE</text>

    <!-- Sparsity badge — placed BELOW the network in the safe area, prominent -->
    <rect x="80" y="32" width="80" height="22" rx="3" fill="#0E5347" stroke="#0E5347"/>
    <text x="120" y="47" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="0.1em" fill="#FAF1D8" stroke="none" font-weight="700">99% SPARSE</text>

    <!-- Caption -->
    <text x="120" y="222" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="6.5" fill="#4A5159" stroke="none" letter-spacing="0.16em">U-NET · MAGNITUDE PRUNING · MIDL '25</text>
  </g>
</svg>
