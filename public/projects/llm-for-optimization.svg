    <text x="212" y="28" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7" fill="#0F1417" stroke="none" letter-spacing="0.08em">LLM</text>
    <path d="M212 36 L212 44" stroke-width="0.7"/>
    <path d="M208 42 L212 44 L216 42" stroke-width="0.7"/>
    <text x="120" y="184" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="6" fill="#4A5159" stroke="none" letter-spacing="0.08em">N=9 · LLM-GUIDED ROUTE</text>
  </g>
