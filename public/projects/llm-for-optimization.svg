<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" fill="none">
  <rect width="240" height="200" fill="#F5EFE2"/>
  <g stroke="#0F1417" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Frame -->
    <rect x="8" y="8" width="224" height="184" stroke-width="0.6" stroke-dasharray="2 3" opacity="0.5"/>
    <!-- TSP cities scattered -->
    <circle cx="48" cy="50" r="3" fill="#F5EFE2"/>
    <circle cx="92" cy="36" r="3" fill="#F5EFE2"/>
    <circle cx="160" cy="46" r="3" fill="#F5EFE2"/>
    <circle cx="188" cy="74" r="3" fill="#F5EFE2"/>
    <circle cx="180" cy="124" r="3" fill="#F5EFE2"/>
    <circle cx="146" cy="156" r="3" fill="#F5EFE2"/>
    <circle cx="92" cy="148" r="3" fill="#F5EFE2"/>
    <circle cx="48" cy="120" r="3" fill="#F5EFE2"/>
    <circle cx="60" cy="84" r="3" fill="#F5EFE2"/>
    <circle cx="124" cy="92" r="4" fill="#0E5347" stroke="#0E5347"/>
    <!-- Naive route (dashed, suboptimal) -->
    <path d="M48 50 L160 46 L48 120 L180 124 L92 36 L92 148 L188 74 L146 156 L60 84 L48 50" stroke-width="0.6" stroke-dasharray="2 3" opacity="0.45"/>
