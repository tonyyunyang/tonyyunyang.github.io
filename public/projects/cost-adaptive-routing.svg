<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200" fill="none">
  <rect width="240" height="200" fill="#F5EFE2"/>
  <g stroke="#0F1417" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Frame -->
    <rect x="8" y="8" width="224" height="184" stroke-width="0.6" stroke-dasharray="2 3" opacity="0.5"/>
    <!-- Axes -->
    <path d="M40 160 L200 160" stroke-width="1.2"/>
    <path d="M40 160 L40 40" stroke-width="1.2"/>
    <path d="M196 156 L200 160 L196 164"/>
    <path d="M36 44 L40 40 L44 44"/>
    <text x="120" y="180" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7" fill="#4A5159" stroke="none" letter-spacing="0.06em">COST</text>
    <text x="20" y="105" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="7" fill="#4A5159" stroke="none" letter-spacing="0.06em" transform="rotate(-90 20 105)">QUALITY</text>
    <!-- Pareto frontier curve -->
    <path d="M50 150 Q70 130 90 110 Q110 90 140 75 Q170 65 195 60" stroke-width="1.6"/>
    <!-- Naive baseline (dashed) -->
    <path d="M50 150 Q120 100 195 90" stroke-width="0.8" stroke-dasharray="3 3" opacity="0.55"/>
    <!-- Sample points on the curve -->
    <circle cx="60" cy="142" r="3" fill="#F5EFE2"/>
    <circle cx="86" cy="116" r="3" fill="#F5EFE2"/>
    <circle cx="120" cy="92" r="4" fill="#0E5347" stroke="#0E5347"/>
    <circle cx="160" cy="72" r="3" fill="#F5EFE2"/>
    <circle cx="190" cy="62" r="3" fill="#F5EFE2"/>
    <!-- Sweet-spot label -->
    <path d="M120 92 L140 56" stroke-width="0.5"/>
    <text x="160" y="50" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="6" fill="#0E5347" stroke="none" letter-spacing="0.06em">PARETO</text>
    <text x="160" y="58" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="6" fill="#0E5347" stroke="none" letter-spacing="0.06em">SWEET-SPOT</text>
    <path d="M60 160 V164 M100 160 V164 M140 160 V164 M180 160 V164" stroke-width="0.5"/>
    <path d="M40 140 H36 M40 100 H36 M40 60 H36" stroke-width="0.5"/>
  </g>
</svg>
