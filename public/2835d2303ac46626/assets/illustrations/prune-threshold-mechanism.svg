<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" role="img" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title>One-shot magnitude-threshold pruning</title>
  <desc>A bell-shaped histogram of trained weight values centered at zero. Weights inside the shaded band between minus tau and plus tau (the near-zero mass) are set to zero; weights outside are kept. Sweeping tau outward prunes more and raises sparsity.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Title + subtitle -->
  <text x="460" y="42" text-anchor="middle" font-size="19" font-weight="700" fill="#1f2733">One-shot magnitude-threshold pruning</text>
  <text x="460" y="64" text-anchor="middle" font-size="12" fill="#56616f">Zero each trained weight whose magnitude is below the threshold &#964;</text>

  <!-- Formula box -->
  <rect x="270" y="80" width="380" height="40" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="460" y="105" text-anchor="middle" font-size="15" font-weight="700" fill="#1f2733">w &#8592; 0  if  |w| &lt; &#964;     (Han et al. 2015)</text>

  <!-- Side note chip -->
  <rect x="666" y="80" width="230" height="40" rx="10" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="781" y="98" text-anchor="middle" font-size="11" font-weight="600" fill="#56616f">one-shot &#183; post-training</text>
  <text x="781" y="113" text-anchor="middle" font-size="11" fill="#56616f">no fine-tuning after the cut</text>

  <!-- Axes -->
  <line x1="170" y1="150" x2="170" y2="400" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="170" y1="400" x2="750" y2="400" stroke="#1f2733" stroke-width="1.5"/>
  <text x="150" y="278" text-anchor="middle" font-size="11" fill="#56616f" transform="rotate(-90 150 278)">weight count</text>

  <!-- Shaded prune band (behind bars) -->
  <rect x="405" y="150" width="110" height="250" fill="#94a3b8" fill-opacity="0.14"/>

  <!-- Histogram bars: gray = pruned (inside band) -->
  <g stroke="#94a3b8" stroke-width="1">
    <rect x="451" y="160" width="18" height="240" fill="#cbd5e1"/>
    <rect x="473" y="169" width="18" height="231" fill="#cbd5e1"/>
    <rect x="429" y="169" width="18" height="231" fill="#cbd5e1"/>
    <rect x="495" y="196" width="18" height="204" fill="#cbd5e1"/>
    <rect x="407" y="196" width="18" height="204" fill="#cbd5e1"/>
  </g>

  <!-- Histogram bars: blue = kept (outside band) -->
  <g fill="#2563eb">
    <rect x="517" y="233" width="18" height="167"/>
    <rect x="385" y="233" width="18" height="167"/>
    <rect x="539" y="273" width="18" height="127"/>
    <rect x="363" y="273" width="18" height="127"/>
    <rect x="561" y="312" width="18" height="88"/>
    <rect x="341" y="312" width="18" height="88"/>
    <rect x="583" y="343" width="18" height="57"/>
    <rect x="319" y="343" width="18" height="57"/>
    <rect x="605" y="366" width="18" height="34"/>
    <rect x="297" y="366" width="18" height="34"/>
    <rect x="627" y="381" width="18" height="19"/>
    <rect x="275" y="381" width="18" height="19"/>
    <rect x="649" y="391" width="18" height="9"/>
    <rect x="253" y="391" width="18" height="9"/>
    <rect x="671" y="396" width="18" height="4"/>
    <rect x="231" y="396" width="18" height="4"/>
    <rect x="693" y="398" width="18" height="2"/>
    <rect x="209" y="398" width="18" height="2"/>
  </g>

  <!-- Dashed threshold lines (on top) -->
  <line x1="405" y1="146" x2="405" y2="410" stroke="#475569" stroke-width="1.5" stroke-dasharray="5 4"/>
  <line x1="515" y1="146" x2="515" y2="410" stroke="#475569" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="405" y="140" text-anchor="middle" font-size="14" font-weight="600" fill="#2563eb">&#8722;&#964;</text>
  <text x="515" y="140" text-anchor="middle" font-size="14" font-weight="600" fill="#2563eb">+&#964;</text>

  <!-- Kept callouts -->
  <line x1="340" y1="214" x2="392" y2="234" stroke="#2563eb" stroke-width="1.2"/>
  <line x1="580" y1="214" x2="526" y2="234" stroke="#2563eb" stroke-width="1.2"/>
  <text x="322" y="205" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">kept</text>
  <text x="322" y="221" text-anchor="middle" font-size="11" fill="#2563eb">|w| &#8805; &#964;</text>
  <text x="598" y="205" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">kept</text>
  <text x="598" y="221" text-anchor="middle" font-size="11" fill="#2563eb">|w| &#8805; &#964;</text>

  <!-- Pruned brace + label -->
  <path d="M405 408 L405 416 L515 416 L515 408" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="460" y="434" text-anchor="middle" font-size="12" font-weight="600" fill="#64748b">set to 0 (pruned): |w| &lt; &#964;</text>

  <!-- x-axis label -->
  <text x="300" y="455" text-anchor="middle" font-size="12" fill="#56616f">weight value w (centered at 0)</text>

  <!-- tau sweep strip -->
  <text x="628" y="464" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2733">Sweep the threshold &#964;</text>
  <text x="512" y="487" text-anchor="end" font-size="11" font-weight="600" fill="#56616f">&#964;:</text>
  <line x1="520" y1="482" x2="742" y2="482" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <g stroke="#2563eb" stroke-width="1.5">
    <line x1="540" y1="476" x2="540" y2="488"/>
    <line x1="585" y1="476" x2="585" y2="488"/>
    <line x1="630" y1="476" x2="630" y2="488"/>
    <line x1="675" y1="476" x2="675" y2="488"/>
  </g>
  <g text-anchor="middle" font-size="11" fill="#1f2733">
    <text x="540" y="502">4e-3</text>
    <text x="585" y="502">8e-3</text>
    <text x="630" y="502">1.2e-2</text>
    <text x="675" y="502">1.6e-2</text>
  </g>
  <text x="628" y="524" text-anchor="middle" font-size="11" fill="#56616f">larger &#964; &#8594; more pruned &#8594; higher sparsity (58-78% &#8594; 96-99%, per dataset)</text>
</svg>
