<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" role="img">
  <title>MERA cost-quality frontier</title>
  <desc>A cost-versus-quality scatter showing MERA shifting the serving operating point left to 51.8% of always-large cost while holding quality fixed.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#ea580c"/></marker>
  </defs>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <!-- Title -->
    <text x="40" y="32" font-size="19" font-weight="700" fill="#1f2733">Cost vs quality: MERA moves the operating point LEFT, not up</text>
    <text x="40" y="52" font-size="12.5" fill="#56616f">Same fixed pool of models &#183; the win is in HOW each invocation is served, not in a bigger model.</text>

    <!-- Axes -->
    <line x1="130" y1="400" x2="130" y2="78" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowGray)"/>
    <line x1="130" y1="400" x2="706" y2="400" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowGray)"/>

    <!-- Gridlines -->
    <line x1="186" y1="84" x2="186" y2="400" stroke="#eef2f7" stroke-width="1"/>
    <line x1="354" y1="84" x2="354" y2="400" stroke="#eef2f7" stroke-width="1"/>
    <line x1="507" y1="84" x2="507" y2="400" stroke="#eef2f7" stroke-width="1"/>
    <line x1="675" y1="84" x2="675" y2="400" stroke="#eef2f7" stroke-width="1"/>

    <!-- Y axis direction labels + title -->
    <text x="125" y="90" text-anchor="end" font-size="9.5" fill="#94a3b8">high</text>
    <text x="125" y="396" text-anchor="end" font-size="9.5" fill="#94a3b8">low</text>
    <g transform="translate(96,242) rotate(-90)"><text x="0" y="0" text-anchor="middle" font-size="12" fill="#56616f">Output quality / reliability  &#8594;</text></g>

    <!-- X axis ticks -->
    <line x1="186" y1="400" x2="186" y2="405" stroke="#94a3b8" stroke-width="1"/>
    <line x1="354" y1="400" x2="354" y2="405" stroke="#94a3b8" stroke-width="1"/>
    <line x1="507" y1="400" x2="507" y2="405" stroke="#94a3b8" stroke-width="1"/>
    <line x1="675" y1="400" x2="675" y2="405" stroke="#94a3b8" stroke-width="1"/>
    <line x1="583" y1="400" x2="583" y2="405" stroke="#2563eb" stroke-width="1.5"/>
    <text x="186" y="415" text-anchor="middle" font-size="10.5" fill="#56616f">3%</text>
    <text x="354" y="415" text-anchor="middle" font-size="10.5" fill="#56616f">10%</text>
    <text x="507" y="415" text-anchor="middle" font-size="10.5" fill="#56616f">30%</text>
    <text x="583" y="415" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2563eb">51.8%</text>
    <text x="675" y="415" text-anchor="middle" font-size="10.5" fill="#56616f">100%</text>
    <text x="418" y="432" text-anchor="middle" font-size="11.5" fill="#56616f">Serving cost per invocation  &#183;  log scale (always-large = 100%)</text>

    <!-- Read-off droplines -->
    <line x1="190" y1="347" x2="190" y2="399" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="675" y1="128" x2="675" y2="399" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="583" y1="128" x2="583" y2="232" stroke="#93c5fd" stroke-width="1.2" stroke-dasharray="4 3"/>
    <line x1="583" y1="314" x2="583" y2="399" stroke="#93c5fd" stroke-width="1.2" stroke-dasharray="4 3"/>

    <!-- Baseline: always-small + fallback (cost creeps up) -->
    <circle cx="455" cy="165" r="9" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
    <line x1="466" y1="165" x2="556" y2="165" stroke="#ea580c" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arrowOrange)"/>
    <text x="450" y="151" text-anchor="end" font-size="11.5" font-weight="700" fill="#ea580c">Always-small + fallback</text>
    <text x="300" y="188" font-size="10.5" fill="#56616f">quality stays OK, but cost creeps up as</text>
    <text x="300" y="203" font-size="10.5" fill="#56616f">failures are re-run on the strong model</text>

    <!-- Cheap model -->
    <circle cx="190" cy="335" r="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="208" y="331" font-size="12" font-weight="700" fill="#16a34a">Cheap model</text>
    <text x="208" y="347" font-size="10.5" fill="#56616f">low cost, lower quality</text>

    <!-- Strong model -->
    <circle cx="675" cy="115" r="11" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="675" y="96" text-anchor="middle" font-size="12" font-weight="700" fill="#4f46e5">Strong model</text>

    <!-- MERA -->
    <circle cx="583" cy="115" r="12" fill="#e8f0fe" stroke="#2563eb" stroke-width="2.5"/>
    <circle cx="583" cy="115" r="4" fill="#2563eb"/>
    <text x="583" y="95" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">MERA</text>

    <!-- Hold-quality pull-left arrow (strong -> MERA at same quality) -->
    <line x1="660" y1="115" x2="600" y2="115" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="630" y="108" text-anchor="middle" font-size="9.5" fill="#2563eb">same quality</text>

    <!-- MERA callout box -->
    <line x1="583" y1="232" x2="583" y2="128" stroke="#94a3b8" stroke-width="1"/>
    <rect x="240" y="232" width="410" height="82" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
    <text x="256" y="254" font-size="12.5" font-weight="700" fill="#1f2733">MERA &#8212; learned per-invocation serving</text>
    <text x="256" y="272" font-size="11" fill="#56616f">Input-only router + SkillBook, verifier-backed fallback</text>
    <text x="256" y="289" font-size="11" fill="#1f2733">Cost 51.8% of always-large (&#8722;48.2%) &#183; fallback 4.4%</text>
    <text x="256" y="306" font-size="11" fill="#2563eb">Holds quality, cuts cost &#8212; the point moves LEFT, not up</text>

    <!-- 20-40x bracket -->
    <line x1="190" y1="452" x2="675" y2="452" stroke="#94a3b8" stroke-width="1"/>
    <line x1="190" y1="447" x2="190" y2="452" stroke="#94a3b8" stroke-width="1"/>
    <line x1="675" y1="447" x2="675" y2="452" stroke="#94a3b8" stroke-width="1"/>
    <text x="432" y="467" text-anchor="middle" font-size="11" fill="#56616f">a frontier query can cost an order of magnitude or more than a cheap one</text>

    <!-- Footnotes -->
    <text x="40" y="490" font-size="10.5" fill="#56616f">Quality (vertical) is qualitative: the paper reports NO end-to-end task-success rate. MERA cuts cost at fixed quality &#8212; it does not raise quality.</text>
    <text x="40" y="506" font-size="10" fill="#94a3b8">The 87.3% headline = router decision accuracy on an 832-example held-out set, not task accuracy &#8212; so it is not plotted on this quality axis.</text>
  </g>
</svg>