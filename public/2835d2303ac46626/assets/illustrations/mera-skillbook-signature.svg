<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 470" role="img">
  <title>How the SkillBook works: prompt-signature lookup over (signature, model) statistics</title>
  <desc>An incoming prompt is reduced to a signature of length_tier and semantic_tags, used to look up Laplace-smoothed success rates in a SkillBook table keyed by (signature, model), which then recommends the cheapest adequate model or dispatches a stable template.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
  </defs>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <text x="24" y="30" font-size="18" font-weight="700" fill="#1f2733">How the SkillBook works</text>
    <text x="24" y="50" font-size="12" fill="#56616f">A template layer keyed to recurring LOCAL prompt signatures &#183; CPU-bound success / failure statistics</text>

    <!-- Box 1: incoming prompt -->
    <rect x="24" y="104" width="132" height="92" rx="10" fill="#f7f8fa" stroke="#334155" stroke-width="2"/>
    <text x="90" y="138" font-size="13" font-weight="700" fill="#1f2733" text-anchor="middle">Incoming prompt</text>
    <text x="90" y="160" font-size="10.5" fill="#56616f" text-anchor="middle">serialized prompt</text>
    <text x="90" y="174" font-size="10.5" fill="#56616f" text-anchor="middle">+ local context</text>

    <line x1="156" y1="150" x2="184" y2="150" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Box 2: signature extractor -->
    <rect x="188" y="70" width="262" height="160" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
    <text x="200" y="94" font-size="13" font-weight="700" fill="#1f2733">Signature extractor</text>
    <rect x="198" y="104" width="244" height="22" rx="6" fill="#ffffff" stroke="#2563eb" stroke-width="1"/>
    <text x="204" y="119" font-size="11" font-weight="700" fill="#1f2733">signature = length_tier | semantic_tags</text>
    <text x="200" y="146" font-size="11" fill="#56616f">length_tier &#8712; {S, M, L} by char count:</text>
    <text x="200" y="164" font-size="11" fill="#1f2733">S &lt; 200&#160;&#160;&#183;&#160;&#160;M 200–500&#160;&#160;&#183;&#160;&#160;L &gt; 500</text>
    <text x="200" y="190" font-size="11" fill="#56616f">semantic_tags &#8592; keyword match over tag set:</text>
    <text x="200" y="208" font-size="11" fill="#1f2733">{list, str, num, sort, crypto, advanced, &#8230;}</text>

    <line x1="450" y1="150" x2="466" y2="150" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- Box 3: SkillBook table -->
    <rect x="470" y="70" width="300" height="210" rx="10" fill="#ffffff" stroke="#4f46e5" stroke-width="2"/>
    <text x="482" y="92" font-size="13" font-weight="700" fill="#1f2733">SkillBook table</text>
    <text x="482" y="108" font-size="10.5" fill="#56616f">keyed by (signature, model) &#8594; success / total</text>

    <!-- table header -->
    <rect x="482" y="118" width="276" height="20" fill="#eef2ff"/>
    <text x="488" y="132" font-size="10.5" font-weight="700" fill="#1f2733">signature</text>
    <text x="590" y="132" font-size="10.5" font-weight="700" fill="#1f2733">model</text>
    <text x="636" y="132" font-size="10.5" font-weight="700" fill="#1f2733">s / total</text>
    <text x="688" y="132" font-size="10.5" font-weight="700" fill="#1f2733">rate</text>
    <!-- rows -->
    <line x1="482" y1="160" x2="758" y2="160" stroke="#e2e8f0" stroke-width="1"/>
    <line x1="482" y1="182" x2="758" y2="182" stroke="#e2e8f0" stroke-width="1"/>
    <text x="488" y="154" font-size="10.5" fill="#1f2733">L | list,sort</text>
    <text x="590" y="154" font-size="10.5" fill="#1f2733">strong</text>
    <text x="636" y="154" font-size="10.5" fill="#1f2733">9 / 10</text>
    <text x="688" y="154" font-size="10.5" fill="#1f2733">10/12 = 0.83</text>
    <text x="488" y="176" font-size="10.5" fill="#1f2733">M | str,num</text>
    <text x="590" y="176" font-size="10.5" fill="#1f2733">cheap</text>
    <text x="636" y="176" font-size="10.5" fill="#1f2733">3 / 4</text>
    <text x="688" y="176" font-size="10.5" fill="#1f2733">4/6 = 0.67</text>
    <text x="488" y="198" font-size="10.5" fill="#1f2733">S | str (new)</text>
    <text x="590" y="198" font-size="10.5" fill="#1f2733">cheap</text>
    <text x="636" y="198" font-size="10.5" fill="#1f2733">0 / 0</text>
    <text x="688" y="198" font-size="10.5" fill="#1f2733">1/2 = 0.50</text>

    <line x1="482" y1="210" x2="758" y2="210" stroke="#cbd5e1" stroke-width="1"/>
    <text x="480" y="230" font-size="10.5" font-weight="700" fill="#1f2733">success_rate(sig, model) = (successes + 1) / (total + 2)</text>
    <text x="480" y="248" font-size="10.5" fill="#56616f">a brand-new entry &#8594; 0.5 (agnostic)</text>

    <!-- split connector to outputs -->
    <line x1="620" y1="280" x2="620" y2="296" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="575" y1="296" x2="811" y2="296" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="575" y1="296" x2="575" y2="310" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <line x1="811" y1="296" x2="811" y2="310" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>

    <!-- Output A -->
    <rect x="470" y="312" width="210" height="90" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="480" y="336" font-size="12.5" font-weight="700" fill="#1f2733">Recommend a model</text>
    <text x="480" y="356" font-size="10.5" fill="#1f2733">the cheapest model expected to</text>
    <text x="480" y="372" font-size="10.5" fill="#1f2733">clear the target success rate</text>

    <text x="693" y="362" font-size="12" font-weight="700" fill="#56616f" text-anchor="middle">OR</text>

    <!-- Output B -->
    <rect x="706" y="312" width="210" height="90" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="716" y="336" font-size="12.5" font-weight="700" fill="#1f2733">Dispatch a template</text>
    <text x="716" y="356" font-size="10.5" fill="#1f2733">a stable SkillBook template for</text>
    <text x="716" y="372" font-size="10.5" fill="#1f2733">this recurring local structure</text>

    <!-- left note -->
    <rect x="24" y="312" width="420" height="90" rx="10" fill="#fef9c3" stroke="#ea580c" stroke-width="2"/>
    <text x="36" y="334" font-size="12" font-weight="700" fill="#1f2733">Not a topic taxonomy</text>
    <text x="36" y="354" font-size="10.5" fill="#56616f">Signatures capture LOCAL prompt structure (formatting,</text>
    <text x="36" y="370" font-size="10.5" fill="#56616f">extraction, single-tool argument construction).</text>
    <text x="36" y="388" font-size="10.5" fill="#56616f">Choosing strong / cheap / student is a SEPARATE router.</text>

    <text x="24" y="430" font-size="11" fill="#56616f">CPU-bound bookkeeping &#183; over the 8-cycle run the SkillBook grew to 34 signatures / 120 observations.</text>
  </g>
</svg>