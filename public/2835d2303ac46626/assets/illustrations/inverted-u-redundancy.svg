<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 490" role="img">
  <title>Inverted-U redundancy across U-Net depth</title>
  <desc>Both parameter count and post-pruning sparsity rise toward the U-Net bottleneck and fall back toward the shallow ends, forming a dome. The deep layers and bottleneck are the most prunable; the encoder and decoder ends hold the critical weights.</desc>

  <defs>
    <marker id="axisarrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#94a3b8"/>
    </marker>
    <marker id="peakarrow" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0 0,9 3.5,0 7" fill="#d97706"/>
    </marker>
  </defs>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">

    <!-- Title + subtitle -->
    <text x="475" y="42" text-anchor="middle" font-size="19" font-weight="700" fill="#1f2733">Inverted-U redundancy: capacity peaks where need is lowest</text>
    <text x="475" y="63" text-anchor="middle" font-size="12" fill="#56616f">U-Net weight redundancy as a function of depth</text>

    <!-- Shaded central redundant zone (behind plot + blocks) -->
    <rect x="269" y="95" width="412" height="253" rx="6" fill="#d97706" fill-opacity="0.08" stroke="#d97706" stroke-opacity="0.35" stroke-width="1.5" stroke-dasharray="5 4"/>

    <!-- Axes -->
    <line x1="90" y1="300" x2="90" y2="98" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#axisarrow)"/>
    <line x1="90" y1="300" x2="860" y2="300" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="68" y="200" text-anchor="middle" font-size="11.5" fill="#56616f" transform="rotate(-90,68,200)">relative magnitude</text>

    <!-- Peak callout -->
    <line x1="636" y1="116" x2="486" y2="111" stroke="#d97706" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#peakarrow)"/>
    <circle cx="475" cy="110" r="5" fill="none" stroke="#d97706" stroke-width="1.5"/>
    <text x="642" y="120" text-anchor="start" font-size="11.5" font-weight="600" fill="#b45309">capacity peaks at the bottleneck</text>

    <!-- Sparsity curve (dashed orange) -->
    <path d="M 120 277.2 L 149.6 270.55 Q 179.2 263.9 208.75 252.5 Q 238.3 241.1 267.9 225.9 Q 297.5 210.7 327.1 193.6 Q 356.7 176.5 386.25 159.4 Q 415.8 142.3 445.4 135.65 Q 475 129 504.6 137.55 Q 534.2 146.1 563.75 163.2 Q 593.3 180.3 622.9 197.4 Q 652.5 214.5 682.1 228.75 Q 711.7 243 741.25 254.4 Q 770.8 265.8 800.4 272.45 L 830 279.1" fill="none" stroke="#ea580c" stroke-width="2.5" stroke-dasharray="6 4"/>

    <!-- Parameter-count curve (solid blue) -->
    <path d="M 120 284.8 L 149.6 277.2 Q 179.2 269.6 208.75 256.3 Q 238.3 243 267.9 225.9 Q 297.5 208.8 327.1 189.8 Q 356.7 170.8 386.25 151.8 Q 415.8 132.8 445.4 121.4 Q 475 110 504.6 123.3 Q 534.2 136.6 563.75 155.6 Q 593.3 174.6 622.9 193.6 Q 652.5 212.6 682.1 229.7 Q 711.7 246.8 741.25 259.15 Q 770.8 271.5 800.4 279.1 L 830 286.7" fill="none" stroke="#2563eb" stroke-width="2.5"/>

    <!-- Parameter-count dots -->
    <g fill="#2563eb">
      <circle cx="120" cy="284.8" r="2.4"/>
      <circle cx="179.2" cy="269.6" r="2.4"/>
      <circle cx="238.3" cy="243" r="2.4"/>
      <circle cx="297.5" cy="208.8" r="2.4"/>
      <circle cx="356.7" cy="170.8" r="2.4"/>
      <circle cx="415.8" cy="132.8" r="2.4"/>
      <circle cx="475" cy="110" r="2.4"/>
      <circle cx="534.2" cy="136.6" r="2.4"/>
      <circle cx="593.3" cy="174.6" r="2.4"/>
      <circle cx="652.5" cy="212.6" r="2.4"/>
      <circle cx="711.7" cy="246.8" r="2.4"/>
      <circle cx="770.8" cy="271.5" r="2.4"/>
      <circle cx="830" cy="286.7" r="2.4"/>
    </g>

    <!-- Legend -->
    <rect x="98" y="100" width="264" height="50" rx="8" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1"/>
    <line x1="110" y1="120" x2="146" y2="120" stroke="#2563eb" stroke-width="2.5"/>
    <circle cx="128" cy="120" r="2.4" fill="#2563eb"/>
    <text x="152" y="124" font-size="12" fill="#1f2733">parameter count</text>
    <line x1="110" y1="140" x2="146" y2="140" stroke="#ea580c" stroke-width="2.5" stroke-dasharray="6 4"/>
    <text x="152" y="144" font-size="11.5" fill="#1f2733">post-pruning sparsity (% prunable)</text>

    <!-- Depth blocks: outer (neutral / kept) -->
    <g>
      <rect x="97" y="314" width="46" height="34" rx="6" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
      <text x="120" y="335" text-anchor="middle" font-size="11" font-weight="600" fill="#1f2733">Enc.1</text>
      <rect x="156.2" y="314" width="46" height="34" rx="6" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
      <text x="179.2" y="335" text-anchor="middle" font-size="11" font-weight="600" fill="#1f2733">Enc.2</text>
      <rect x="215.3" y="314" width="46" height="34" rx="6" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
      <text x="238.3" y="335" text-anchor="middle" font-size="11" font-weight="600" fill="#1f2733">Enc.3</text>

      <rect x="688.7" y="314" width="46" height="34" rx="6" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
      <text x="711.7" y="335" text-anchor="middle" font-size="11" font-weight="600" fill="#1f2733">Dec.3</text>
      <rect x="747.8" y="314" width="46" height="34" rx="6" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
      <text x="770.8" y="335" text-anchor="middle" font-size="11" font-weight="600" fill="#1f2733">Dec.2</text>
      <rect x="807" y="314" width="46" height="34" rx="6" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
      <text x="830" y="335" text-anchor="middle" font-size="11" font-weight="600" fill="#1f2733">Dec.1</text>
    </g>

    <!-- Depth blocks: central (amber / prunable) -->
    <g>
      <rect x="274.5" y="314" width="46" height="34" rx="6" fill="#fdecd6" stroke="#d97706" stroke-width="1.5" stroke-opacity="0.7"/>
      <text x="297.5" y="335" text-anchor="middle" font-size="11" font-weight="600" fill="#1f2733">Enc.4</text>
      <rect x="333.7" y="314" width="46" height="34" rx="6" fill="#fdecd6" stroke="#d97706" stroke-width="1.5" stroke-opacity="0.7"/>
      <text x="356.7" y="335" text-anchor="middle" font-size="11" font-weight="600" fill="#1f2733">Enc.5</text>
      <rect x="392.8" y="314" width="46" height="34" rx="6" fill="#fdecd6" stroke="#d97706" stroke-width="1.5" stroke-opacity="0.7"/>
      <text x="415.8" y="335" text-anchor="middle" font-size="11" font-weight="600" fill="#1f2733">Enc.6</text>

      <rect x="511.2" y="314" width="46" height="34" rx="6" fill="#fdecd6" stroke="#d97706" stroke-width="1.5" stroke-opacity="0.7"/>
      <text x="534.2" y="335" text-anchor="middle" font-size="11" font-weight="600" fill="#1f2733">Dec.6</text>
      <rect x="570.3" y="314" width="46" height="34" rx="6" fill="#fdecd6" stroke="#d97706" stroke-width="1.5" stroke-opacity="0.7"/>
      <text x="593.3" y="335" text-anchor="middle" font-size="11" font-weight="600" fill="#1f2733">Dec.5</text>
      <rect x="629.5" y="314" width="46" height="34" rx="6" fill="#fdecd6" stroke="#d97706" stroke-width="1.5" stroke-opacity="0.7"/>
      <text x="652.5" y="335" text-anchor="middle" font-size="11" font-weight="600" fill="#1f2733">Dec.4</text>

      <!-- Bottleneck -->
      <rect x="452" y="314" width="46" height="34" rx="6" fill="#f9c97f" stroke="#d97706" stroke-width="2"/>
      <text x="475" y="335" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2733">B</text>
    </g>

    <!-- Brackets -->
    <path d="M 97 361 L 97 356 L 202.2 356 L 202.2 361" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
    <path d="M 274.5 361 L 274.5 356 L 675.5 356 L 675.5 361" fill="none" stroke="#d97706" stroke-width="1.5"/>
    <path d="M 747.8 361 L 747.8 356 L 853 356 L 853 361" fill="none" stroke="#94a3b8" stroke-width="1.5"/>

    <!-- Central bracket label -->
    <text x="475" y="379" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b45309">most redundant / most prunable</text>
    <text x="475" y="394" text-anchor="middle" font-size="10.5" fill="#56616f">(deep encoder + bottleneck + deep decoder)</text>

    <!-- Left lock -->
    <path d="M 145.6 370 L 145.6 367 A 4 4 0 0 1 153.6 367 L 153.6 370" fill="none" stroke="#475569" stroke-width="1.6"/>
    <rect x="143.6" y="370" width="12" height="8.5" rx="2" fill="#475569"/>
    <circle cx="149.6" cy="374" r="1.1" fill="#f7f8fa"/>
    <text x="149.6" y="392" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1f2733">critical weights kept</text>

    <!-- Right lock -->
    <path d="M 796.4 370 L 796.4 367 A 4 4 0 0 1 804.4 367 L 804.4 370" fill="none" stroke="#475569" stroke-width="1.6"/>
    <rect x="794.4" y="370" width="12" height="8.5" rx="2" fill="#475569"/>
    <circle cx="800.4" cy="374" r="1.1" fill="#f7f8fa"/>
    <text x="800.4" y="392" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1f2733">critical weights kept</text>

    <!-- Footnote -->
    <text x="475" y="430" text-anchor="middle" font-size="11.5" fill="#1f2733">Parameter count and post-pruning sparsity both peak at the bottleneck.</text>
    <text x="475" y="448" text-anchor="middle" font-size="11" fill="#56616f">Consistent across all four datasets (Fig 2b).</text>

  </g>
</svg>
