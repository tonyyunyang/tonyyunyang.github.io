<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 370" role="img">
  <title>DDPM: Forward &amp; Reverse</title>
  <desc>Denoising Diffusion Probabilistic Models showing the forward process (clean image to pure noise) and the reverse process (learned denoising from noise back to clean image), with the training objective of predicting the added noise.</desc>

  <defs>
    <marker id="arrow-fwd" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-rev" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#1f2733">DDPM: Forward &amp; Reverse</text>

  <!-- ── FORWARD ROW (top) ── -->
  <!-- Row label (above the row so it isn't covered by the boxes) -->
  <text x="48" y="72" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#56616f">Forward q</text>

  <!-- x0 box -->
  <rect x="48" y="80" width="88" height="56" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="92" y="105" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#1f2733">x₀</text>
  <text x="92" y="122" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">clean image</text>

  <!-- x0 → x1 arrow -->
  <line x1="136" y1="108" x2="186" y2="108" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-fwd)"/>

  <!-- x1 box -->
  <rect x="188" y="80" width="88" height="56" rx="10" fill="#eef1f6" stroke="#94a3b8" stroke-width="2"/>
  <text x="232" y="105" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#1f2733">x₁</text>
  <text x="232" y="122" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">slightly noisy</text>

  <!-- x1 → ... arrow -->
  <line x1="276" y1="108" x2="326" y2="108" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-fwd)"/>

  <!-- ellipsis -->
  <text x="352" y="113" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" fill="#94a3b8">…</text>

  <!-- ... → xT arrow -->
  <line x1="376" y1="108" x2="426" y2="108" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-fwd)"/>

  <!-- xT box -->
  <rect x="428" y="80" width="88" height="56" rx="10" fill="#eef1f6" stroke="#94a3b8" stroke-width="2"/>
  <text x="472" y="105" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#1f2733">x_T</text>
  <text x="472" y="122" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10" fill="#56616f">Gaussian noise</text>

  <!-- Forward label on arrow (above the middle of the forward arrows) -->
  <text x="295" y="74" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#2563eb">q(x_t | x_{t−1}): add noise</text>

  <!-- ── REVERSE ROW (bottom) ── -->
  <!-- Row label (above the row so it isn't covered by the boxes) -->
  <text x="48" y="197" text-anchor="start" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#56616f">Reverse p_θ</text>

  <!-- xT (bottom, same column as top xT) -->
  <rect x="428" y="205" width="88" height="56" rx="10" fill="#eef1f6" stroke="#94a3b8" stroke-width="2"/>
  <text x="472" y="230" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#1f2733">x_T</text>
  <text x="472" y="247" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">pure noise (start)</text>

  <!-- xT → ... arrow (reverse, right-to-left) -->
  <line x1="428" y1="233" x2="382" y2="233" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-rev)"/>

  <!-- ellipsis bottom -->
  <text x="352" y="238" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="18" fill="#94a3b8">…</text>

  <!-- ... → x1 arrow (reverse) -->
  <line x1="326" y1="233" x2="280" y2="233" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-rev)"/>

  <!-- x1 (bottom) -->
  <rect x="188" y="205" width="88" height="56" rx="10" fill="#eef1f6" stroke="#94a3b8" stroke-width="2"/>
  <text x="232" y="230" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#1f2733">x₁</text>
  <text x="232" y="247" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">almost clean</text>

  <!-- x1 → x0 arrow (reverse) -->
  <line x1="188" y1="233" x2="138" y2="233" stroke="#7c3aed" stroke-width="2" marker-end="url(#arrow-rev)"/>

  <!-- x0 (bottom) -->
  <rect x="48" y="205" width="88" height="56" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="92" y="230" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#1f2733">x₀</text>
  <text x="92" y="247" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">recovered image</text>

  <!-- Reverse label (below the reverse row so it clears the x1 box) -->
  <text x="295" y="284" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#7c3aed">p_θ(x_{t−1} | x_t): learned denoising</text>

  <!-- ── Vertical connector lines (xT top ↔ xT bottom, x0 top ↔ x0 bottom) ── -->
  <line x1="472" y1="136" x2="472" y2="205" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="92" y1="136" x2="92" y2="205" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- ── Training objective note ── -->
  <rect x="520" y="115" width="256" height="52" rx="10" fill="#eef1f6" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="648" y="135" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#1f2733">Training Objective</text>
  <text x="648" y="151" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">predict the added noise</text>
  <text x="648" y="165" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">(denoising score matching)</text>

  <!-- connector from the x_T box (end of forward / start of reverse) to the note -->
  <line x1="516" y1="108" x2="520" y2="141" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 3"/>

</svg>
