<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 944 620" role="img" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title>Multi-faceted emotion-fusion model</title>
  <desc>Two periocular video streams (left and right eye, via a weight-shared ViViT) and a 4D eye-movement series (via a time-series transformer) are projected into three 256-d modality tokens, fused by a self-attention encoder, and classified into seven emotions.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowT" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#0d9488"/></marker>
    <marker id="arrowG" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/></marker>
    <marker id="arrowP" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto"><polygon points="0 0, 9 3.5, 0 7" fill="#7c3aed"/></marker>
  </defs>

  <!-- Title -->
  <text x="472" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1f2733">Multi-faceted emotion-fusion model</text>
  <text x="472" y="52" text-anchor="middle" font-size="11.5" fill="#56616f">periocular video + eye-movement &#8594; self-attention fusion &#8594; 7-way emotion</text>

  <!-- Legend -->
  <rect x="688" y="58" width="232" height="78" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <rect x="702" y="70" width="16" height="14" rx="3" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="726" y="82" font-size="11" fill="#1f2733">Periocular video path</text>
  <rect x="702" y="94" width="16" height="14" rx="3" fill="#e6f7f4" stroke="#0d9488" stroke-width="2"/>
  <text x="726" y="106" font-size="11" fill="#1f2733">Eye-movement path</text>
  <rect x="702" y="118" width="16" height="14" rx="3" fill="#f3f0fd" stroke="#7c3aed" stroke-width="2"/>
  <text x="726" y="130" font-size="11" fill="#1f2733">Emotion class output</text>

  <!-- ============ INPUTS ============ -->
  <!-- Periocular video input -->
  <rect x="24" y="96" width="204" height="104" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <rect x="100" y="108" width="18" height="14" rx="3" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <circle cx="109" cy="115" r="3" fill="#94a3b8"/>
  <rect x="124" y="108" width="18" height="14" rx="3" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
  <circle cx="133" cy="115" r="3" fill="#94a3b8"/>
  <text x="126" y="146" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2733">Periocular near-eye video</text>
  <text x="126" y="164" text-anchor="middle" font-size="10.5" fill="#56616f">L + R eyes &#183; 400 &#215; 400 px</text>
  <text x="126" y="181" text-anchor="middle" font-size="10.5" fill="#56616f">120 fps capture &#8594; 10 fps train</text>

  <!-- Eye-movement input -->
  <rect x="24" y="300" width="204" height="104" rx="10" fill="#e6f7f4" stroke="#0d9488" stroke-width="2"/>
  <polyline points="96 316 108 311 120 319 132 312 144 318 156 313" fill="none" stroke="#0d9488" stroke-width="1.6"/>
  <polyline points="96 324 108 322 120 326 132 323 144 325 156 322" fill="none" stroke="#94a3b8" stroke-width="1.4"/>
  <text x="126" y="350" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2733">Eye-movement (4D)</text>
  <text x="126" y="368" text-anchor="middle" font-size="10.5" fill="#56616f">2D gaze + L / R pupil diameter</text>
  <text x="126" y="385" text-anchor="middle" font-size="10.5" fill="#56616f">gaze 240 Hz &#183; pupil 120 Hz</text>

  <!-- ============ ENCODERS ============ -->
  <!-- ViViT -->
  <rect x="256" y="100" width="232" height="98" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="372" y="124" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2733">ViViT (Video Vision Transformer)</text>
  <text x="372" y="144" text-anchor="middle" font-size="10.5" fill="#56616f">shared L / R weights</text>
  <text x="372" y="162" text-anchor="middle" font-size="10.5" fill="#56616f">hidden 256 &#183; 8 heads</text>
  <text x="372" y="180" text-anchor="middle" font-size="10.5" fill="#56616f">3 spatial + 1 temporal layer</text>

  <!-- Time-series transformer -->
  <rect x="256" y="302" width="232" height="92" rx="10" fill="#e6f7f4" stroke="#0d9488" stroke-width="2"/>
  <text x="372" y="332" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2733">Time-series Transformer</text>
  <text x="372" y="352" text-anchor="middle" font-size="10.5" fill="#56616f">dim 64 &#183; 1 layer &#183; 8 heads</text>
  <text x="372" y="372" text-anchor="middle" font-size="10.5" fill="#56616f">reads the 4D eye-movement series</text>

  <!-- input -> encoder arrows -->
  <line x1="228" y1="148" x2="252" y2="149" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="228" y1="352" x2="252" y2="348" stroke="#0d9488" stroke-width="2" marker-end="url(#arrowT)"/>

  <!-- ============ TOKEN MATRIX ============ -->
  <text x="591" y="378" text-anchor="middle" font-size="11" fill="#56616f">256 &#215; 3 (three modality tokens)</text>
  <rect x="512" y="126" width="158" height="236" rx="10" fill="#f7f8fa" stroke="#94a3b8" stroke-width="2"/>
  <!-- row 1: left-video -->
  <rect x="522" y="134" width="138" height="68" rx="8" fill="#e8f0fe" stroke="#2563eb" stroke-width="1.6"/>
  <text x="591" y="162" text-anchor="middle" font-size="11" font-weight="700" fill="#1f2733">left-video feature</text>
  <text x="591" y="180" text-anchor="middle" font-size="10" fill="#56616f">linear proj &#8594; 256-d</text>
  <!-- row 2: right-video -->
  <rect x="522" y="210" width="138" height="68" rx="8" fill="#e8f0fe" stroke="#2563eb" stroke-width="1.6"/>
  <text x="591" y="238" text-anchor="middle" font-size="11" font-weight="700" fill="#1f2733">right-video feature</text>
  <text x="591" y="256" text-anchor="middle" font-size="10" fill="#56616f">linear proj &#8594; 256-d</text>
  <!-- row 3: eye-movement -->
  <rect x="522" y="286" width="138" height="68" rx="8" fill="#e6f7f4" stroke="#0d9488" stroke-width="1.6"/>
  <text x="591" y="314" text-anchor="middle" font-size="11" font-weight="700" fill="#1f2733">eye-movement feature</text>
  <text x="591" y="332" text-anchor="middle" font-size="10" fill="#56616f">linear proj &#8594; 256-d</text>

  <!-- encoder -> token arrows -->
  <line x1="488" y1="132" x2="512" y2="166" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="488" y1="166" x2="512" y2="242" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="488" y1="348" x2="512" y2="320" stroke="#0d9488" stroke-width="2" marker-end="url(#arrowT)"/>

  <!-- tokens -> fusion -->
  <line x1="670" y1="240" x2="690" y2="240" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- ============ FUSION ============ -->
  <!-- callout above fusion -->
  <text x="805" y="152" text-anchor="middle" font-size="10.5" fill="#56616f">self-attention can down-weight</text>
  <text x="805" y="166" text-anchor="middle" font-size="10.5" fill="#56616f">a noisy stream per instance</text>
  <line x1="805" y1="170" x2="805" y2="182" stroke="#94a3b8" stroke-width="1.4" marker-end="url(#arrowG)"/>

  <rect x="690" y="182" width="230" height="116" rx="10" fill="#eef4ff" stroke="#2563eb" stroke-width="2.5"/>
  <text x="805" y="226" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2733">Transformer fusion encoder</text>
  <text x="805" y="248" text-anchor="middle" font-size="11" fill="#56616f">self-attention across the 3 tokens</text>

  <!-- fusion -> fused feature -> FC (elbow connector) -->
  <polyline points="805 298 805 388 472 388 472 408" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrowG)"/>
  <text x="770" y="382" text-anchor="middle" font-size="11" fill="#1f2733">fused feature f_m</text>

  <!-- ============ HEAD ============ -->
  <rect x="398" y="408" width="148" height="48" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="472" y="430" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2733">FC + softmax</text>
  <text x="472" y="448" text-anchor="middle" font-size="10.5" fill="#56616f">7-way classifier</text>

  <!-- fan-out to 7 emotion chips -->
  <line x1="472" y1="456" x2="94"  y2="538" stroke="#7c3aed" stroke-width="1.3" marker-end="url(#arrowP)"/>
  <line x1="472" y1="456" x2="220" y2="538" stroke="#7c3aed" stroke-width="1.3" marker-end="url(#arrowP)"/>
  <line x1="472" y1="456" x2="346" y2="538" stroke="#7c3aed" stroke-width="1.3" marker-end="url(#arrowP)"/>
  <line x1="472" y1="456" x2="472" y2="538" stroke="#7c3aed" stroke-width="1.3" marker-end="url(#arrowP)"/>
  <line x1="472" y1="456" x2="598" y2="538" stroke="#7c3aed" stroke-width="1.3" marker-end="url(#arrowP)"/>
  <line x1="472" y1="456" x2="724" y2="538" stroke="#7c3aed" stroke-width="1.3" marker-end="url(#arrowP)"/>
  <line x1="472" y1="456" x2="850" y2="538" stroke="#7c3aed" stroke-width="1.3" marker-end="url(#arrowP)"/>

  <!-- chips -->
  <rect x="36"  y="540" width="116" height="46" rx="10" fill="#f3f0fd" stroke="#7c3aed" stroke-width="1.8"/>
  <text x="94"  y="568" text-anchor="middle" font-size="11" fill="#1f2733">Happiness</text>
  <rect x="162" y="540" width="116" height="46" rx="10" fill="#f3f0fd" stroke="#7c3aed" stroke-width="1.8"/>
  <text x="220" y="568" text-anchor="middle" font-size="11" fill="#1f2733">Sadness</text>
  <rect x="288" y="540" width="116" height="46" rx="10" fill="#f3f0fd" stroke="#7c3aed" stroke-width="1.8"/>
  <text x="346" y="568" text-anchor="middle" font-size="11" fill="#1f2733">Fear</text>
  <rect x="414" y="540" width="116" height="46" rx="10" fill="#f3f0fd" stroke="#7c3aed" stroke-width="1.8"/>
  <text x="472" y="568" text-anchor="middle" font-size="11" fill="#1f2733">Disgust</text>
  <rect x="540" y="540" width="116" height="46" rx="10" fill="#f3f0fd" stroke="#7c3aed" stroke-width="1.8"/>
  <text x="598" y="568" text-anchor="middle" font-size="11" fill="#1f2733">Anger</text>
  <rect x="666" y="540" width="116" height="46" rx="10" fill="#f3f0fd" stroke="#7c3aed" stroke-width="1.8"/>
  <text x="724" y="568" text-anchor="middle" font-size="11" fill="#1f2733">Surprise</text>
  <rect x="792" y="540" width="116" height="46" rx="10" fill="#f3f0fd" stroke="#7c3aed" stroke-width="1.8"/>
  <text x="850" y="568" text-anchor="middle" font-size="11" fill="#1f2733">Neutral</text>
</svg>
