<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" role="img">
  <title>Routing granularity: query-level vs step-level</title>
  <desc>Two side-by-side panels. Left: older query-level routing where one prompt goes to a router that picks one model from a cheap-to-strong pool, producing one answer scored by a single LLM judge. Right: step-level routing in TwinRouterBench, where one agent task expands into a chain of calls and a tiny router picks a tier at each step; a cheap pick at step 2 silently breaks step 5, so the metric is the cheapest per-step tier that still preserves end-to-end success.</desc>

  <defs>
    <marker id="arw" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arwa" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#b45309"/>
    </marker>
    <marker id="arwg" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">

    <!-- Title + subtitle -->
    <text x="480" y="30" text-anchor="middle" font-size="19" font-weight="700" fill="#1f2733">Routing granularity: query-level vs step-level</text>
    <text x="480" y="50" text-anchor="middle" font-size="12" fill="#56616f">older benchmarks grade one model per prompt; TwinRouterBench routes a tier at every step under end-to-end success</text>

    <!-- ===== Region backgrounds ===== -->
    <rect x="24" y="70" width="446" height="406" rx="10" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5 4"/>
    <rect x="490" y="70" width="446" height="406" rx="10" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5 4"/>

    <!-- ============================================================ -->
    <!-- LEFT: query-level routing -->
    <!-- ============================================================ -->
    <text x="247" y="96" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2733">Query-level routing</text>
    <text x="247" y="112" text-anchor="middle" font-size="11" fill="#56616f">(older benchmarks)</text>

    <!-- user prompt -->
    <rect x="172" y="126" width="150" height="38" rx="8" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
    <text x="247" y="150" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2733">user prompt</text>
    <line x1="247" y1="164" x2="247" y2="182" stroke="#2563eb" stroke-width="2" marker-end="url(#arw)"/>

    <!-- router -->
    <rect x="202" y="182" width="90" height="30" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <text x="247" y="201" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">router</text>
    <line x1="247" y1="212" x2="247" y2="230" stroke="#2563eb" stroke-width="2" marker-end="url(#arw)"/>

    <!-- model pool -->
    <rect x="167" y="230" width="160" height="104" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="247" y="247" text-anchor="middle" font-size="10" font-weight="600" fill="#56616f">model pool</text>
    <rect x="179" y="252" width="136" height="16" rx="4" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
    <text x="247" y="264" text-anchor="middle" font-size="9" fill="#56616f">cheap</text>
    <rect x="179" y="272" width="136" height="16" rx="4" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
    <text x="247" y="284" text-anchor="middle" font-size="9" fill="#56616f">small</text>
    <rect x="179" y="292" width="136" height="16" rx="4" fill="#e8f0fe" stroke="#2563eb" stroke-width="1.5"/>
    <text x="247" y="304" text-anchor="middle" font-size="9" font-weight="600" fill="#2563eb">large</text>
    <rect x="179" y="312" width="136" height="16" rx="4" fill="#ffffff" stroke="#94a3b8" stroke-width="1"/>
    <text x="247" y="324" text-anchor="middle" font-size="9" fill="#56616f">strong</text>
    <text x="334" y="304" text-anchor="start" font-size="9" font-weight="600" fill="#2563eb">&#8592; picked</text>

    <line x1="247" y1="334" x2="247" y2="352" stroke="#2563eb" stroke-width="2" marker-end="url(#arw)"/>

    <!-- one answer -->
    <rect x="177" y="352" width="140" height="36" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="247" y="375" text-anchor="middle" font-size="11" font-weight="600" fill="#1f2733">one answer</text>
    <line x1="247" y1="388" x2="247" y2="406" stroke="#2563eb" stroke-width="2" marker-end="url(#arw)"/>

    <!-- judge -->
    <rect x="167" y="406" width="160" height="40" rx="8" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
    <text x="247" y="424" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">LLM judge / grade</text>
    <text x="247" y="438" text-anchor="middle" font-size="9" fill="#56616f">one graded answer</text>

    <!-- caption -->
    <text x="247" y="466" text-anchor="middle" font-size="10" fill="#56616f">one prompt, one pick, one graded answer.</text>

    <!-- ============================================================ -->
    <!-- RIGHT: step-level routing -->
    <!-- ============================================================ -->
    <text x="713" y="96" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2733">Step-level routing</text>
    <text x="713" y="112" text-anchor="middle" font-size="11" fill="#56616f">(TwinRouterBench)</text>

    <!-- agent task -->
    <rect x="638" y="126" width="150" height="36" rx="8" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
    <text x="713" y="149" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2733">agent task</text>
    <line x1="713" y1="162" x2="713" y2="176" stroke="#2563eb" stroke-width="2" marker-end="url(#arw)"/>
    <text x="713" y="190" text-anchor="middle" font-size="9" fill="#56616f">expands into a sequential call chain</text>

    <!-- routers row (tiny router picks a tier at each step) -->
    <rect x="505" y="198" width="44" height="20" rx="6" fill="#e8f0fe" stroke="#2563eb" stroke-width="1"/>
    <text x="527" y="212" text-anchor="middle" font-size="8" font-weight="600" fill="#2563eb">route</text>
    <line x1="527" y1="218" x2="527" y2="232" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arw)"/>

    <rect x="571" y="198" width="44" height="20" rx="6" fill="#fff7ed" stroke="#b45309" stroke-width="1.2"/>
    <text x="593" y="212" text-anchor="middle" font-size="8" font-weight="600" fill="#b45309">route</text>
    <line x1="593" y1="218" x2="593" y2="232" stroke="#b45309" stroke-width="1.5" marker-end="url(#arwa)"/>

    <rect x="637" y="198" width="44" height="20" rx="6" fill="#e8f0fe" stroke="#2563eb" stroke-width="1"/>
    <text x="659" y="212" text-anchor="middle" font-size="8" font-weight="600" fill="#2563eb">route</text>
    <line x1="659" y1="218" x2="659" y2="232" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arw)"/>

    <rect x="703" y="198" width="44" height="20" rx="6" fill="#e8f0fe" stroke="#2563eb" stroke-width="1"/>
    <text x="725" y="212" text-anchor="middle" font-size="8" font-weight="600" fill="#2563eb">route</text>
    <line x1="725" y1="218" x2="725" y2="232" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arw)"/>

    <rect x="769" y="198" width="44" height="20" rx="6" fill="#e8f0fe" stroke="#2563eb" stroke-width="1"/>
    <text x="791" y="212" text-anchor="middle" font-size="8" font-weight="600" fill="#2563eb">route</text>
    <line x1="791" y1="218" x2="791" y2="232" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arw)"/>

    <!-- step chain -->
    <rect x="502" y="232" width="50" height="42" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="527" y="252" text-anchor="middle" font-size="10" font-weight="600" fill="#1f2733">step 1</text>
    <text x="527" y="265" text-anchor="middle" font-size="8.5" fill="#15803d">&#10003; ok</text>
    <line x1="552" y1="253" x2="568" y2="253" stroke="#2563eb" stroke-width="2" marker-end="url(#arw)"/>

    <rect x="568" y="232" width="50" height="42" rx="8" fill="#fff7ed" stroke="#b45309" stroke-width="2"/>
    <text x="593" y="252" text-anchor="middle" font-size="10" font-weight="600" fill="#b45309">step 2</text>
    <text x="593" y="265" text-anchor="middle" font-size="8.5" font-weight="600" fill="#b45309">cheap</text>
    <line x1="618" y1="253" x2="634" y2="253" stroke="#2563eb" stroke-width="2" marker-end="url(#arw)"/>

    <rect x="634" y="232" width="50" height="42" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="659" y="252" text-anchor="middle" font-size="10" font-weight="600" fill="#1f2733">step 3</text>
    <text x="659" y="265" text-anchor="middle" font-size="8.5" fill="#15803d">&#10003; ok</text>
    <line x1="684" y1="253" x2="700" y2="253" stroke="#2563eb" stroke-width="2" marker-end="url(#arw)"/>

    <rect x="700" y="232" width="50" height="42" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="725" y="252" text-anchor="middle" font-size="10" font-weight="600" fill="#1f2733">step 4</text>
    <text x="725" y="265" text-anchor="middle" font-size="8.5" fill="#15803d">&#10003; ok</text>
    <line x1="750" y1="253" x2="766" y2="253" stroke="#2563eb" stroke-width="2" marker-end="url(#arw)"/>

    <rect x="766" y="232" width="50" height="42" rx="8" fill="#fff7ed" stroke="#b45309" stroke-width="2"/>
    <text x="791" y="252" text-anchor="middle" font-size="10" font-weight="600" fill="#b45309">step 5</text>
    <text x="791" y="265" text-anchor="middle" font-size="8.5" font-weight="600" fill="#b45309">&#215; FAIL</text>
    <line x1="816" y1="253" x2="832" y2="253" stroke="#b45309" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#arwa)"/>

    <rect x="832" y="232" width="56" height="42" rx="8" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 3"/>
    <text x="860" y="252" text-anchor="middle" font-size="10" font-weight="600" fill="#94a3b8">done</text>
    <text x="860" y="265" text-anchor="middle" font-size="8.5" fill="#b45309">(blocked)</text>

    <!-- curved dashed amber arrow: cheap pick at step 2 breaks step 5 -->
    <path d="M593,274 C 603,330 781,330 791,274" fill="none" stroke="#b45309" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#arwa)"/>
    <rect x="556" y="312" width="274" height="16" fill="#f7f8fa"/>
    <text x="693" y="324" text-anchor="middle" font-size="10" font-weight="600" fill="#b45309">a cheap call here silently breaks a later step</text>

    <!-- why-it's-harder note -->
    <rect x="556" y="346" width="320" height="54" rx="8" fill="#fff7ed" stroke="#b45309" stroke-width="1.5"/>
    <text x="716" y="366" text-anchor="middle" font-size="9.5" font-weight="700" fill="#b45309">why it's the harder problem</text>
    <text x="716" y="382" text-anchor="middle" font-size="9.5" fill="#1f2733">each step's tier choice constrains every later step</text>
    <text x="716" y="395" text-anchor="middle" font-size="9" fill="#56616f">credit and blame must be tracked across the whole chain</text>

    <!-- caption -->
    <text x="713" y="464" text-anchor="middle" font-size="10" fill="#56616f">score the cheapest tier that still preserves end-to-end success.</text>

    <!-- center vs badge -->
    <circle cx="480" cy="270" r="16" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="480" y="274" text-anchor="middle" font-size="11" font-weight="700" fill="#56616f">vs</text>

  </g>
</svg>
