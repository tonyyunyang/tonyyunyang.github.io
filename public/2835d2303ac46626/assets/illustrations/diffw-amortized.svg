<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" role="img">
  <title>The ~3.2x speedup is amortized, not free</title>
  <desc>A two-phase amortization timeline. Phase 1 (amber): one expensive run fine-tuning GPT-2 for 20,000 epochs keeping 20 checkpoints, then training the forecaster, marked as the full training cost paid once. A divider amortizes the trajectory collection. Phase 2 (green): three short tasks A, B and C each forecast a future weight state about 3.2x faster with no run to convergence. Footnote: it wins only across many related tasks and the paper gives no break-even.</desc>

  <defs>
    <marker id="arw-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#b45309"/>
    </marker>
    <marker id="arw-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#15803d"/>
    </marker>
    <marker id="arw-slate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">

    <!-- Title + subtitle -->
    <text x="480" y="34" text-anchor="middle" font-size="19" font-weight="700" fill="#1f2733">The ~3.2x is amortized, not free</text>
    <text x="480" y="54" text-anchor="middle" font-size="12" fill="#56616f">One real, expensive training run, then many cheap per-task future-weight forecasts</text>

    <!-- ===== Region backgrounds ===== -->
    <rect x="24" y="80" width="372" height="310" rx="10" fill="#fff7ed" stroke="#b45309" stroke-width="1" stroke-dasharray="5 4"/>
    <rect x="564" y="80" width="372" height="310" rx="10" fill="#f0fdf4" stroke="#15803d" stroke-width="1" stroke-dasharray="5 4"/>

    <!-- ===== Divider (drawn behind the chip) ===== -->
    <line x1="480" y1="96" x2="480" y2="376" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4"/>

    <!-- ============================================================ -->
    <!-- PHASE 1 (amber): Pay once, upfront -->
    <!-- ============================================================ -->
    <text x="210" y="108" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b45309">PHASE 1 &#183; Pay once, upfront</text>

    <!-- long, expensive cost bar -->
    <rect x="44" y="144" width="332" height="52" rx="8" fill="#fff1e0" stroke="#b45309" stroke-width="2"/>
    <text x="210" y="167" text-anchor="middle" font-size="11" font-weight="600" fill="#1f2733">Fine-tune GPT-2 &#183; 20,000 epochs</text>
    <text x="210" y="184" text-anchor="middle" font-size="9.5" fill="#b45309">keep 20 checkpoints (collect the trajectory)</text>

    <!-- down arrow into forecaster -->
    <line x1="210" y1="198" x2="210" y2="216" stroke="#b45309" stroke-width="2" marker-end="url(#arw-amber)"/>

    <!-- train the forecaster box -->
    <rect x="110" y="220" width="200" height="38" rx="8" fill="#fff7ed" stroke="#b45309" stroke-width="2"/>
    <text x="210" y="239" text-anchor="middle" font-size="11.5" font-weight="700" fill="#b45309">train the forecaster</text>
    <text x="210" y="252" text-anchor="middle" font-size="8.5" fill="#56616f">(the diffusion model F)</text>

    <!-- full training cost (real) chip -->
    <rect x="78" y="300" width="264" height="46" rx="10" fill="#ffffff" stroke="#b45309" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="210" y="322" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">full training cost (real)</text>
    <text x="210" y="337" text-anchor="middle" font-size="9.5" fill="#56616f">paid one time, up front</text>

    <!-- ============================================================ -->
    <!-- DIVIDER CHIP: amortize the trajectory collection -->
    <!-- ============================================================ -->
    <!-- feed from forecaster into the amortize chip -->
    <line x1="314" y1="236" x2="406" y2="222" stroke="#15803d" stroke-width="2" marker-end="url(#arw-green)"/>

    <rect x="410" y="188" width="140" height="56" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5 4"/>
    <text x="480" y="212" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1f2733">amortize the</text>
    <text x="480" y="228" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2563eb">trajectory collection</text>

    <!-- fan-out: one collected trajectory reused for each new task -->
    <path d="M551,210 C 566,180 568,158 580,144" fill="none" stroke="#15803d" stroke-width="1.6" marker-end="url(#arw-green)"/>
    <line x1="551" y1="216" x2="580" y2="213" stroke="#15803d" stroke-width="1.6" marker-end="url(#arw-green)"/>
    <path d="M551,222 C 566,252 568,270 580,283" fill="none" stroke="#15803d" stroke-width="1.6" marker-end="url(#arw-green)"/>

    <!-- ============================================================ -->
    <!-- PHASE 2 (green): Then cheap, per new related task -->
    <!-- ============================================================ -->
    <text x="750" y="108" text-anchor="middle" font-size="11.5" font-weight="700" fill="#15803d">PHASE 2 &#183; Then cheap, per new related task</text>

    <!-- Task A -->
    <rect x="584" y="128" width="108" height="30" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
    <text x="638" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">task A</text>
    <rect x="704" y="128" width="96" height="30" rx="15" fill="#15803d"/>
    <text x="752" y="148" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">~3.2x faster</text>
    <text x="692" y="174" text-anchor="middle" font-size="8.5" fill="#56616f">forecast a future weight state (no run to convergence)</text>

    <!-- Task B -->
    <rect x="584" y="198" width="108" height="30" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
    <text x="638" y="218" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">task B</text>
    <rect x="704" y="198" width="96" height="30" rx="15" fill="#15803d"/>
    <text x="752" y="218" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">~3.2x faster</text>
    <text x="692" y="244" text-anchor="middle" font-size="8.5" fill="#56616f">forecast a future weight state (no run to convergence)</text>

    <!-- Task C -->
    <rect x="584" y="268" width="108" height="30" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
    <text x="638" y="288" text-anchor="middle" font-size="12" font-weight="700" fill="#15803d">task C</text>
    <rect x="704" y="268" width="96" height="30" rx="15" fill="#15803d"/>
    <text x="752" y="288" text-anchor="middle" font-size="10" font-weight="700" fill="#ffffff">~3.2x faster</text>
    <text x="692" y="314" text-anchor="middle" font-size="8.5" fill="#56616f">forecast a future weight state (no run to convergence)</text>

    <!-- reuse note -->
    <text x="750" y="350" text-anchor="middle" font-size="9.5" fill="#15803d">same trajectory reused &#8594; no new run to convergence</text>

    <!-- ============================================================ -->
    <!-- FOOTNOTE -->
    <!-- ============================================================ -->
    <rect x="24" y="404" width="912" height="58" rx="10" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5 4"/>
    <text x="480" y="430" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1f2733">Wins when you fine-tune MANY related tasks.</text>
    <text x="480" y="448" text-anchor="middle" font-size="11" fill="#56616f">The paper quantifies NO break-even threshold &#8212; do not invent one.</text>

  </g>
</svg>
