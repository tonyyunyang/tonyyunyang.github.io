<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 390" role="img">
  <title>Diffusion Weights: Predicting Future Checkpoints</title>
  <desc>A horizontal weight-space trajectory showing early checkpoints fed into a U-Net weight predictor that jumps directly to a far-future checkpoint in one forward pass, after which normal SGD continues. This replaces thousands of gradient steps with one prediction, achieving 3.2× wall-clock speedup. The predictor outputs weights, not data.</desc>

  <defs>
    <!-- Standard arrowhead -->
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <!-- Blue arrowhead for SGD continuation -->
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <!-- Dashed jump arrowhead -->
    <marker id="arrow-jump" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7c3aed"/>
    </marker>
  </defs>

  <!-- ── Title ── -->
  <text x="400" y="36" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="19" font-weight="700" fill="#1f2733">
    Diffusion Weights: Predicting Future Checkpoints
  </text>

  <!-- ────────────────────────────────────────────
       WEIGHT-SPACE RAIL  (y = 170)
       Checkpoints at x = 100, 200, 300
       Predicted θ(T) at x = 600
       SGD continues to x = 710
  ──────────────────────────────────────────── -->

  <!-- Rail line (early segment) -->
  <line x1="100" y1="170" x2="330" y2="170" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Rail label -->
  <text x="215" y="138" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="11" fill="#56616f">weight-space trajectory</text>

  <!-- ── Early checkpoints ── -->
  <!-- θ(t0) -->
  <circle cx="100" cy="170" r="20" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="100" y="174" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="12" fill="#1f2733">θ(t0)</text>

  <!-- θ(t1) -->
  <circle cx="200" cy="170" r="20" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="200" y="174" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="12" fill="#1f2733">θ(t1)</text>

  <!-- θ(t2) -->
  <circle cx="300" cy="170" r="20" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="300" y="174" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="12" fill="#1f2733">θ(t2)</text>

  <!-- ── U-Net weight predictor box ── -->
  <rect x="330" y="218" width="160" height="64" rx="10"
        fill="#f7f8fa" stroke="#7c3aed" stroke-width="2"/>
  <text x="410" y="244" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="13" font-weight="600" fill="#7c3aed">U-Net Weight</text>
  <text x="410" y="262" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="13" font-weight="600" fill="#7c3aed">Predictor</text>

  <!-- Arrow: checkpoints → predictor (input feed) -->
  <line x1="200" y1="190" x2="370" y2="218" stroke="#94a3b8" stroke-width="1.5"
        stroke-dasharray="4 3" marker-end="url(#arrow)"/>

  <!-- ── Big dashed jump arrow: predictor → θ(T) ── -->
  <!-- Arc path going above the rail -->
  <path d="M 490,250 C 540,128 560,118 586,146"
        fill="none" stroke="#7c3aed" stroke-width="2.5"
        stroke-dasharray="8 5" marker-end="url(#arrow-jump)"/>

  <!-- Jump arrow label -->
  <text x="548" y="112" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="12" font-weight="600" fill="#7c3aed">1 forward pass</text>
  <text x="548" y="127" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="11" fill="#56616f">(replaces 1000s of grad steps)</text>

  <!-- ── Predicted far-future checkpoint θ(T) ── -->
  <circle cx="610" cy="170" r="26" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="610" y="166" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="13" font-weight="700" fill="#7c3aed">θ(T)</text>
  <text x="610" y="180" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="9" fill="#7c3aed">predicted</text>

  <!-- ── SGD continues from θ(T) ── -->
  <line x1="637" y1="170" x2="705" y2="170" stroke="#2563eb" stroke-width="2"
        marker-end="url(#arrow-blue)"/>
  <text x="671" y="150" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="11" fill="#56616f">normal SGD</text>
  <text x="671" y="162" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="11" fill="#56616f">continues</text>

  <!-- ────────────────────────────────────────────
       ANNOTATIONS / KEY FACTS
  ──────────────────────────────────────────── -->

  <!-- Divider -->
  <line x1="60" y1="315" x2="740" y2="315" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Fact pills row -->
  <!-- Pill 1: 3.2× speedup -->
  <rect x="62" y="328" width="180" height="40" rx="8" fill="#e8f0fe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="152" y="344" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="12" font-weight="700" fill="#2563eb">3.2× wall-clock speedup</text>
  <text x="152" y="360" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="11" fill="#56616f">(conditional on task)</text>

  <!-- Pill 2: predicts weights not data -->
  <rect x="262" y="328" width="200" height="40" rx="8" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="362" y="344" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="12" font-weight="700" fill="#7c3aed">Predicts WEIGHTS, not data</text>
  <text x="362" y="360" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="11" fill="#56616f">output = weight tensor θ(T)</text>

  <!-- Pill 3: replaces grad steps -->
  <rect x="482" y="328" width="256" height="40" rx="8" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="610" y="344" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="12" font-weight="700" fill="#1f2733">Jumps in weight space</text>
  <text x="610" y="360" text-anchor="middle"
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
        font-size="11" fill="#56616f">early ckpts → predicted near-final state</text>
</svg>
