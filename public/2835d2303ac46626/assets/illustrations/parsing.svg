<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img" aria-labelledby="title desc">
  <title id="title">Constituency vs Dependency Parsing</title>
  <desc id="desc">Left: constituency tree for "dogs chase cats" with rules S→NP VP and VP→V NP. Right: dependency arcs nsubj and dobj over the same words. Bottom note explains transition-based (shift-reduce, linear-time, greedy) vs chart/CKY (exact, O(n³)) parsing.</desc>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-dep" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="38" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#1f2733" text-anchor="middle">Constituency vs Dependency Parsing</text>

  <!-- ===== LEFT PANEL: Constituency Tree ===== -->
  <!-- Panel label -->
  <text x="200" y="68" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#2563eb" text-anchor="middle">Constituency Tree (PCFG)</text>

  <!-- Divider line between panels -->
  <line x1="400" y1="55" x2="400" y2="340" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- Root node: S -->
  <rect x="170" y="82" width="60" height="32" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="200" y="103" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1f2733" text-anchor="middle">S</text>

  <!-- S → NP (left branch) -->
  <line x1="200" y1="114" x2="120" y2="155" stroke="#94a3b8" stroke-width="2"/>
  <!-- S → VP (right branch) -->
  <line x1="200" y1="114" x2="280" y2="155" stroke="#94a3b8" stroke-width="2"/>

  <!-- Rule label: S→NP VP -->
  <text x="200" y="140" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="middle">S → NP VP</text>

  <!-- NP node -->
  <rect x="90" y="158" width="60" height="32" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="120" y="179" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1f2733" text-anchor="middle">NP</text>

  <!-- VP node -->
  <rect x="250" y="158" width="60" height="32" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="280" y="179" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1f2733" text-anchor="middle">VP</text>

  <!-- VP → V NP -->
  <line x1="280" y1="190" x2="230" y2="231" stroke="#94a3b8" stroke-width="2"/>
  <line x1="280" y1="190" x2="330" y2="231" stroke="#94a3b8" stroke-width="2"/>

  <!-- Rule label: VP→V NP -->
  <text x="280" y="218" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="middle">VP → V NP</text>

  <!-- V node -->
  <rect x="200" y="234" width="60" height="32" rx="10" fill="#f7f8fa" stroke="#94a3b8" stroke-width="2"/>
  <text x="230" y="255" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1f2733" text-anchor="middle">V</text>

  <!-- NP node (object) -->
  <rect x="300" y="234" width="60" height="32" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="330" y="255" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1f2733" text-anchor="middle">NP</text>

  <!-- NP(subj) → dogs -->
  <line x1="120" y1="190" x2="120" y2="280" stroke="#94a3b8" stroke-width="2"/>

  <!-- V → chase -->
  <line x1="230" y1="266" x2="230" y2="280" stroke="#94a3b8" stroke-width="2"/>

  <!-- NP(obj) → cats -->
  <line x1="330" y1="266" x2="330" y2="280" stroke="#94a3b8" stroke-width="2"/>

  <!-- Leaf words -->
  <text x="120" y="298" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#1f2733" text-anchor="middle">dogs</text>
  <text x="230" y="298" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#1f2733" text-anchor="middle">chase</text>
  <text x="330" y="298" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#1f2733" text-anchor="middle">cats</text>

  <!-- ===== RIGHT PANEL: Dependency Arcs ===== -->
  <!-- Panel label -->
  <text x="600" y="68" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#2563eb" text-anchor="middle">Dependency Graph (UD)</text>

  <!-- Words for dependency panel -->
  <text x="490" y="220" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#1f2733" text-anchor="middle">dogs</text>
  <text x="600" y="220" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#1f2733" text-anchor="middle">chase</text>
  <text x="710" y="220" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#1f2733" text-anchor="middle">cats</text>

  <!-- Underlines for word tokens -->
  <line x1="466" y1="225" x2="514" y2="225" stroke="#94a3b8" stroke-width="1"/>
  <line x1="576" y1="225" x2="624" y2="225" stroke="#94a3b8" stroke-width="1"/>
  <line x1="686" y1="225" x2="734" y2="225" stroke="#94a3b8" stroke-width="1"/>

  <!-- nsubj arc: chase → dogs (curves upward) -->
  <!-- Path: from chase(600,215) arc up and left to dogs(490,215) -->
  <path d="M 590,210 C 570,155 520,155 500,210" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-dep)"/>
  <text x="545" y="148" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#2563eb" text-anchor="middle" font-weight="600">nsubj</text>

  <!-- dobj arc: chase → cats (curves upward) -->
  <!-- Path: from chase(600,215) arc up and right to cats(710,215) -->
  <path d="M 610,210 C 630,155 680,155 700,210" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-dep)"/>
  <text x="655" y="148" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#2563eb" text-anchor="middle" font-weight="600">dobj</text>

  <!-- ROOT label above chase -->
  <text x="600" y="108" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="middle">ROOT</text>
  <line x1="600" y1="112" x2="600" y2="202" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Role labels below words -->
  <text x="490" y="242" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="middle">subject</text>
  <text x="600" y="242" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="middle">verb / root</text>
  <text x="710" y="242" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="middle">object</text>

  <!-- ===== Bottom Note ===== -->
  <rect x="40" y="350" width="720" height="52" rx="10" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="400" y="370" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#1f2733" text-anchor="middle">Parsing Algorithms</text>
  <text x="400" y="390" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#56616f" text-anchor="middle">transition-based (shift-reduce): linear-time, greedy  |  chart/CKY: exact, O(n³)</text>

</svg>
