<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 420" role="img">
  <title>MERA thesis bridge: from a scaling race to a systems race, MERA's two levers, and the eBay/Mercury connection.</title>
  <desc>A conceptual map showing AI's shift from making models bigger to serving a fixed model pool well, MERA's two levers (invocation-level routing and replay-gated joint admission over static weights), the decoupling of cost from reliability, and why this matters for eBay's Mercury multi-model stack.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
  </defs>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">

    <text x="28" y="30" font-size="19" font-weight="700" fill="#1f2733">From a scaling race to a systems race: where MERA sits</text>
    <text x="28" y="50" font-size="12" fill="#56616f">MERA makes no model bigger &#8212; it extracts value from how a fixed pool of models is served.</text>

    <!-- Scaling race -->
    <rect x="28" y="70" width="232" height="80" rx="10" fill="#f7f8fa" stroke="#94a3b8" stroke-width="2"/>
    <text x="144" y="98" font-size="14" font-weight="700" fill="#1f2733" text-anchor="middle">Scaling race</text>
    <text x="144" y="122" font-size="11" fill="#56616f" text-anchor="middle">Make the model bigger &#8212;</text>
    <text x="144" y="139" font-size="11" fill="#56616f" text-anchor="middle">more params, more compute, more data.</text>

    <!-- shift arrow -->
    <text x="294" y="102" font-size="10" font-style="italic" fill="#56616f" text-anchor="middle">shifts to</text>
    <line x1="261" y1="110" x2="327" y2="110" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>

    <!-- Systems race -->
    <rect x="330" y="70" width="272" height="80" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
    <text x="466" y="98" font-size="14" font-weight="700" fill="#1f2733" text-anchor="middle">Systems race</text>
    <text x="466" y="122" font-size="11" fill="#334155" text-anchor="middle">Spend a FIXED model budget well:</text>
    <text x="466" y="139" font-size="11" fill="#334155" text-anchor="middle">value from HOW a fixed pool is served.</text>

    <!-- systems -> levers -->
    <line x1="466" y1="150" x2="466" y2="162" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>
    <text x="466" y="178" font-size="12" font-weight="700" fill="#4f46e5" text-anchor="middle">MERA's two levers &#8212; over STATIC weights</text>

    <!-- Lever 1 -->
    <rect x="330" y="188" width="272" height="84" rx="10" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="346" y="208" font-size="13" font-weight="700" fill="#1f2733">1 &#183; Invocation-level routing</text>
    <text x="346" y="226" font-size="11" fill="#56616f">An input-only router picks a model per</text>
    <text x="346" y="241" font-size="11" fill="#56616f">invocation (strong / cheap / student) inside</text>
    <text x="346" y="256" font-size="11" fill="#56616f">a trace &#8212; or a SkillBook template serves it.</text>

    <!-- Lever 2 -->
    <rect x="330" y="282" width="272" height="84" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="346" y="302" font-size="13" font-weight="700" fill="#1f2733">2 &#183; Replay-gated joint admission</text>
    <text x="346" y="320" font-size="11" fill="#56616f">Router + SkillBook + LoRA adapter are</text>
    <text x="346" y="335" font-size="11" fill="#56616f">promoted together only if an offline JOINT</text>
    <text x="346" y="350" font-size="11" fill="#56616f">REPLAY preserves end-to-end quality.</text>

    <!-- Decoupling principle -->
    <rect x="28" y="188" width="274" height="178" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="44" y="210" font-size="13" font-weight="700" fill="#1f2733">The decoupling principle</text>
    <text x="44" y="232" font-size="11" fill="#334155">Cost savings come from the router and</text>
    <text x="44" y="247" font-size="11" fill="#334155">SkillBook &#8212; down-routing easy, checkable</text>
    <text x="44" y="262" font-size="11" fill="#334155">steps to cheaper models.</text>
    <text x="44" y="288" font-size="11" fill="#334155">Reliability comes from the verifier-with-</text>
    <text x="44" y="303" font-size="11" fill="#334155">fallback &#8212; a failed check re-routes up</text>
    <text x="44" y="318" font-size="11" fill="#334155">to a stronger model, and logs it.</text>
    <text x="44" y="344" font-size="11" fill="#334155">The two are DECOUPLED: an aggressive</text>
    <text x="44" y="359" font-size="11" fill="#334155">router cannot silently degrade output.</text>

    <!-- connector to eBay -->
    <line x1="604" y1="228" x2="623" y2="228" stroke="#2563eb" stroke-width="3" marker-end="url(#arrow)"/>

    <!-- eBay panel -->
    <rect x="625" y="70" width="295" height="296" rx="10" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
    <text x="642" y="96" font-size="14" font-weight="700" fill="#1f2733">For eBay / Versley</text>
    <text x="642" y="120" font-size="11" font-weight="700" fill="#9a3412">Mercury already runs many models per query.</text>
    <text x="642" y="140" font-size="11" fill="#56616f">&#8594; MERA's discipline is exactly what</text>
    <text x="642" y="155" font-size="11" fill="#56616f">you'd want before pushing routing into a</text>
    <text x="642" y="170" font-size="11" fill="#56616f">live multi-model agent.</text>
    <line x1="642" y1="185" x2="903" y2="185" stroke="#ea580c" stroke-width="1" stroke-opacity="0.35"/>
    <text x="642" y="205" font-size="11" font-weight="700" fill="#9a3412">The verifier is the gating concern =</text>
    <text x="642" y="220" font-size="11" font-weight="700" fill="#9a3412">the e-commerce challenge.</text>
    <text x="642" y="240" font-size="11" fill="#56616f">No cheap executable ground truth for</text>
    <text x="642" y="255" font-size="11" fill="#56616f">attribute extraction &#183; listing generation</text>
    <text x="642" y="270" font-size="11" fill="#56616f">&#183; machine translation (MT).</text>
    <line x1="642" y1="285" x2="903" y2="285" stroke="#ea580c" stroke-width="1" stroke-opacity="0.35"/>
    <text x="642" y="305" font-size="11" font-style="italic" fill="#56616f">Open question: can you build a cheap,</text>
    <text x="642" y="320" font-size="11" font-style="italic" fill="#56616f">trustworthy verifier or learned judge</text>
    <text x="642" y="335" font-size="11" font-style="italic" fill="#56616f">for e-commerce outputs?</text>

    <text x="474" y="398" font-size="11" font-style="italic" fill="#94a3b8" text-anchor="middle">A conceptual map of MERA's contribution and its relevance to a Mercury-style multi-model stack.</text>

  </g>
</svg>