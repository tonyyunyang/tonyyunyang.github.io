<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 470" role="img">
<title>MERA eight-cycle run: router accuracy over one continuous long-horizon run</title>
<desc>Line chart of router accuracy across the eight cycles of MERA's Skill then LLM then Router schedule, peaking at cycle 3 and stabilizing in the 82 to 87 percent band.</desc>
<defs>
<marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
<marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker>
<marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
<marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
</defs>
<g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
<rect width="940" height="470" fill="#ffffff"/>

<text x="470" y="29" text-anchor="middle" font-size="19" font-weight="700" fill="#1f2733">Eight-cycle run: router accuracy peaks early, then stabilizes</text>
<text x="470" y="49" text-anchor="middle" font-size="12" fill="#56616f">One continuous long-horizon run &#183; Skill &#8594; LLM &#8594; Router schedule (not 8 independent runs)</text>
<text x="470" y="67" text-anchor="middle" font-size="11" fill="#94a3b8">Y-axis = router cheap-vs-strong accuracy on the 832-example held-out set &#8212; NOT end-to-end task success</text>

<!-- 82-87% stabilized band -->
<rect x="90" y="142.1" width="700" height="29.5" fill="#dcfce7" opacity="0.55"/>
<line x1="90" y1="142.1" x2="790" y2="142.1" stroke="#16a34a" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>
<line x1="90" y1="171.6" x2="790" y2="171.6" stroke="#16a34a" stroke-width="1" stroke-dasharray="4 3" opacity="0.6"/>

<!-- warm-up zone (cycles 1-2) -->
<rect x="110" y="124.5" width="170" height="235.5" fill="#fef3c7" opacity="0.4"/>
<text x="195" y="118" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">warm-up (C1&#8211;C2)</text>

<!-- horizontal gridlines + y labels -->
<line x1="90" y1="124.5" x2="790" y2="124.5" stroke="#eef1f4" stroke-width="1"/>
<line x1="90" y1="183.4" x2="790" y2="183.4" stroke="#eef1f4" stroke-width="1"/>
<line x1="90" y1="242.2" x2="790" y2="242.2" stroke="#eef1f4" stroke-width="1"/>
<line x1="90" y1="301.1" x2="790" y2="301.1" stroke="#eef1f4" stroke-width="1"/>
<text x="82" y="128" text-anchor="end" font-size="11" fill="#56616f">90%</text>
<text x="82" y="187" text-anchor="end" font-size="11" fill="#56616f">80%</text>
<text x="82" y="246" text-anchor="end" font-size="11" fill="#56616f">70%</text>
<text x="82" y="304.5" text-anchor="end" font-size="11" fill="#56616f">60%</text>
<text x="82" y="363.5" text-anchor="end" font-size="11" fill="#56616f">50%</text>

<!-- faint vertical gridlines at each cycle -->
<line x1="145" y1="95" x2="145" y2="360" stroke="#f4f6f9" stroke-width="1"/>
<line x1="232" y1="95" x2="232" y2="360" stroke="#f4f6f9" stroke-width="1"/>
<line x1="319" y1="95" x2="319" y2="360" stroke="#f4f6f9" stroke-width="1"/>
<line x1="406" y1="95" x2="406" y2="360" stroke="#f4f6f9" stroke-width="1"/>
<line x1="494" y1="95" x2="494" y2="360" stroke="#f4f6f9" stroke-width="1"/>
<line x1="581" y1="95" x2="581" y2="360" stroke="#f4f6f9" stroke-width="1"/>
<line x1="668" y1="95" x2="668" y2="360" stroke="#f4f6f9" stroke-width="1"/>
<line x1="755" y1="95" x2="755" y2="360" stroke="#f4f6f9" stroke-width="1"/>

<!-- axes -->
<line x1="90" y1="95" x2="90" y2="360" stroke="#334155" stroke-width="1.5"/>
<line x1="90" y1="360" x2="790" y2="360" stroke="#334155" stroke-width="1.5"/>
<text transform="rotate(-90 28 227)" x="28" y="227" text-anchor="middle" font-size="12" fill="#56616f">router accuracy (%)</text>

<!-- data line -->
<polyline points="145,315.3 232,235.8 319,137.4 406,169.8 494,202.8 581,152.2 668,167.5 755,153.9" fill="none" stroke="#2563eb" stroke-width="2.5" stroke-linejoin="round"/>

<!-- ordinary points -->
<circle cx="145" cy="315.3" r="4" fill="#2563eb" stroke="#ffffff" stroke-width="1.5"/>
<circle cx="232" cy="235.8" r="4" fill="#2563eb" stroke="#ffffff" stroke-width="1.5"/>
<circle cx="406" cy="169.8" r="4" fill="#2563eb" stroke="#ffffff" stroke-width="1.5"/>
<circle cx="581" cy="152.2" r="4" fill="#2563eb" stroke="#ffffff" stroke-width="1.5"/>
<circle cx="668" cy="167.5" r="4" fill="#2563eb" stroke="#ffffff" stroke-width="1.5"/>
<circle cx="755" cy="153.9" r="4" fill="#2563eb" stroke="#ffffff" stroke-width="1.5"/>

<!-- value labels -->
<text x="145" y="306" text-anchor="middle" font-size="10" fill="#56616f">57.6</text>
<text x="232" y="227" text-anchor="middle" font-size="10" fill="#56616f">71.1</text>
<text x="406" y="187" text-anchor="middle" font-size="10" fill="#56616f">82.3</text>
<text x="468" y="206" text-anchor="end" font-size="10" fill="#56616f">76.7</text>
<text x="585" y="141" text-anchor="start" font-size="10" fill="#56616f">85.3</text>
<text x="668" y="186" text-anchor="middle" font-size="10" fill="#56616f">82.7</text>
<text x="758" y="142" text-anchor="start" font-size="10" fill="#56616f">85.0</text>

<!-- peak callout (cycle 3) -->
<line x1="348" y1="124" x2="323" y2="136" stroke="#16a34a" stroke-width="1"/>
<circle cx="319" cy="137.4" r="5" fill="#16a34a" stroke="#ffffff" stroke-width="1.5"/>
<text x="350" y="116" text-anchor="start" font-size="12" font-weight="700" fill="#15803d">Peak: 87.8% router acc @ cycle 3</text>
<text x="350" y="131" text-anchor="start" font-size="11" fill="#56616f">52.8% cost &#183; 3.4% fallback</text>

<!-- dip callout (cycle 5) -->
<line x1="503" y1="243" x2="497" y2="207" stroke="#dc2626" stroke-width="1"/>
<circle cx="494" cy="202.8" r="5" fill="#dc2626" stroke="#ffffff" stroke-width="1.5"/>
<text x="505" y="250" text-anchor="start" font-size="11.5" font-weight="700" fill="#b91c1c">Cycle 5 dip = single router-seed outlier</text>
<text x="505" y="265" text-anchor="start" font-size="11" fill="#56616f">(that cycle&#8217;s fallback also spikes to 14.4%)</text>

<!-- band legend (right margin) -->
<line x1="790" y1="157" x2="800" y2="157" stroke="#16a34a" stroke-width="1"/>
<rect x="801" y="150" width="14" height="14" rx="3" fill="#dcfce7" stroke="#16a34a" stroke-width="1"/>
<text x="820" y="156" text-anchor="start" font-size="11" font-weight="700" fill="#15803d">82&#8211;87%</text>
<text x="801" y="178" text-anchor="start" font-size="10.5" fill="#56616f">stabilized band</text>

<!-- x labels -->
<text x="145" y="377" text-anchor="middle" font-size="11" fill="#56616f">C1</text>
<text x="232" y="377" text-anchor="middle" font-size="11" fill="#56616f">C2</text>
<text x="319" y="377" text-anchor="middle" font-size="11" fill="#56616f">C3</text>
<text x="406" y="377" text-anchor="middle" font-size="11" fill="#56616f">C4</text>
<text x="494" y="377" text-anchor="middle" font-size="11" fill="#56616f">C5</text>
<text x="581" y="377" text-anchor="middle" font-size="11" fill="#56616f">C6</text>
<text x="668" y="377" text-anchor="middle" font-size="11" fill="#56616f">C7</text>
<text x="755" y="377" text-anchor="middle" font-size="11" fill="#56616f">C8</text>
<text x="440" y="396" text-anchor="middle" font-size="11" fill="#56616f">training cycle</text>

<!-- caption -->
<text x="470" y="423" text-anchor="middle" font-size="12" fill="#1f2733">Warms up over cycles 1&#8211;2, peaks at cycle 3 (87.8% router acc), then stabilizes in the 82&#8211;87% band.</text>
<text x="470" y="442" text-anchor="middle" font-size="11.5" fill="#56616f">The cycle-5 dip to 76.7% is a single router-seed outlier, not a trend &#183; SkillBook coverage grows to 34 signatures / 120 observations over the run.</text>
</g>
</svg>