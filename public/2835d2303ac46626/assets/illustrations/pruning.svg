<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img">
  <title>Pruning: Unstructured to Structured</title>
  <desc>Three-panel diagram showing (1) a dense weight grid, (2) the same grid after unstructured pruning with ~99% zeros scattered randomly, and (3) a small compact dense block after structured compaction. An annotation emphasises that real hardware speedup requires structured/compacted sparsity, not just scattered zeros.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-note" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#1f2733">Pruning: Unstructured → Structured</text>

  <!-- ============================================================ -->
  <!-- PANEL 1: Dense weight grid -->
  <!-- ============================================================ -->
  <!-- Panel background -->
  <rect x="30" y="60" width="190" height="220" rx="10" fill="#f7f8fa" stroke="#94a3b8" stroke-width="2"/>
  <text x="125" y="82" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#1f2733">Dense Model</text>

  <!-- 8×8 dense grid, almost all cells filled -->
  <!-- Grid origin: x=50, y=92; cell size 20px -->
  <!-- All 64 cells filled (dense) -->
  <g fill="#2563eb" fill-opacity="0.75" stroke="none">
    <!-- Row 0 -->
    <rect x="50" y="95" width="17" height="17"/><rect x="69" y="95" width="17" height="17"/><rect x="88" y="95" width="17" height="17"/><rect x="107" y="95" width="17" height="17"/><rect x="126" y="95" width="17" height="17"/><rect x="145" y="95" width="17" height="17"/><rect x="164" y="95" width="17" height="17"/><rect x="183" y="95" width="17" height="17"/>
    <!-- Row 1 -->
    <rect x="50" y="114" width="17" height="17"/><rect x="69" y="114" width="17" height="17"/><rect x="88" y="114" width="17" height="17"/><rect x="107" y="114" width="17" height="17"/><rect x="126" y="114" width="17" height="17"/><rect x="145" y="114" width="17" height="17"/><rect x="164" y="114" width="17" height="17"/><rect x="183" y="114" width="17" height="17"/>
    <!-- Row 2 -->
    <rect x="50" y="133" width="17" height="17"/><rect x="69" y="133" width="17" height="17"/><rect x="88" y="133" width="17" height="17"/><rect x="107" y="133" width="17" height="17"/><rect x="126" y="133" width="17" height="17"/><rect x="145" y="133" width="17" height="17"/><rect x="164" y="133" width="17" height="17"/><rect x="183" y="133" width="17" height="17"/>
    <!-- Row 3 -->
    <rect x="50" y="152" width="17" height="17"/><rect x="69" y="152" width="17" height="17"/><rect x="88" y="152" width="17" height="17"/><rect x="107" y="152" width="17" height="17"/><rect x="126" y="152" width="17" height="17"/><rect x="145" y="152" width="17" height="17"/><rect x="164" y="152" width="17" height="17"/><rect x="183" y="152" width="17" height="17"/>
    <!-- Row 4 -->
    <rect x="50" y="171" width="17" height="17"/><rect x="69" y="171" width="17" height="17"/><rect x="88" y="171" width="17" height="17"/><rect x="107" y="171" width="17" height="17"/><rect x="126" y="171" width="17" height="17"/><rect x="145" y="171" width="17" height="17"/><rect x="164" y="171" width="17" height="17"/><rect x="183" y="171" width="17" height="17"/>
    <!-- Row 5 -->
    <rect x="50" y="190" width="17" height="17"/><rect x="69" y="190" width="17" height="17"/><rect x="88" y="190" width="17" height="17"/><rect x="107" y="190" width="17" height="17"/><rect x="126" y="190" width="17" height="17"/><rect x="145" y="190" width="17" height="17"/><rect x="164" y="190" width="17" height="17"/><rect x="183" y="190" width="17" height="17"/>
    <!-- Row 6 -->
    <rect x="50" y="209" width="17" height="17"/><rect x="69" y="209" width="17" height="17"/><rect x="88" y="209" width="17" height="17"/><rect x="107" y="209" width="17" height="17"/><rect x="126" y="209" width="17" height="17"/><rect x="145" y="209" width="17" height="17"/><rect x="164" y="209" width="17" height="17"/><rect x="183" y="209" width="17" height="17"/>
    <!-- Row 7 -->
    <rect x="50" y="228" width="17" height="17"/><rect x="69" y="228" width="17" height="17"/><rect x="88" y="228" width="17" height="17"/><rect x="107" y="228" width="17" height="17"/><rect x="126" y="228" width="17" height="17"/><rect x="145" y="228" width="17" height="17"/><rect x="164" y="228" width="17" height="17"/><rect x="183" y="228" width="17" height="17"/>
  </g>
  <!-- Grid lines overlay -->
  <rect x="50" y="95" width="152" height="152" rx="2" fill="none" stroke="#94a3b8" stroke-width="1"/>

  <text x="125" y="268" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#56616f">most cells filled</text>

  <!-- ============================================================ -->
  <!-- ARROW 1: Dense → Unstructured -->
  <!-- ============================================================ -->
  <line x1="224" y1="170" x2="268" y2="170" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="246" y="150" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#2563eb" font-weight="600">unstructured</text>
  <text x="246" y="162" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#2563eb" font-weight="600">prune</text>

  <!-- ============================================================ -->
  <!-- PANEL 2: Unstructured sparse grid (~99% zeros) -->
  <!-- ============================================================ -->
  <rect x="272" y="60" width="256" height="220" rx="10" fill="#f7f8fa" stroke="#94a3b8" stroke-width="2"/>
  <text x="400" y="82" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#1f2733">Unstructured Sparse (~99% zeros)</text>

  <!-- Larger 10×10 grid to show scale, same physical size as panel 1 roughly, sparse -->
  <!-- Grid origin: x=292, y=95; cell 15px -->
  <!-- Empty cells = white/light; Only ~5 filled (scattered) out of 100 -->
  <!-- All empty first -->
  <g fill="#e8f0fe" stroke="#94a3b8" stroke-width="0.5">
    <rect x="292" y="95" width="212" height="150" rx="2"/>
  </g>
  <!-- Grid lines 10×10 -->
  <g stroke="#94a3b8" stroke-width="0.5" fill="none">
    <!-- vertical lines -->
    <line x1="313" y1="95" x2="313" y2="245"/><line x1="334" y1="95" x2="334" y2="245"/>
    <line x1="355" y1="95" x2="355" y2="245"/><line x1="376" y1="95" x2="376" y2="245"/>
    <line x1="397" y1="95" x2="397" y2="245"/><line x1="418" y1="95" x2="418" y2="245"/>
    <line x1="439" y1="95" x2="439" y2="245"/><line x1="460" y1="95" x2="460" y2="245"/>
    <line x1="481" y1="95" x2="481" y2="245"/>
    <!-- horizontal lines -->
    <line x1="292" y1="110" x2="504" y2="110"/><line x1="292" y1="125" x2="504" y2="125"/>
    <line x1="292" y1="140" x2="504" y2="140"/><line x1="292" y1="155" x2="504" y2="155"/>
    <line x1="292" y1="170" x2="504" y2="170"/><line x1="292" y1="185" x2="504" y2="185"/>
    <line x1="292" y1="200" x2="504" y2="200"/><line x1="292" y1="215" x2="504" y2="215"/>
    <line x1="292" y1="230" x2="504" y2="230"/>
  </g>
  <rect x="292" y="95" width="212" height="150" rx="2" fill="none" stroke="#94a3b8" stroke-width="1"/>

  <!-- Scattered non-zero weights (~6 out of 100, i.e. ~6%) -->
  <g fill="#2563eb" fill-opacity="0.75">
    <rect x="293" y="126" width="19" height="13"/> <!-- row2, col0 -->
    <rect x="356" y="96" width="19" height="13"/>  <!-- row0, col3 -->
    <rect x="419" y="156" width="19" height="13"/> <!-- row4, col6 -->
    <rect x="440" y="111" width="19" height="13"/> <!-- row1, col7 -->
    <rect x="314" y="216" width="19" height="13"/> <!-- row8, col1 -->
    <rect x="481" y="231" width="19" height="13"/> <!-- row9, col9 -->
    <rect x="377" y="186" width="19" height="13"/> <!-- row6, col4 -->
  </g>

  <!-- Zero labels (subtle) -->
  <text x="329" y="107" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="8" fill="#94a3b8">0</text>
  <text x="350" y="122" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="8" fill="#94a3b8">0</text>
  <text x="407" y="137" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="8" fill="#94a3b8">0</text>
  <text x="460" y="202" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="8" fill="#94a3b8">0</text>
  <text x="490" y="172" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="8" fill="#94a3b8">0</text>

  <text x="400" y="262" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#56616f">scattered zeros, same grid shape</text>

  <!-- ============================================================ -->
  <!-- ARROW 2: Unstructured → Structured -->
  <!-- ============================================================ -->
  <line x1="532" y1="170" x2="576" y2="170" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="554" y="150" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#2563eb" font-weight="600">structure /</text>
  <text x="554" y="162" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#2563eb" font-weight="600">compact</text>

  <!-- ============================================================ -->
  <!-- PANEL 3: Small dense compact block -->
  <!-- ============================================================ -->
  <rect x="580" y="60" width="190" height="220" rx="10" fill="#f7f8fa" stroke="#94a3b8" stroke-width="2"/>
  <text x="675" y="82" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#1f2733">Compact Dense Block</text>

  <!-- Small 3×3 dense grid, centered in panel -->
  <!-- Grid at x=630, y=140; cell=26px -->
  <g fill="#2563eb" fill-opacity="0.75">
    <rect x="630" y="140" width="23" height="23"/><rect x="655" y="140" width="23" height="23"/><rect x="680" y="140" width="23" height="23"/>
    <rect x="630" y="165" width="23" height="23"/><rect x="655" y="165" width="23" height="23"/><rect x="680" y="165" width="23" height="23"/>
    <rect x="630" y="190" width="23" height="23"/><rect x="655" y="190" width="23" height="23"/><rect x="680" y="190" width="23" height="23"/>
  </g>
  <rect x="630" y="140" width="73" height="73" rx="2" fill="none" stroke="#94a3b8" stroke-width="1"/>
  <!-- inner grid lines -->
  <line x1="653" y1="140" x2="653" y2="213" stroke="#94a3b8" stroke-width="0.5"/>
  <line x1="678" y1="140" x2="678" y2="213" stroke="#94a3b8" stroke-width="0.5"/>
  <line x1="630" y1="163" x2="703" y2="163" stroke="#94a3b8" stroke-width="0.5"/>
  <line x1="630" y1="188" x2="703" y2="188" stroke="#94a3b8" stroke-width="0.5"/>

  <text x="675" y="234" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#56616f">small dense block</text>
  <text x="675" y="249" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#15803d" font-weight="600">real hardware speedup</text>

  <!-- ============================================================ -->
  <!-- Annotation box at bottom -->
  <!-- ============================================================ -->
  <rect x="55" y="298" width="690" height="82" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="2"/>

  <!-- Small arrow from annotation to panel 2 area -->
  <line x1="385" y1="298" x2="385" y2="282" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arrow-note)" stroke-dasharray="4,3"/>

  <text x="400" y="322" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#92400e">Key insight:</text>
  <text x="400" y="340" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#1f2733">Real 6× speedup needs structured / compacted sparsity — not just zeros.</text>
  <text x="400" y="357" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">Scattered zeros still use the same dense matrix ops on GPU.</text>
  <text x="400" y="371" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">Removing whole filters/channels → fewer MACs → real throughput gain.</text>

</svg>
