<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 440" role="img">
  <title>The 87.3% trap: MERA's 87.3% is router accuracy, not task accuracy</title>
  <desc>Two contrasting panels show that MERA's headline 87.3% is the router's cheap-vs-strong decision accuracy on an 832-example held-out set, while the only task-quality number is the 1.5B adapter's flat 47.5% pass rate on MBPP eval200.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
  </defs>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">

    <!-- Title -->
    <text x="450" y="30" text-anchor="middle" font-size="19" font-weight="bold" fill="#1f2733">The 87.3% trap: it is ROUTER accuracy, not task accuracy</text>
    <text x="450" y="52" text-anchor="middle" font-size="12.5" fill="#56616f">MERA &#183; best four-cycle schedule (Skill &#8594; LLM &#8594; Router)</text>

    <!-- LEFT panel: router accuracy -->
    <rect x="24" y="72" width="402" height="234" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
    <text x="225" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#2563eb">ROUTER ACCURACY &#183; held-out set</text>
    <text x="225" y="180" text-anchor="middle" font-size="58" font-weight="bold" fill="#2563eb">87.3%</text>
    <text x="225" y="216" text-anchor="middle" font-size="12" fill="#1f2733">How often the learned cheap-vs-strong</text>
    <text x="225" y="234" text-anchor="middle" font-size="12" fill="#1f2733">DECISION matches held-out labels on an</text>
    <text x="225" y="252" text-anchor="middle" font-size="12" fill="#1f2733">832-example held-out set.</text>
    <rect x="62" y="270" width="326" height="26" rx="13" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="225" y="287" text-anchor="middle" font-size="11" font-weight="bold" fill="#2563eb">A property of the router &#8212; not the agent</text>

    <!-- RIGHT panel: task quality -->
    <rect x="474" y="72" width="402" height="234" rx="10" fill="#fef9c3" stroke="#ea580c" stroke-width="2"/>
    <text x="675" y="108" text-anchor="middle" font-size="13" font-weight="bold" fill="#b45309">TASK QUALITY &#183; the only quality number</text>
    <text x="675" y="180" text-anchor="middle" font-size="58" font-weight="bold" fill="#b45309">47.5%</text>
    <text x="675" y="216" text-anchor="middle" font-size="12" fill="#1f2733">The 1.5B GRPO adapter's pass rate on</text>
    <text x="675" y="234" text-anchor="middle" font-size="12" fill="#1f2733">MBPP eval200, vs ~47.0% base setting.</text>
    <text x="675" y="252" text-anchor="middle" font-size="12" font-weight="bold" fill="#b45309">Essentially FLAT &#8212; no cumulative gain.</text>
    <rect x="512" y="270" width="326" height="26" rx="13" fill="#ffffff" stroke="#ea580c" stroke-width="1.5"/>
    <text x="675" y="287" text-anchor="middle" font-size="11" font-weight="bold" fill="#b45309">Band 46.5%&#8211;47.5% across cycles</text>

    <!-- Divider / strike between panels -->
    <line x1="450" y1="76" x2="450" y2="302" stroke="#dc2626" stroke-width="2" stroke-dasharray="6 5"/>
    <circle cx="450" cy="189" r="29" fill="#ffffff" stroke="#dc2626" stroke-width="3"/>
    <text x="450" y="200" text-anchor="middle" font-size="32" font-weight="bold" fill="#dc2626">&#8800;</text>

    <!-- Caption / warning -->
    <rect x="24" y="324" width="852" height="94" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="450" y="356" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f2733">87.3% is NOT the agent answering 87.3% of tasks correctly.</text>
    <text x="450" y="382" text-anchor="middle" font-size="12.5" fill="#56616f">It only means the router's cheap-vs-strong choice matched labels on 832 held-out examples.</text>
    <text x="450" y="404" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#dc2626">MERA reports NO end-to-end agentic task-success rate anywhere.</text>

  </g>
</svg>
