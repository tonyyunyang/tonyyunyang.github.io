<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img">
  <title>TwinRouterBench: static + dynamic, step-level agentic routing</title>
  <desc>Two-track design of TwinRouterBench: a fast offline static track that scores 970 verified step prefixes with deterministic arithmetic, and a live dynamic track that runs routers end-to-end on SWE-bench Verified with real pricing. Static labels train the router and the dynamic track validates the transfer.</desc>

  <defs>
    <marker id="arrowTeal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#0d9488"/>
    </marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d97706"/>
    </marker>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
  </defs>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">

    <!-- Title -->
    <text x="480" y="34" text-anchor="middle" font-size="19" font-weight="700" fill="#1f2733">TwinRouterBench: static + dynamic, step-level agentic routing</text>

    <!-- ===================== STATIC LANE ===================== -->
    <rect x="22" y="60" width="916" height="200" rx="14" fill="#f0faf8" stroke="#b7e3da" stroke-width="1.5"/>
    <text x="36" y="84" font-size="13" font-weight="700" fill="#0d9488">STATIC TRACK (fast, offline, reproducible)</text>

    <!-- Static Box 1: 520 trajectories -->
    <rect x="24" y="104" width="158" height="120" rx="10" fill="#ffffff" stroke="#0d9488" stroke-width="2"/>
    <text x="103" y="140" text-anchor="middle" font-size="12" font-weight="700" fill="#0d9488">520 successful</text>
    <text x="103" y="156" text-anchor="middle" font-size="11" fill="#1f2733">strong-model</text>
    <text x="103" y="172" text-anchor="middle" font-size="11" fill="#1f2733">trajectories</text>
    <text x="103" y="190" text-anchor="middle" font-size="10" fill="#56616f">(Opus 4.6 / GPT-5.4)</text>

    <!-- Static Box 2: labeling protocol -->
    <rect x="212" y="104" width="158" height="120" rx="10" fill="#ffffff" stroke="#0d9488" stroke-width="2"/>
    <text x="291" y="150" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2733">Downgrade-and-</text>
    <text x="291" y="166" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2733">cascade labeling</text>
    <text x="291" y="182" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2733">protocol</text>

    <!-- Static Box 3: 970 step prefixes -->
    <rect x="400" y="104" width="158" height="120" rx="10" fill="#ffffff" stroke="#0d9488" stroke-width="2"/>
    <text x="479" y="126" text-anchor="middle" font-size="11" font-weight="700" fill="#0d9488">970 router-visible</text>
    <text x="479" y="141" text-anchor="middle" font-size="10.5" fill="#1f2733">step prefixes, each</text>
    <text x="479" y="156" text-anchor="middle" font-size="10.5" fill="#1f2733">with a verified tier</text>
    <text x="479" y="171" text-anchor="middle" font-size="10.5" fill="#1f2733">label over T =</text>
    <text x="479" y="186" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1f2733">{low, mid,</text>
    <text x="479" y="201" text-anchor="middle" font-size="10.5" font-weight="600" fill="#1f2733">mid_high, high}</text>

    <!-- Static Box 4: deterministic scoring -->
    <rect x="588" y="104" width="158" height="120" rx="10" fill="#ffffff" stroke="#0d9488" stroke-width="2"/>
    <text x="667" y="132" text-anchor="middle" font-size="11" font-weight="700" fill="#1f2733">Deterministic scoring:</text>
    <text x="667" y="148" text-anchor="middle" font-size="10.5" fill="#1f2733">RowPass / RowExact /</text>
    <text x="667" y="163" text-anchor="middle" font-size="10.5" fill="#1f2733">TrajPass / CostSave</text>
    <text x="667" y="182" text-anchor="middle" font-size="10" fill="#56616f">(milliseconds,</text>
    <text x="667" y="197" text-anchor="middle" font-size="10.5" font-weight="700" fill="#0d9488">NO online judge)</text>

    <!-- Static Chip: leaderboard -->
    <rect x="776" y="104" width="158" height="120" rx="10" fill="#e6f7f4" stroke="#0d9488" stroke-width="2"/>
    <text x="855" y="126" text-anchor="middle" font-size="10.5" font-weight="700" fill="#0d9488">Combined leaderboard</text>
    <text x="786" y="148" font-size="10.5" font-weight="700" fill="#0d9488">SR-KNN</text>
    <text x="924" y="148" text-anchor="end" font-size="10.5" font-weight="700" fill="#0d9488">77.89</text>
    <text x="786" y="167" font-size="10.5" fill="#1f2733">UncommonRoute</text>
    <text x="924" y="167" text-anchor="end" font-size="10.5" fill="#1f2733">56.96</text>
    <text x="786" y="186" font-size="10.5" fill="#1f2733">Opus</text>
    <text x="924" y="186" text-anchor="end" font-size="10.5" fill="#1f2733">54.38</text>
    <text x="786" y="205" font-size="10.5" fill="#1f2733">ClawRouter</text>
    <text x="924" y="205" text-anchor="end" font-size="10.5" fill="#1f2733">52.76</text>

    <!-- Static arrows -->
    <line x1="182" y1="164" x2="210" y2="164" stroke="#0d9488" stroke-width="2" marker-end="url(#arrowTeal)"/>
    <line x1="370" y1="164" x2="398" y2="164" stroke="#0d9488" stroke-width="2" marker-end="url(#arrowTeal)"/>
    <line x1="558" y1="164" x2="586" y2="164" stroke="#0d9488" stroke-width="2" marker-end="url(#arrowTeal)"/>
    <line x1="746" y1="164" x2="774" y2="164" stroke="#0d9488" stroke-width="2" marker-end="url(#arrowTeal)"/>

    <!-- ===================== DYNAMIC LANE ===================== -->
    <rect x="22" y="336" width="916" height="200" rx="14" fill="#fdf6ec" stroke="#f0d6a6" stroke-width="1.5"/>
    <text x="36" y="360" font-size="13" font-weight="700" fill="#d97706">DYNAMIC TRACK (live, end-to-end, realistic)</text>

    <!-- Dynamic Box 1: router picks model -->
    <rect x="24" y="380" width="158" height="120" rx="10" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
    <text x="103" y="414" text-anchor="middle" font-size="11" fill="#1f2733">Router picks one</text>
    <text x="103" y="430" text-anchor="middle" font-size="11" fill="#1f2733">concrete model per</text>
    <text x="103" y="446" text-anchor="middle" font-size="11" fill="#1f2733">call from a locked</text>
    <text x="103" y="462" text-anchor="middle" font-size="11.5" font-weight="700" fill="#d97706">11-model pool</text>

    <!-- Dynamic Box 2: mini-swe-agent -->
    <rect x="212" y="380" width="158" height="120" rx="10" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
    <text x="291" y="406" text-anchor="middle" font-size="10.5" font-weight="700" fill="#1f2733">mini-swe-agent v2.2.8</text>
    <text x="291" y="421" text-anchor="middle" font-size="10.5" fill="#1f2733">runs the agent</text>
    <text x="291" y="436" text-anchor="middle" font-size="10.5" fill="#1f2733">end-to-end on a</text>
    <text x="291" y="451" text-anchor="middle" font-size="10.5" fill="#1f2733">100-case held-out</text>
    <text x="291" y="466" text-anchor="middle" font-size="10.5" fill="#1f2733">SWE-bench Verified</text>
    <text x="291" y="481" text-anchor="middle" font-size="10.5" fill="#1f2733">split</text>

    <!-- Dynamic Box 3: live pricing -->
    <rect x="400" y="380" width="158" height="120" rx="10" fill="#ffffff" stroke="#d97706" stroke-width="2"/>
    <text x="479" y="434" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2733">Live OpenRouter</text>
    <text x="479" y="450" text-anchor="middle" font-size="12" font-weight="600" fill="#1f2733">pricing</text>

    <!-- Dynamic Chip: results (spans col4+col5) -->
    <rect x="588" y="380" width="346" height="120" rx="10" fill="#fdecd3" stroke="#d97706" stroke-width="2"/>
    <text x="761" y="406" text-anchor="middle" font-size="11.5" fill="#1f2733">Bill = API cost + $0.60 &#215; unresolved</text>
    <text x="761" y="430" text-anchor="middle" font-size="12" fill="#1f2733">trained router <tspan font-weight="700" fill="#d97706">$25.66</tspan> @ 75/100</text>
    <text x="761" y="452" text-anchor="middle" font-size="12" fill="#1f2733">vs unrouted Opus <tspan font-weight="700" fill="#1f2733">$54.73</tspan> @ 75/100</text>
    <text x="761" y="481" text-anchor="middle" font-size="15" font-weight="700" fill="#d97706">= 53.1% cost cut</text>

    <!-- Dynamic arrows -->
    <line x1="182" y1="440" x2="210" y2="440" stroke="#d97706" stroke-width="2" marker-end="url(#arrowAmber)"/>
    <line x1="370" y1="440" x2="398" y2="440" stroke="#d97706" stroke-width="2" marker-end="url(#arrowAmber)"/>
    <line x1="558" y1="440" x2="586" y2="440" stroke="#d97706" stroke-width="2" marker-end="url(#arrowAmber)"/>

    <!-- ===================== CROSS-TRACK CONNECTOR ===================== -->
    <path d="M479 224 L479 298 L12 298 L12 440 L24 440" fill="none" stroke="#2563eb" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowBlue)"/>
    <rect x="176" y="303" width="290" height="34" rx="8" fill="#eef2ff" stroke="#2563eb" stroke-width="1"/>
    <text x="321" y="318" text-anchor="middle" font-size="10.5" font-weight="700" fill="#2563eb">static labels train the router;</text>
    <text x="321" y="332" text-anchor="middle" font-size="10.5" fill="#2563eb">dynamic track validates the transfer</text>

  </g>
</svg>
