<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 420" role="img">
  <title>MERA decoupling principle: cost and safety are optimized in two independent lanes</title>
  <desc>Lane A shows the router and SkillBook cutting serving cost to 51.8% of always-large, while Lane B shows the verifier and fallback catching failed down-routes and rerunning them on a stronger model 4.4% of the time.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
  </defs>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
    <text x="440" y="26" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2733">The Decoupling Principle in MERA</text>
    <text x="440" y="44" text-anchor="middle" font-size="12" fill="#56616f">Two independent lanes: one optimizes cost, the other guarantees quality.</text>

    <!-- LANE A: COST -->
    <rect x="20" y="56" width="840" height="132" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
    <text x="34" y="78" font-size="14" font-weight="700" fill="#4f46e5">LANE A &#183; COST is optimized by the Router + SkillBook</text>
    <text x="34" y="95" font-size="11" fill="#56616f">They choose the cheapest viable path: down-route easy, checkable steps.</text>

    <rect x="34" y="106" width="232" height="68" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="150" y="128" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2733">Per-invocation input</text>
    <text x="150" y="146" text-anchor="middle" font-size="11" fill="#56616f">serialized prompt +</text>
    <text x="150" y="161" text-anchor="middle" font-size="11" fill="#56616f">local context (input-only)</text>

    <line x1="266" y1="140" x2="298" y2="140" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="300" y="106" width="270" height="68" rx="10" fill="#ffffff" stroke="#4f46e5" stroke-width="1.5"/>
    <text x="435" y="126" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2733">Router / SkillBook</text>
    <text x="435" y="143" text-anchor="middle" font-size="11" fill="#56616f">down-route easy, checkable steps to</text>
    <text x="435" y="158" text-anchor="middle" font-size="11" fill="#56616f">the cheap model or a stable template</text>

    <line x1="570" y1="140" x2="602" y2="140" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>

    <rect x="604" y="106" width="240" height="68" rx="10" fill="#eef2ff" stroke="#2563eb" stroke-width="1.5"/>
    <text x="724" y="126" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2733">Cost outcome</text>
    <text x="724" y="143" text-anchor="middle" font-size="11" fill="#56616f">serving cost = 51.8% of</text>
    <text x="724" y="158" text-anchor="middle" font-size="11" fill="#56616f">always-large (48.2% cheaper)</text>

    <!-- CENTER: the decoupling statement -->
    <rect x="20" y="196" width="840" height="64" rx="10" fill="#fef9c3" stroke="#ea580c" stroke-width="1.5"/>
    <text x="440" y="216" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2733">Cost and safety are DECOUPLED &#8212; two independent lanes</text>
    <text x="440" y="234" text-anchor="middle" font-size="12" fill="#56616f">Savings come from the router / SkillBook (Lane A); the reliability guarantee comes from the verifier + fallback (Lane B).</text>
    <text x="440" y="250" text-anchor="middle" font-size="12" fill="#56616f">An aggressive router cannot silently degrade output, because the verifier is the independent safety net.</text>

    <!-- LANE B: QUALITY -->
    <rect x="20" y="268" width="840" height="142" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="34" y="290" font-size="14" font-weight="700" fill="#16a34a">LANE B &#183; QUALITY is protected by the Verifier + Fallback</text>
    <text x="34" y="307" font-size="11" fill="#56616f">Schema / tool-call / executable-test check; a failed down-route is caught and rerun on a stronger model.</text>

    <rect x="34" y="327" width="180" height="58" rx="10" fill="#ffffff" stroke="#334155" stroke-width="1.5"/>
    <text x="124" y="349" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2733">Generated output</text>
    <text x="124" y="365" text-anchor="middle" font-size="10.5" fill="#56616f">from cheap model, template,</text>
    <text x="124" y="379" text-anchor="middle" font-size="10.5" fill="#56616f">or the strong model</text>

    <line x1="214" y1="356" x2="220" y2="357" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>

    <polygon points="302,320 382,357 302,394 222,357" fill="#fef9c3" stroke="#ea580c" stroke-width="2"/>
    <text x="302" y="354" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">Verifier</text>
    <text x="302" y="370" text-anchor="middle" font-size="9" fill="#92400e">schema &#183; tool &#183; test</text>

    <line x1="382" y1="350" x2="468" y2="340" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <line x1="382" y1="364" x2="468" y2="386" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowRed)"/>

    <rect x="470" y="324" width="200" height="32" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
    <text x="570" y="344" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">PASS &#8594; accept the output</text>

    <rect x="470" y="368" width="374" height="38" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="1.5"/>
    <text x="657" y="384" text-anchor="middle" font-size="11" font-weight="700" fill="#b91c1c">FAIL &#8594; rerun on a stronger model</text>
    <text x="657" y="399" text-anchor="middle" font-size="10.5" fill="#56616f">log the event &#183; 4.4% of invocations</text>
  </g>
</svg>