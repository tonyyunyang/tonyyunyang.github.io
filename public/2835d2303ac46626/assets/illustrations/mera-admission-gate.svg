<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 470" role="img">
  <title>MERA joint-replay admission gate</title>
  <desc>The three freshly-updated components are bundled and promoted only if an offline joint replay shows combined end-to-end quality is preserved without worse cost or fallback.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
  </defs>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">

    <!-- title -->
    <text x="470" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2733">MERA &#183; The joint-replay admission gate</text>
    <text x="470" y="50" text-anchor="middle" font-size="12" fill="#56616f">Conservative monotone deployment &#8212; a candidate state goes live only if joint replay preserves combined quality.</text>

    <!-- candidate components (left) -->
    <rect x="24" y="70" width="120" height="40" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="84" y="88" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1f2733">New SkillBook</text>
    <text x="84" y="102" text-anchor="middle" font-size="9.5" fill="#56616f">templates &#183; stats</text>

    <rect x="24" y="122" width="120" height="40" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
    <text x="84" y="140" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1f2733">New router</text>
    <text x="84" y="154" text-anchor="middle" font-size="9.5" fill="#56616f">BERT-tiny checkpoint</text>

    <rect x="24" y="174" width="120" height="40" rx="10" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="84" y="192" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1f2733">New adapter</text>
    <text x="84" y="206" text-anchor="middle" font-size="9.5" fill="#56616f">Qwen2.5-Coder-1.5B</text>

    <!-- merge arrows -->
    <line x1="144" y1="90" x2="167" y2="90" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="144" y1="142" x2="167" y2="142" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
    <line x1="144" y1="194" x2="167" y2="194" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- candidate combined state -->
    <rect x="170" y="70" width="130" height="144" rx="10" fill="#f7f8fa" stroke="#334155" stroke-width="2"/>
    <text x="235" y="118" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1f2733">Candidate</text>
    <text x="235" y="133" text-anchor="middle" font-size="12.5" font-weight="700" fill="#1f2733">combined state</text>
    <text x="235" y="160" text-anchor="middle" font-size="10" fill="#56616f">router &#183; skill &#183; adapter</text>
    <text x="235" y="176" text-anchor="middle" font-size="10" fill="#56616f">bundled as one</text>
    <text x="235" y="192" text-anchor="middle" font-size="10" fill="#56616f">promotable unit</text>

    <line x1="300" y1="142" x2="320" y2="142" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- joint replay box -->
    <rect x="322" y="92" width="168" height="100" rx="10" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
    <text x="406" y="113" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2733">JOINT REPLAY</text>
    <text x="406" y="134" text-anchor="middle" font-size="11" fill="#1f2733">replay shared traces</text>
    <text x="406" y="149" text-anchor="middle" font-size="11" fill="#1f2733">under one shared</text>
    <text x="406" y="164" text-anchor="middle" font-size="11" fill="#1f2733">verifier</text>
    <text x="406" y="182" text-anchor="middle" font-size="10" fill="#56616f">(offline &#183; Loop 2 gate)</text>

    <line x1="490" y1="142" x2="508" y2="142" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- decision diamond -->
    <polygon points="605,80 700,142 605,204 510,142" fill="#fef9c3" stroke="#334155" stroke-width="2"/>
    <text x="605" y="124" text-anchor="middle" font-size="10.5" fill="#1f2733">Combined end-to-end</text>
    <text x="605" y="139" text-anchor="middle" font-size="10.5" fill="#1f2733">quality preserved &amp;</text>
    <text x="605" y="154" text-anchor="middle" font-size="10.5" fill="#1f2733">cost/fallback no worse?</text>

    <!-- yes / no forks -->
    <line x1="700" y1="142" x2="733" y2="106" stroke="#16a34a" stroke-width="2" marker-end="url(#arrowGreen)"/>
    <line x1="700" y1="142" x2="733" y2="221" stroke="#dc2626" stroke-width="2" marker-end="url(#arrowRed)"/>
    <text x="709" y="113" font-size="11" font-weight="700" fill="#16a34a">YES</text>
    <text x="707" y="182" font-size="11" font-weight="700" fill="#dc2626">NO</text>

    <!-- YES outcome -->
    <rect x="735" y="72" width="185" height="66" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="827" y="99" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">PROMOTE</text>
    <text x="827" y="118" text-anchor="middle" font-size="10.5" fill="#1f2733">new combined state &#8594; runtime</text>

    <!-- NO outcome -->
    <rect x="735" y="190" width="185" height="66" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="827" y="217" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">KEEP current state</text>
    <text x="827" y="236" text-anchor="middle" font-size="10.5" fill="#1f2733">discard the candidate</text>

    <!-- feeder from region logic -->
    <line x1="200" y1="309" x2="200" y2="217" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrowGray)"/>
    <text x="224" y="252" font-size="11" fill="#56616f">Region logic chooses which of the three</text>
    <text x="224" y="267" font-size="11" fill="#56616f">candidate components is refreshed each cycle.</text>

    <!-- region logic band -->
    <text x="24" y="301" font-size="11" font-weight="700" fill="#56616f">Region logic &#183; SkillBook / router / verifier evidence partitions the trace space</text>

    <rect x="24" y="312" width="287" height="62" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="167" y="334" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">Easy regions</text>
    <text x="167" y="354" text-anchor="middle" font-size="10.5" fill="#1f2733">&#8594; cheap serving &#183; future student admission</text>

    <rect x="324" y="312" width="287" height="62" rx="10" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
    <text x="467" y="334" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412">Hard regions</text>
    <text x="467" y="354" text-anchor="middle" font-size="10.5" fill="#1f2733">&#8594; feed the LLM / adapter update</text>

    <rect x="624" y="312" width="287" height="62" rx="10" fill="#fef9c3" stroke="#b45309" stroke-width="2"/>
    <text x="767" y="334" text-anchor="middle" font-size="12" font-weight="700" fill="#854d0e">Uncertain regions</text>
    <text x="767" y="354" text-anchor="middle" font-size="10.5" fill="#1f2733">&#8594; stay verifier-fallback protected</text>

    <!-- caption -->
    <text x="470" y="400" text-anchor="middle" font-size="12" fill="#1f2733">Components are judged by their COMBINED end-to-end effect &#8212; never in isolation.</text>
    <text x="470" y="420" text-anchor="middle" font-size="11" fill="#56616f">So deployed quality can only stay flat or improve (conservative monotone deployment).</text>

  </g>
</svg>