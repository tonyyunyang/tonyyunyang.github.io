<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img">
  <title>Scaled Dot-Product Self-Attention</title>
  <desc>Diagram showing tokens x1–x4 projected to Q, K, V via learned weight matrices, the attention formula softmax(QKᵀ/√d_k)·V, and query q2 attending to keys k1–k4 with weight bars producing output z2.</desc>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="34" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#1f2733" text-anchor="middle">Scaled Dot-Product Self-Attention</text>

  <!-- ===================== LEFT PANEL: Token → Q,K,V ===================== -->
  <text x="130" y="68" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#56616f" text-anchor="middle">Input Tokens → Q, K, V</text>

  <!-- Token boxes x1..x4 -->
  <!-- x1 -->
  <rect x="30" y="82" width="46" height="30" rx="8" fill="#f7f8fa" stroke="#94a3b8" stroke-width="2"/>
  <text x="53" y="102" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#1f2733" text-anchor="middle">x₁</text>
  <!-- x2 -->
  <rect x="30" y="128" width="46" height="30" rx="8" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="53" y="148" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#1f2733" text-anchor="middle">x₂</text>
  <!-- x3 -->
  <rect x="30" y="174" width="46" height="30" rx="8" fill="#f7f8fa" stroke="#94a3b8" stroke-width="2"/>
  <text x="53" y="194" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#1f2733" text-anchor="middle">x₃</text>
  <!-- x4 -->
  <rect x="30" y="220" width="46" height="30" rx="8" fill="#f7f8fa" stroke="#94a3b8" stroke-width="2"/>
  <text x="53" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" fill="#1f2733" text-anchor="middle">x₄</text>

  <!-- W_Q, W_K, W_V label boxes -->
  <!-- W_Q -->
  <rect x="106" y="88" width="44" height="24" rx="6" fill="#e8f0fe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="128" y="105" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#2563eb" text-anchor="middle">W_Q</text>
  <!-- W_K -->
  <rect x="106" y="134" width="44" height="24" rx="6" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="128" y="151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#56616f" text-anchor="middle">W_K</text>
  <!-- W_V -->
  <rect x="106" y="180" width="44" height="24" rx="6" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="128" y="197" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#56616f" text-anchor="middle">W_V</text>

  <!-- Arrows: tokens → weight matrices (fan-out from each x to W_Q, W_K, W_V) -->
  <!-- x1 → W_Q -->
  <line x1="76" y1="97" x2="104" y2="100" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- x1 → W_K -->
  <line x1="76" y1="100" x2="104" y2="142" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <!-- x1 → W_V -->
  <line x1="76" y1="102" x2="104" y2="185" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- x2 → W_Q -->
  <line x1="76" y1="143" x2="104" y2="107" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <!-- x2 → W_K -->
  <line x1="76" y1="143" x2="104" y2="143" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <!-- x2 → W_V -->
  <line x1="76" y1="145" x2="104" y2="188" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- x3 → weight matrices (lighter) -->
  <line x1="76" y1="189" x2="104" y2="113" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="76" y1="189" x2="104" y2="147" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="76" y1="189" x2="104" y2="192" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- x4 → weight matrices (lighter) -->
  <line x1="76" y1="235" x2="104" y2="115" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="76" y1="235" x2="104" y2="152" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="76" y1="235" x2="104" y2="196" stroke="#94a3b8" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Q, K, V output vectors -->
  <!-- Q -->
  <rect x="166" y="88" width="36" height="24" rx="6" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="184" y="105" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#2563eb" text-anchor="middle">Q</text>
  <!-- K -->
  <rect x="166" y="134" width="36" height="24" rx="6" fill="#f7f8fa" stroke="#94a3b8" stroke-width="2"/>
  <text x="184" y="151" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1f2733" text-anchor="middle">K</text>
  <!-- V -->
  <rect x="166" y="180" width="36" height="24" rx="6" fill="#f7f8fa" stroke="#94a3b8" stroke-width="2"/>
  <text x="184" y="197" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1f2733" text-anchor="middle">V</text>

  <!-- W_Q → Q, W_K → K, W_V → V arrows -->
  <line x1="150" y1="100" x2="164" y2="100" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="150" y1="146" x2="164" y2="146" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="150" y1="192" x2="164" y2="192" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Subtitle note -->
  <text x="53" y="276" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="middle">all tokens share</text>
  <text x="53" y="290" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="middle">W_Q, W_K, W_V</text>

  <!-- Divider line -->
  <line x1="220" y1="60" x2="220" y2="380" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ===================== CENTER PANEL: Formula ===================== -->
  <text x="400" y="68" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#56616f" text-anchor="middle">Attention Formula</text>

  <!-- Formula box -->
  <rect x="238" y="110" width="322" height="64" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="399" y="138" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1f2733" text-anchor="middle">Attention(Q, K, V) =</text>
  <text x="399" y="162" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#2563eb" text-anchor="middle">softmax( QKᵀ / √d_k ) · V</text>

  <!-- Annotation arrows inside formula -->
  <!-- QKᵀ annotation -->
  <text x="302" y="210" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="middle">similarity</text>
  <text x="302" y="222" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="middle">scores</text>
  <line x1="302" y1="205" x2="339" y2="176" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- √d_k annotation -->
  <text x="399" y="215" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="middle">scale to prevent</text>
  <text x="399" y="227" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="middle">softmax saturation</text>
  <line x1="399" y1="210" x2="399" y2="176" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- softmax annotation -->
  <text x="500" y="215" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="middle">weights</text>
  <text x="500" y="227" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="middle">sum to 1</text>
  <line x1="500" y1="210" x2="476" y2="176" stroke="#94a3b8" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Arrows from left panel Q,K,V into formula box -->
  <line x1="202" y1="100" x2="236" y2="130" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>
  <line x1="202" y1="146" x2="236" y2="145" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <line x1="202" y1="192" x2="236" y2="160" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- Divider line right -->
  <line x1="572" y1="60" x2="572" y2="380" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ===================== RIGHT PANEL: q2 attending to k1..k4 ===================== -->
  <text x="686" y="68" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#56616f" text-anchor="middle">q₂ attends to k₁..k₄</text>

  <!-- q2 query node -->
  <rect x="587" y="88" width="38" height="26" rx="7" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="606" y="106" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#2563eb" text-anchor="middle">q₂</text>

  <!-- Key nodes k1..k4 -->
  <!-- k1 -->
  <rect x="648" y="82" width="34" height="24" rx="6" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="665" y="99" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#1f2733" text-anchor="middle">k₁</text>
  <!-- k2 -->
  <rect x="648" y="118" width="34" height="24" rx="6" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="665" y="135" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#1f2733" text-anchor="middle">k₂</text>
  <!-- k3 -->
  <rect x="648" y="154" width="34" height="24" rx="6" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="665" y="171" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#1f2733" text-anchor="middle">k₃</text>
  <!-- k4 -->
  <rect x="648" y="190" width="34" height="24" rx="6" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="665" y="207" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#1f2733" text-anchor="middle">k₄</text>

  <!-- Arrows q2 → each key -->
  <line x1="625" y1="101" x2="646" y2="94" stroke="#2563eb" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <line x1="625" y1="103" x2="646" y2="130" stroke="#2563eb" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <line x1="625" y1="105" x2="646" y2="163" stroke="#2563eb" stroke-width="1.2" marker-end="url(#arrow-blue)"/>
  <line x1="625" y1="106" x2="646" y2="199" stroke="#2563eb" stroke-width="1.2" marker-end="url(#arrow-blue)"/>

  <!-- Attention weight bars (softmax weights, summing to 1) -->
  <!-- Label "softmax weights" -->
  <text x="700" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="start">α (sum=1)</text>

  <!-- Weight bars next to each key -->
  <!-- k1: α=0.10 -->
  <rect x="686" y="86" width="8" height="14" rx="2" fill="#94a3b8" opacity="0.6"/>
  <text x="698" y="98" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10" fill="#56616f" text-anchor="start">0.10</text>
  <!-- k2: α=0.55 -->
  <rect x="686" y="122" width="44" height="14" rx="2" fill="#2563eb" opacity="0.7"/>
  <text x="734" y="134" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10" fill="#56616f" text-anchor="start">0.55</text>
  <!-- k3: α=0.25 -->
  <rect x="686" y="158" width="20" height="14" rx="2" fill="#94a3b8" opacity="0.6"/>
  <text x="710" y="170" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10" fill="#56616f" text-anchor="start">0.25</text>
  <!-- k4: α=0.10 -->
  <rect x="686" y="194" width="8" height="14" rx="2" fill="#94a3b8" opacity="0.6"/>
  <text x="698" y="206" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10" fill="#56616f" text-anchor="start">0.10</text>

  <!-- Weighted sum → z2 (caption placed to the right of the arrow to avoid overlap) -->
  <text x="700" y="246" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="start">weighted sum</text>
  <text x="700" y="260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="start">of values v₁..v₄</text>

  <!-- z2 output box -->
  <rect x="655" y="280" width="62" height="32" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="686" y="301" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#2563eb" text-anchor="middle">z₂</text>

  <!-- Arrow from weight bars / keys area → z2 -->
  <line x1="686" y1="218" x2="686" y2="278" stroke="#2563eb" stroke-width="1.8" stroke-dasharray="4,3" marker-end="url(#arrow-blue)"/>

  <!-- Note under z2 -->
  <text x="686" y="332" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="middle">output for token 2</text>

  <!-- Arrow from formula box → right panel -->
  <line x1="560" y1="145" x2="585" y2="101" stroke="#94a3b8" stroke-width="1.4" stroke-dasharray="5,3" marker-end="url(#arrow)"/>

  <!-- Bottom note -->
  <text x="400" y="390" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="middle">d_k = key/query dimension; scaling by √d_k prevents dot-products from growing large and pushing softmax into saturation</text>
</svg>
