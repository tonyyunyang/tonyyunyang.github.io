<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 528" role="img" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title>Multi-Horizon Merging</title>
  <desc>From the current checkpoint, predict short, mid, and long-horizon task vectors and combine them as a convex (task-arithmetic) merge. Composing reliable short horizons beats one hard long-horizon forecast: an epoch-250 merge exceeds the epoch-500 pure prediction.</desc>

  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-green" markerWidth="11" markerHeight="8" refX="9" refY="4" orient="auto">
      <polygon points="0 0, 11 4, 0 8" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- Top title -->
  <text x="470" y="34" text-anchor="middle" font-size="19" font-weight="700" fill="#1f2733">Multi-Horizon Merging</text>

  <!-- ===================== LEFT PANEL ===================== -->
  <rect x="24" y="58" width="446" height="442" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="247" y="82" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2733">Predict task vectors at 3 horizons</text>

  <!-- faint convex hull triangle (Model-Soup hull) -->
  <polygon points="250,195 340,270 340,405" fill="#16a34a" fill-opacity="0.08" stroke="#16a34a" stroke-opacity="0.45" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- starting node theta_tau -->
  <rect x="44" y="288" width="92" height="40" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="90" y="313" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2733">&#952;<tspan baseline-shift="sub" font-size="9">&#964;</tspan> (current)</text>

  <!-- three fanned task-vector arrows (increasing length) -->
  <line x1="136" y1="306" x2="250" y2="195" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <line x1="136" y1="308" x2="340" y2="270" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>
  <line x1="136" y1="310" x2="340" y2="405" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)"/>

  <!-- tip markers -->
  <circle cx="250" cy="195" r="3" fill="#2563eb"/>
  <circle cx="340" cy="270" r="3" fill="#2563eb"/>
  <circle cx="340" cy="405" r="3" fill="#2563eb"/>

  <!-- merged point (convex combination) -->
  <circle cx="310" cy="290" r="5.5" fill="#16a34a" stroke="#ffffff" stroke-width="1.5"/>
  <text x="322" y="294" text-anchor="start" font-size="11" font-weight="700" fill="#16a34a">&#952;<tspan baseline-shift="sub" font-size="8">merge</tspan></text>

  <!-- short horizon label + phase note -->
  <text x="250" y="174" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2733">&#916;<tspan baseline-shift="sub" font-size="9">short</tspan> (cos 0.85)</text>
  <text x="250" y="188" text-anchor="middle" font-size="11" font-style="italic" fill="#56616f">early = broad adaptation</text>

  <!-- mid horizon label -->
  <text x="352" y="266" text-anchor="start" font-size="12" font-weight="700" fill="#1f2733">&#916;<tspan baseline-shift="sub" font-size="9">mid</tspan> (cos 0.82)</text>

  <!-- long horizon label + phase note -->
  <text x="352" y="402" text-anchor="start" font-size="12" font-weight="700" fill="#1f2733">&#916;<tspan baseline-shift="sub" font-size="9">long</tspan> (cos 0.78)</text>
  <text x="298" y="420" text-anchor="middle" font-size="11" font-style="italic" fill="#56616f">late = task-specific refinement</text>

  <!-- merge formula box -->
  <rect x="36" y="432" width="412" height="56" rx="10" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="242" y="455" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2733">&#952;<tspan baseline-shift="sub" font-size="9">merge</tspan> = &#952;<tspan baseline-shift="sub" font-size="9">&#964;</tspan> + &#931; ( &#945;<tspan baseline-shift="sub" font-size="9">&#948;</tspan> &#183; &#916;<tspan baseline-shift="sub" font-size="9">&#948;</tspan> )</text>
  <text x="242" y="475" text-anchor="middle" font-size="11.5" fill="#56616f">&#945; &#8805; 0,&#160;&#160; &#931; &#945; = 1&#160;&#160; (convex / Model-Soup hull)</text>

  <!-- ===================== RIGHT PANEL ===================== -->
  <rect x="482" y="58" width="434" height="442" rx="10" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="699" y="82" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2733">Why merge beats pure long-horizon prediction</text>

  <!-- y-axis title -->
  <text transform="rotate(-90 510 280)" x="510" y="280" text-anchor="middle" font-size="11" fill="#56616f">accuracy (MMLU College Chemistry)</text>

  <!-- gridlines + y labels -->
  <line x1="560" y1="358" x2="880" y2="358" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="560" y1="275" x2="880" y2="275" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="560" y1="192" x2="880" y2="192" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="552" y="362" text-anchor="end" font-size="11" fill="#56616f">0.36</text>
  <text x="552" y="279" text-anchor="end" font-size="11" fill="#56616f">0.40</text>
  <text x="552" y="196" text-anchor="end" font-size="11" fill="#56616f">0.44</text>

  <!-- axes -->
  <line x1="560" y1="150" x2="560" y2="400" stroke="#94a3b8" stroke-width="2"/>
  <line x1="560" y1="400" x2="884" y2="400" stroke="#94a3b8" stroke-width="2"/>

  <!-- x ticks + labels -->
  <line x1="660" y1="400" x2="660" y2="406" stroke="#94a3b8" stroke-width="2"/>
  <line x1="800" y1="400" x2="800" y2="406" stroke="#94a3b8" stroke-width="2"/>
  <text x="660" y="419" text-anchor="middle" font-size="11" fill="#56616f">250</text>
  <text x="800" y="419" text-anchor="middle" font-size="11" fill="#56616f">500</text>
  <text x="730" y="436" text-anchor="middle" font-size="12" fill="#56616f">epoch</text>

  <!-- drop lines -->
  <line x1="800" y1="322" x2="800" y2="400" stroke="#94a3b8" stroke-width="1.2" stroke-dasharray="4 3"/>
  <line x1="660" y1="228" x2="660" y2="400" stroke="#16a34a" stroke-width="1.2" stroke-dasharray="4 3"/>

  <!-- "merge wins" arrow (pure -> merge: up and left) -->
  <line x1="788" y1="316" x2="672" y2="236" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrow-green)"/>
  <text x="726" y="312" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">merge wins:</text>
  <text x="726" y="326" text-anchor="middle" font-size="11" fill="#16a34a">higher accuracy,</text>
  <text x="726" y="340" text-anchor="middle" font-size="11" fill="#16a34a">reached sooner</text>

  <!-- pure prediction marker (epoch 500) -->
  <circle cx="800" cy="322" r="7" fill="#94a3b8" stroke="#56616f" stroke-width="1.5"/>
  <text x="800" y="346" text-anchor="middle" font-size="11" font-weight="700" fill="#56616f">pure prediction</text>
  <text x="800" y="360" text-anchor="middle" font-size="11" fill="#56616f">@ epoch 500</text>
  <text x="800" y="374" text-anchor="middle" font-size="11" fill="#56616f">= &lt;0.38</text>

  <!-- multi-horizon merge marker (epoch 250) -->
  <circle cx="660" cy="228" r="8" fill="#16a34a" stroke="#ffffff" stroke-width="1.5"/>
  <text x="655" y="188" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">multi-horizon merge</text>
  <text x="655" y="202" text-anchor="middle" font-size="11" fill="#16a34a">@ epoch 250</text>
  <text x="655" y="216" text-anchor="middle" font-size="11" font-weight="700" fill="#16a34a">= &gt;0.42</text>

  <!-- footnote -->
  <rect x="494" y="452" width="410" height="42" rx="8" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1"/>
  <text x="699" y="470" text-anchor="middle" font-size="11" fill="#56616f">merge gain &#916;Acc 0.037-0.052 across 3 datasets;</text>
  <text x="699" y="485" text-anchor="middle" font-size="11" fill="#56616f">gain correlates with later-checkpoint quality, r ~ 0.6, p&lt;0.01</text>
</svg>
