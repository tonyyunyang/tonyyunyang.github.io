<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 610" role="img">
  <title>MERA two-loop architecture with joint-replay admission gate</title>
  <desc>Runtime traces are canonicalized into step slices that feed three separate offline tracks (SkillBook stats, BERT-tiny router, Qwen-1.5B LoRA + GRPO). A new combined state is promoted back to runtime only if a joint replay shows end-to-end quality is preserved.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/>
    </marker>
  </defs>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">

    <!-- Title -->
    <text x="470" y="36" text-anchor="middle" font-size="19" font-weight="700" fill="#1f2733">MERA: two loops + a joint-replay admission gate</text>

    <!-- ===== RUNTIME (Loop 1) ===== -->
    <text x="470" y="60" text-anchor="middle" font-size="12" font-weight="700" fill="#ea580c">RUNTIME (Loop 1)</text>
    <rect x="288" y="70" width="364" height="58" rx="10" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
    <text x="470" y="94" text-anchor="middle" font-size="14" font-weight="700" fill="#1f2733">Agent runtime</text>
    <text x="470" y="113" text-anchor="middle" font-size="12" fill="#56616f">router + SkillBook + verifier-fallback</text>

    <!-- runtime -> canonicalize -->
    <line x1="470" y1="128" x2="470" y2="158" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
    <text x="480" y="147" text-anchor="start" font-size="11" fill="#56616f">logs complete traces</text>

    <!-- ===== Canonicalize ===== -->
    <rect x="150" y="160" width="640" height="60" rx="10" fill="#f7f8fa" stroke="#94a3b8" stroke-width="2"/>
    <text x="470" y="180" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2733">Canonicalize &#8594; step slices</text>
    <text x="470" y="197" text-anchor="middle" font-size="11" fill="#56616f">prompt &#183; local context &#183; tool schemas &#183; output &#183; verifier result</text>
    <text x="470" y="211" text-anchor="middle" font-size="11" fill="#56616f">retry count &#183; fallback metadata &#183; skill assignment</text>

    <!-- canonicalize -> offline bar -->
    <line x1="470" y1="220" x2="470" y2="230" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>

    <!-- ===== OFFLINE (Loop 2) bar ===== -->
    <rect x="150" y="232" width="640" height="48" rx="10" fill="#f5f3ff" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5 4"/>
    <text x="470" y="252" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2733">OFFLINE (Loop 2): three SEPARATE tracks over SHARED traces</text>
    <text x="470" y="269" text-anchor="middle" font-size="11" fill="#56616f">within-cycle ORDER is a scheduling choice (best: Skill &#8594; LLM &#8594; Router)</text>

    <!-- fan arrows: bar -> 3 tracks -->
    <line x1="248" y1="281" x2="248" y2="294" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>
    <line x1="470" y1="281" x2="470" y2="294" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>
    <line x1="692" y1="281" x2="692" y2="294" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>

    <!-- ===== Track 1: SkillBook ===== -->
    <rect x="150" y="296" width="196" height="104" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
    <text x="248" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#2563eb">1 &#183; SkillBook</text>
    <text x="248" y="344" text-anchor="middle" font-size="11" fill="#56616f">CPU: success/failure stats</text>
    <text x="248" y="361" text-anchor="middle" font-size="11" fill="#56616f">over recurring signatures</text>
    <text x="248" y="384" text-anchor="middle" font-size="11" font-weight="600" fill="#1f2733">grew to 34 sig / 120 obs</text>

    <!-- ===== Track 2: Learned router ===== -->
    <rect x="372" y="296" width="196" height="104" rx="10" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
    <text x="470" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#4f46e5">2 &#183; Learned router</text>
    <text x="470" y="346" text-anchor="middle" font-size="11" fill="#56616f">BERT-tiny on prompt text</text>
    <text x="470" y="363" text-anchor="middle" font-size="11" fill="#56616f">weak cheap/strong labels</text>

    <!-- ===== Track 3: LLM update ===== -->
    <rect x="594" y="296" width="196" height="104" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="2"/>
    <text x="692" y="322" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">3 &#183; LLM update</text>
    <text x="692" y="344" text-anchor="middle" font-size="11" fill="#56616f">GPU: LoRA on</text>
    <text x="692" y="361" text-anchor="middle" font-size="11" fill="#56616f">Qwen2.5-Coder-1.5B</text>
    <text x="692" y="384" text-anchor="middle" font-size="11" fill="#56616f">local GRPO on hard pool</text>

    <!-- converge arrows: 3 tracks -> gate -->
    <line x1="248" y1="400" x2="444" y2="430" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>
    <line x1="470" y1="400" x2="470" y2="419" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>
    <line x1="692" y1="400" x2="496" y2="430" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>

    <!-- ===== Gate (diamond) ===== -->
    <polygon points="470,420 622,476 470,532 318,476" fill="#f7f8fa" stroke="#334155" stroke-width="2.5"/>
    <text x="470" y="466" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2733">Joint replay admission:</text>
    <text x="470" y="482" text-anchor="middle" font-size="12" fill="#1f2733">combined quality</text>
    <text x="470" y="498" text-anchor="middle" font-size="12" fill="#1f2733">preserved?</text>

    <!-- ===== YES -> promote (green return loop to runtime) ===== -->
    <path d="M 318 476 C 150 540 40 515 40 330 C 40 150 120 99 286 99" fill="none" stroke="#16a34a" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
    <text x="88" y="452" text-anchor="start" font-size="12" font-weight="700" fill="#16a34a">YES &#8594; promote new combined</text>
    <text x="88" y="469" text-anchor="start" font-size="11" fill="#16a34a">(router + skill + adapter) state</text>
    <text x="88" y="486" text-anchor="start" font-size="11" fill="#16a34a">conservative monotone deployment</text>

    <!-- ===== NO -> keep current state (red) ===== -->
    <line x1="622" y1="476" x2="708" y2="476" stroke="#dc2626" stroke-width="2.5" marker-end="url(#arrowRed)"/>
    <text x="665" y="468" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">NO</text>
    <rect x="712" y="450" width="176" height="52" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="800" y="472" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2733">Keep current state</text>
    <text x="800" y="489" text-anchor="middle" font-size="11" fill="#56616f">(discard new state)</text>

    <!-- ===== Bottom note ===== -->
    <rect x="250" y="548" width="440" height="34" rx="8" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1"/>
    <text x="470" y="569" text-anchor="middle" font-size="11" font-weight="600" fill="#1f2733">Components judged by END-TO-END effect together, not isolated metrics.</text>

  </g>
</svg>
