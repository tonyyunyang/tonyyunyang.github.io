<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 392" role="img">
  <title>Speculative Decoding</title>
  <desc>Speculative decoding: a small draft model proposes k tokens autoregressively; the large target model verifies all k in one parallel forward pass, accepting the longest correct prefix and rejecting the rest. Output distribution is identical to the target model alone.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#15803d"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#1f2733">Speculative Decoding</text>

  <!-- ═══════════════════════════════ PHASE 1 LABEL ═══════════════════════════════ -->
  <text x="30" y="78" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#56616f">STEP 1 — Draft</text>

  <!-- Draft model box -->
  <rect x="30" y="88" width="148" height="52" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="104" y="109" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#2563eb">Draft Model</text>
  <text x="104" y="128" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">(small, fast)</text>

  <!-- Arrow from draft model to tokens -->
  <line x1="178" y1="114" x2="214" y2="114" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="214" y="83" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10" fill="#56616f">proposes k tokens</text>

  <!-- k draft token boxes (autoregressive, sequential arrows between them) -->
  <!-- Token 1 -->
  <rect x="220" y="95" width="60" height="38" rx="8" fill="#f7f8fa" stroke="#2563eb" stroke-width="2"/>
  <text x="250" y="110" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#1f2733">t₁</text>
  <text x="250" y="126" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10" fill="#56616f">draft</text>

  <line x1="280" y1="114" x2="298" y2="114" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrow-blue)"/>

  <!-- Token 2 -->
  <rect x="304" y="95" width="60" height="38" rx="8" fill="#f7f8fa" stroke="#2563eb" stroke-width="2"/>
  <text x="334" y="110" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#1f2733">t₂</text>
  <text x="334" y="126" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10" fill="#56616f">draft</text>

  <line x1="364" y1="114" x2="382" y2="114" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrow-blue)"/>

  <!-- Token 3 -->
  <rect x="388" y="95" width="60" height="38" rx="8" fill="#f7f8fa" stroke="#2563eb" stroke-width="2"/>
  <text x="418" y="110" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#1f2733">t₃</text>
  <text x="418" y="126" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10" fill="#56616f">draft</text>

  <line x1="448" y1="114" x2="466" y2="114" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#arrow-blue)"/>

  <!-- Token 4 -->
  <rect x="472" y="95" width="60" height="38" rx="8" fill="#f7f8fa" stroke="#2563eb" stroke-width="2"/>
  <text x="502" y="110" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#1f2733">t₄</text>
  <text x="502" y="126" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10" fill="#56616f">draft</text>

  <!-- ═══════════════════════════════ STEP 2 LABEL ═══════════════════════════════ -->
  <text x="30" y="169" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#56616f">STEP 2 — Verify (one parallel forward pass)</text>

  <!-- Target model box -->
  <rect x="30" y="192" width="148" height="52" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="104" y="213" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#2563eb">Target Model</text>
  <text x="104" y="232" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">(large, accurate)</text>

  <!-- Wide bracket / parallel pass arrow from target model to all 4 tokens -->
  <line x1="178" y1="218" x2="214" y2="218" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Verified token boxes — t1, t2 accepted (green), t3, t4 rejected (grey) -->
  <!-- Accepted token 1 -->
  <rect x="220" y="199" width="60" height="38" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
  <text x="250" y="214" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#15803d">t₁</text>
  <text x="250" y="230" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10" fill="#15803d">✓ accept</text>

  <!-- Accepted token 2 -->
  <rect x="304" y="199" width="60" height="38" rx="8" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
  <text x="334" y="214" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#15803d">t₂</text>
  <text x="334" y="230" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10" fill="#15803d">✓ accept</text>

  <!-- Rejected token 3 -->
  <rect x="388" y="199" width="60" height="38" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="418" y="214" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#94a3b8">t₃</text>
  <text x="418" y="230" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10" fill="#94a3b8">✗ reject</text>

  <!-- Rejected token 4 -->
  <rect x="472" y="199" width="60" height="38" rx="8" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <text x="502" y="214" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#94a3b8">t₄</text>
  <text x="502" y="230" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10" fill="#94a3b8">✗ reject</text>

  <!-- Bracket line above accepted tokens -->
  <line x1="220" y1="192" x2="364" y2="192" stroke="#15803d" stroke-width="1.5"/>
  <line x1="220" y1="192" x2="220" y2="199" stroke="#15803d" stroke-width="1.5"/>
  <line x1="364" y1="192" x2="364" y2="199" stroke="#15803d" stroke-width="1.5"/>
  <text x="292" y="187" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10" fill="#15803d">longest correct prefix</text>

  <!-- Cross line above rejected tokens -->
  <line x1="388" y1="192" x2="532" y2="192" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="388" y1="192" x2="388" y2="199" stroke="#94a3b8" stroke-width="1.5"/>
  <line x1="532" y1="192" x2="532" y2="199" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="460" y="187" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10" fill="#94a3b8">discarded</text>

  <!-- Output arrow and continue label -->
  <line x1="364" y1="218" x2="590" y2="218" stroke="#15803d" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="596" y="199" width="170" height="38" rx="10" fill="#dcfce7" stroke="#15803d" stroke-width="2"/>
  <text x="681" y="214" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#15803d">Output t₁, t₂</text>
  <text x="681" y="230" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#15803d">→ continue drafting</text>

  <!-- Divider -->
  <line x1="30" y1="275" x2="770" y2="275" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Key properties section -->
  <text x="400" y="298" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1f2733">Key Properties</text>

  <!-- Property boxes -->
  <!-- Property 1 -->
  <rect x="30" y="312" width="228" height="64" rx="10" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="144" y="333" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#1f2733">Lossless</text>
  <text x="144" y="351" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">Output distribution identical</text>
  <text x="144" y="367" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">to target model alone</text>

  <!-- Property 2 -->
  <rect x="286" y="312" width="228" height="64" rx="10" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="400" y="333" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#1f2733">Parallel Verification</text>
  <text x="400" y="351" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">Target checks all k tokens</text>
  <text x="400" y="367" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">in one forward pass</text>

  <!-- Property 3 -->
  <rect x="542" y="312" width="228" height="64" rx="10" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="656" y="333" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#1f2733">Fewer Large-Model Steps</text>
  <text x="656" y="351" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">~2–3× wall-clock speedup</text>
  <text x="656" y="367" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">vs. greedy decoding</text>

  <!-- Legend: draft model label on phase 1 -->
  <text x="220" y="150" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="10" fill="#2563eb" font-style="italic">autoregressive ──▶</text>
</svg>
