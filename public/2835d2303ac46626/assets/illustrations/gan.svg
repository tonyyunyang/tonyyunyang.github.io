<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img">
  <title>Generative Adversarial Network</title>
  <desc>Diagram of a GAN minimax game: noise z feeds a Generator G producing a fake sample; real samples from data also feed a Discriminator D which classifies real or fake. G minimizes (fools D) while D maximizes correct classification. Failure mode: mode collapse.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#15803d"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="38" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#1f2733" text-anchor="middle">Generative Adversarial Network</text>

  <!-- Minimax game label -->
  <text x="400" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#56616f" text-anchor="middle">minimax game: min_G max_D V(D, G)</text>

  <!-- ===== TOP PATH: Generator path ===== -->

  <!-- Noise z box -->
  <rect x="40" y="120" width="110" height="52" rx="10" stroke="#94a3b8" stroke-width="2" fill="#f7f8fa"/>
  <text x="95" y="141" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#1f2733" text-anchor="middle">noise</text>
  <text x="95" y="160" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-style="italic" fill="#2563eb" text-anchor="middle" font-weight="600">z</text>

  <!-- Arrow: z -> Generator G -->
  <line x1="150" y1="146" x2="208" y2="146" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Generator G box -->
  <rect x="210" y="118" width="120" height="56" rx="10" stroke="#2563eb" stroke-width="2" fill="#e8f0fe"/>
  <text x="270" y="143" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#1f2733" text-anchor="middle" font-weight="600">Generator</text>
  <text x="270" y="162" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-style="italic" fill="#2563eb" text-anchor="middle">G</text>

  <!-- Arrow: Generator -> fake sample -->
  <line x1="330" y1="146" x2="388" y2="146" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Fake sample box -->
  <rect x="390" y="118" width="120" height="56" rx="10" stroke="#94a3b8" stroke-width="2" fill="#f7f8fa"/>
  <text x="450" y="143" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#1f2733" text-anchor="middle">fake sample</text>
  <text x="450" y="162" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="middle">G(z)</text>

  <!-- ===== BOTTOM PATH: Real data path ===== -->

  <!-- Real sample box -->
  <rect x="390" y="248" width="120" height="56" rx="10" stroke="#15803d" stroke-width="2" fill="#f0fdf4"/>
  <text x="450" y="273" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#1f2733" text-anchor="middle">real sample</text>
  <text x="450" y="292" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="middle">x ~ p_data</text>

  <!-- Data source label -->
  <text x="240" y="276" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#1f2733" text-anchor="middle">data</text>
  <text x="240" y="295" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="middle">distribution</text>
  <rect x="178" y="258" width="124" height="46" rx="10" stroke="#15803d" stroke-width="2" fill="#f0fdf4"/>
  <text x="240" y="279" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#1f2733" text-anchor="middle">real data</text>
  <text x="240" y="296" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="middle">p_data(x)</text>

  <!-- Arrow: real data -> real sample -->
  <line x1="302" y1="281" x2="388" y2="276" stroke="#15803d" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- ===== Discriminator D ===== -->

  <!-- Arrow: fake sample -> Discriminator -->
  <line x1="510" y1="146" x2="590" y2="208" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Arrow label: fake -->
  <text x="548" y="168" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="middle">fake</text>

  <!-- Arrow: real sample -> Discriminator -->
  <line x1="510" y1="276" x2="590" y2="240" stroke="#15803d" stroke-width="2" marker-end="url(#arrow-green)"/>
  <!-- Arrow label: real -->
  <text x="548" y="268" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="middle">real</text>

  <!-- Discriminator D box -->
  <rect x="592" y="190" width="128" height="64" rx="10" stroke="#f59e0b" stroke-width="2" fill="#fffbeb"/>
  <text x="656" y="218" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#1f2733" text-anchor="middle" font-weight="600">Discriminator</text>
  <text x="656" y="237" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-style="italic" fill="#f59e0b" text-anchor="middle">D</text>

  <!-- Arrow: Discriminator -> output -->
  <line x1="720" y1="222" x2="758" y2="222" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Output label -->
  <text x="762" y="213" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#1f2733" text-anchor="start">real</text>
  <text x="762" y="228" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#1f2733" text-anchor="start">or</text>
  <text x="762" y="243" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#1f2733" text-anchor="start">fake?</text>

  <!-- ===== Objective annotation arrows ===== -->

  <!-- D maximizes: label near Discriminator -->
  <text x="656" y="338" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#f59e0b" text-anchor="middle" font-weight="600">D maximizes</text>
  <text x="656" y="354" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="middle">correct classification</text>
  <line x1="656" y1="324" x2="656" y2="256" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-amber)"/>

  <!-- G minimizes: curved feedback arrow from D back to G -->
  <!-- Feedback line going left from Discriminator -->
  <path d="M 656 190 Q 656 88 270 88 Q 270 110 270 118" stroke="#2563eb" stroke-width="2" stroke-dasharray="6,3" fill="none" marker-end="url(#arrow-blue)"/>
  <text x="460" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#2563eb" text-anchor="middle" font-weight="600">G minimizes (fools D)</text>

  <!-- Failure mode note -->
  <rect x="40" y="335" width="260" height="36" rx="8" stroke="#94a3b8" stroke-width="1.5" fill="#f7f8fa"/>
  <text x="170" y="351" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="middle">failure mode:</text>
  <text x="170" y="365" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="middle" font-weight="600">mode collapse</text>

  <!-- Minimax equation note -->
  <text x="400" y="395" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="middle">D*(x) = p_data(x) / (p_data(x) + p_G(x))  —  global optimum when p_G = p_data</text>

</svg>
