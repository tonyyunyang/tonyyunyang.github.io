<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 10 800 390" role="img">
  <title>LLM Routing</title>
  <desc>A query enters a tiny router classifier. The router sends ~85% of easy queries to a small cheap model and ~15% of hard queries to a large expensive model. Exactly one model runs per query, yielding over 90% cost reduction at matched quality. This is not ensembling.</desc>

  <defs>
    <!-- Standard arrowhead -->
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <!-- Thin arrowhead for the hard path -->
    <marker id="arrow-thin" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#1f2733">LLM Routing</text>

  <!-- ── Query box ── -->
  <rect x="40" y="160" width="120" height="52" rx="10" fill="#f7f8fa" stroke="#94a3b8" stroke-width="2"/>
  <text x="100" y="181" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1f2733">Query</text>
  <text x="100" y="200" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#56616f">incoming</text>

  <!-- Arrow: Query → Router -->
  <line x1="161" y1="186" x2="255" y2="186" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── Router box ── -->
  <rect x="256" y="152" width="148" height="68" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="330" y="176" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#1f2733">Router</text>
  <text x="330" y="196" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#2563eb">(tiny classifier)</text>
  <text x="330" y="212" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">predicts difficulty</text>

  <!-- ── THICK arrow: easy path (Router → Small model) ── -->
  <!-- goes right then curves down-right toward small model at bottom-right -->
  <!-- We'll draw: from router right edge, diagonal thick line down-right to small model -->
  <!-- Router right edge center: (404, 186). Small model box top-center: (580, 270) -->
  <line x1="404" y1="186" x2="536" y2="270" stroke="#2563eb" stroke-width="4" marker-end="url(#arrow)"/>
  <!-- Label on thick arrow: placed clearly BELOW the diagonal line in the open wedge -->
  <text x="452" y="250" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#2563eb">~85% easy</text>

  <!-- ── THIN arrow: hard path (Router → Large model) ── -->
  <!-- goes right then angled up-right toward large model at top-right -->
  <!-- Router right edge center: (404, 186). Large model box bottom-center: (580, 100) -->
  <line x1="404" y1="186" x2="536" y2="110" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow-thin)"/>
  <!-- Label on thin arrow: placed clearly ABOVE the diagonal line so the stroke does not clip it -->
  <text x="450" y="128" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#56616f">~15% hard tail</text>

  <!-- ── Small cheap model box ── -->
  <rect x="537" y="270" width="180" height="62" rx="10" fill="#f7f8fa" stroke="#94a3b8" stroke-width="2"/>
  <text x="627" y="294" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1f2733">Small cheap model</text>
  <text x="627" y="314" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#56616f">fast · low cost</text>

  <!-- ── Large expensive model box ── -->
  <rect x="537" y="60" width="180" height="62" rx="10" fill="#f7f8fa" stroke="#94a3b8" stroke-width="2"/>
  <text x="627" y="85" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1f2733">Large expensive model</text>
  <text x="627" y="105" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#56616f">powerful · high cost</text>

  <!-- ── Note box at the bottom ── -->
  <rect x="40" y="350" width="720" height="36" rx="8" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1"/>
  <text x="400" y="365" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#1f2733">Exactly one model runs per query</text>
  <text x="400" y="380" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">&gt;90% cost cut at matched quality · NOT ensembling (ensembling runs all models)</text>
</svg>
