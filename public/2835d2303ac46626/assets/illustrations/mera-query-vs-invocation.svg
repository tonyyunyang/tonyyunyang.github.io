<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 470" role="img">
  <title>Query-level vs. invocation-level routing in MERA</title>
  <desc>One agent trace interleaves easy and hard steps; query-level routing picks one model for the whole task, while MERA routes each invocation cheap on easy checkable steps and strong on hard ones with a verifier fallback.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
  </defs>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">

    <!-- faint column guides (drawn first, behind everything) -->
    <g stroke="#d4dbe6" stroke-width="1" stroke-dasharray="2 5">
      <line x1="215" y1="134" x2="215" y2="289"/>
      <line x1="344" y1="134" x2="344" y2="289"/>
      <line x1="473" y1="134" x2="473" y2="289"/>
      <line x1="602" y1="134" x2="602" y2="289"/>
      <line x1="731" y1="134" x2="731" y2="289"/>
      <line x1="860" y1="134" x2="860" y2="289"/>
    </g>

    <!-- Title -->
    <text x="20" y="26" font-size="18" font-weight="700" fill="#1f2733">Query-level vs. invocation-level routing</text>
    <text x="20" y="44" font-size="11.5" fill="#56616f">MERA routes per invocation, not per task. Easy and hard steps are interleaved inside one trace.</text>

    <!-- ============ BAND 1: the trace ============ -->
    <text x="20" y="62" font-size="13" font-weight="700" fill="#1f2733">1 &#183; One multi-step agent trace</text>
    <text x="306" y="62" font-size="11" fill="#56616f">green = easy / checkable step &#183; red = hard reasoning step</text>

    <!-- step 1 easy -->
    <rect x="160" y="72" width="110" height="60" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <circle cx="175" cy="86" r="9" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
    <text x="175" y="89.5" font-size="11" font-weight="700" fill="#1f2733" text-anchor="middle">1</text>
    <text x="215" y="98" font-size="11" font-weight="600" fill="#1f2733" text-anchor="middle">Extract</text>
    <text x="215" y="111" font-size="11" font-weight="600" fill="#1f2733" text-anchor="middle">attributes</text>
    <rect x="192" y="116" width="46" height="13" rx="6" fill="#bbf7d0"/>
    <text x="215" y="125.5" font-size="9.5" font-weight="700" fill="#15803d" text-anchor="middle">easy</text>

    <!-- step 2 easy -->
    <rect x="289" y="72" width="110" height="60" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <circle cx="304" cy="86" r="9" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
    <text x="304" y="89.5" font-size="11" font-weight="700" fill="#1f2733" text-anchor="middle">2</text>
    <text x="344" y="98" font-size="11" font-weight="600" fill="#1f2733" text-anchor="middle">Format</text>
    <text x="344" y="111" font-size="11" font-weight="600" fill="#1f2733" text-anchor="middle">output</text>
    <rect x="321" y="116" width="46" height="13" rx="6" fill="#bbf7d0"/>
    <text x="344" y="125.5" font-size="9.5" font-weight="700" fill="#15803d" text-anchor="middle">easy</text>

    <!-- step 3 hard -->
    <rect x="418" y="72" width="110" height="60" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <circle cx="433" cy="86" r="9" fill="#ffffff" stroke="#dc2626" stroke-width="1.5"/>
    <text x="433" y="89.5" font-size="11" font-weight="700" fill="#1f2733" text-anchor="middle">3</text>
    <text x="473" y="98" font-size="11" font-weight="600" fill="#1f2733" text-anchor="middle">Multi-hop</text>
    <text x="473" y="111" font-size="11" font-weight="600" fill="#1f2733" text-anchor="middle">reasoning</text>
    <rect x="450" y="116" width="46" height="13" rx="6" fill="#fecaca"/>
    <text x="473" y="125.5" font-size="9.5" font-weight="700" fill="#b91c1c" text-anchor="middle">HARD</text>

    <!-- step 4 easy -->
    <rect x="547" y="72" width="110" height="60" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <circle cx="562" cy="86" r="9" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
    <text x="562" y="89.5" font-size="11" font-weight="700" fill="#1f2733" text-anchor="middle">4</text>
    <text x="602" y="98" font-size="11" font-weight="600" fill="#1f2733" text-anchor="middle">Build</text>
    <text x="602" y="111" font-size="11" font-weight="600" fill="#1f2733" text-anchor="middle">tool args</text>
    <rect x="579" y="116" width="46" height="13" rx="6" fill="#bbf7d0"/>
    <text x="602" y="125.5" font-size="9.5" font-weight="700" fill="#15803d" text-anchor="middle">easy</text>

    <!-- step 5 hard -->
    <rect x="676" y="72" width="110" height="60" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <circle cx="691" cy="86" r="9" fill="#ffffff" stroke="#dc2626" stroke-width="1.5"/>
    <text x="691" y="89.5" font-size="11" font-weight="700" fill="#1f2733" text-anchor="middle">5</text>
    <text x="731" y="98" font-size="11" font-weight="600" fill="#1f2733" text-anchor="middle">Plan next</text>
    <text x="731" y="111" font-size="11" font-weight="600" fill="#1f2733" text-anchor="middle">steps</text>
    <rect x="708" y="116" width="46" height="13" rx="6" fill="#fecaca"/>
    <text x="731" y="125.5" font-size="9.5" font-weight="700" fill="#b91c1c" text-anchor="middle">HARD</text>

    <!-- step 6 easy -->
    <rect x="805" y="72" width="110" height="60" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <circle cx="820" cy="86" r="9" fill="#ffffff" stroke="#16a34a" stroke-width="1.5"/>
    <text x="820" y="89.5" font-size="11" font-weight="700" fill="#1f2733" text-anchor="middle">6</text>
    <text x="860" y="98" font-size="11" font-weight="600" fill="#1f2733" text-anchor="middle">Summarize</text>
    <text x="860" y="111" font-size="11" font-weight="600" fill="#1f2733" text-anchor="middle">result</text>
    <rect x="837" y="116" width="46" height="13" rx="6" fill="#bbf7d0"/>
    <text x="860" y="125.5" font-size="9.5" font-weight="700" fill="#15803d" text-anchor="middle">easy</text>

    <!-- trace arrows -->
    <g stroke="#94a3b8" stroke-width="2">
      <line x1="271" y1="102" x2="287" y2="102" marker-end="url(#arrowGray)"/>
      <line x1="400" y1="102" x2="416" y2="102" marker-end="url(#arrowGray)"/>
      <line x1="529" y1="102" x2="545" y2="102" marker-end="url(#arrowGray)"/>
      <line x1="658" y1="102" x2="674" y2="102" marker-end="url(#arrowGray)"/>
      <line x1="787" y1="102" x2="803" y2="102" marker-end="url(#arrowGray)"/>
    </g>

    <!-- ============ BAND 2: query-level routing ============ -->
    <text x="20" y="156" font-size="13" font-weight="700" fill="#1f2733">2 &#183; Query-level routing (prior work): one model serves the whole task</text>

    <!-- bar A: pick strong -->
    <rect x="160" y="168" width="755" height="30" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
    <text x="172" y="187" font-size="11.5" font-weight="600" fill="#1e3a8a">Pick the STRONG model for the entire trace</text>
    <text x="903" y="187" font-size="11" font-weight="600" fill="#c2410c" text-anchor="end">&#8594; pays strong-model price on the 4 easy steps</text>

    <!-- bar B: pick cheap -->
    <rect x="160" y="206" width="755" height="30" rx="10" fill="#fef9c3" stroke="#ea580c" stroke-width="2"/>
    <text x="172" y="225" font-size="11.5" font-weight="600" fill="#92400e">Pick the CHEAP model for the entire trace</text>
    <text x="903" y="225" font-size="11" font-weight="600" fill="#dc2626" text-anchor="end">&#8594; cheap model fails the 2 hard steps</text>

    <text x="160" y="254" font-size="11" font-style="italic" fill="#56616f">One route per task can't fit a trace whose difficulty changes step to step.</text>

    <!-- ============ BAND 3: invocation-level routing (MERA) ============ -->
    <text x="20" y="278" font-size="13" font-weight="700" fill="#1f2733">3 &#183; Invocation-level routing (MERA): route each step on its own input</text>

    <!-- cell 1 cheap -->
    <rect x="160" y="290" width="110" height="60" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="215" y="305" font-size="9.5" fill="#94a3b8" text-anchor="middle">extract</text>
    <text x="215" y="323" font-size="12.5" font-weight="700" fill="#15803d" text-anchor="middle">&#8594; cheap</text>
    <text x="215" y="337" font-size="10" fill="#475569" text-anchor="middle">easy, checkable</text>

    <!-- cell 2 cheap -->
    <rect x="289" y="290" width="110" height="60" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="344" y="305" font-size="9.5" fill="#94a3b8" text-anchor="middle">format</text>
    <text x="344" y="323" font-size="12.5" font-weight="700" fill="#15803d" text-anchor="middle">&#8594; cheap</text>
    <text x="344" y="337" font-size="10" fill="#475569" text-anchor="middle">easy, checkable</text>

    <!-- cell 3 strong -->
    <rect x="418" y="290" width="110" height="60" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
    <text x="473" y="305" font-size="9.5" fill="#94a3b8" text-anchor="middle">reason</text>
    <text x="473" y="323" font-size="12.5" font-weight="700" fill="#1d4ed8" text-anchor="middle">&#8594; strong</text>
    <text x="473" y="337" font-size="10" fill="#475569" text-anchor="middle">hard reasoning</text>

    <!-- cell 4 cheap -->
    <rect x="547" y="290" width="110" height="60" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="602" y="305" font-size="9.5" fill="#94a3b8" text-anchor="middle">tool args</text>
    <text x="602" y="323" font-size="12.5" font-weight="700" fill="#15803d" text-anchor="middle">&#8594; cheap</text>
    <text x="602" y="337" font-size="10" fill="#475569" text-anchor="middle">easy, checkable</text>

    <!-- cell 5 strong -->
    <rect x="676" y="290" width="110" height="60" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
    <text x="731" y="305" font-size="9.5" fill="#94a3b8" text-anchor="middle">plan</text>
    <text x="731" y="323" font-size="12.5" font-weight="700" fill="#1d4ed8" text-anchor="middle">&#8594; strong</text>
    <text x="731" y="337" font-size="10" fill="#475569" text-anchor="middle">hard reasoning</text>

    <!-- cell 6 cheap -->
    <rect x="805" y="290" width="110" height="60" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="860" y="305" font-size="9.5" fill="#94a3b8" text-anchor="middle">summary</text>
    <text x="860" y="323" font-size="12.5" font-weight="700" fill="#15803d" text-anchor="middle">&#8594; cheap</text>
    <text x="860" y="337" font-size="10" fill="#475569" text-anchor="middle">easy, checkable</text>

    <!-- verifier callout -->
    <rect x="160" y="358" width="755" height="26" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
    <text x="172" y="375" font-size="11.5" fill="#166534">Verifier checks each step; if a down-routed cheap step fails, the invocation falls back to a stronger model.</text>

    <!-- ============ takeaway ============ -->
    <rect x="14" y="398" width="912" height="56" rx="10" fill="#fef9c3" stroke="#ea580c" stroke-width="2"/>
    <text x="30" y="431" font-size="12" font-weight="700" fill="#9a3412">TAKEAWAY</text>
    <text x="122" y="421" font-size="11" fill="#1f2733">Easy and hard steps interleave inside one trace, so one route per task is too coarse.</text>
    <text x="122" y="439" font-size="11" fill="#1f2733">MERA routes per invocation: cheap on easy / checkable steps, strong on hard ones, with verifier-fallback if a cheap step fails.</text>

  </g>
</svg>