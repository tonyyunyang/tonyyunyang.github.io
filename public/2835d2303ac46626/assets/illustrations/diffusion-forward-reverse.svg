<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 352" role="img">
  <title>A diffusion model: noise it forward, learn to denoise it back</title>
  <desc>A single horizontal diffusion chain. Top slate arrows run left to right as the forward process q, adding a little Gaussian noise each step to turn clean data x0 into pure noise xT. Bottom blue arrows run right to left as the learned reverse process p-theta, where a U-Net denoiser removes one step of noise at a time, recovering x0 from pure noise. A callout explains the training target and sampling.</desc>

  <defs>
    <marker id="arw" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arwg" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">

    <!-- Title + subtitle -->
    <text x="480" y="32" text-anchor="middle" font-size="19" font-weight="700" fill="#1f2733">A diffusion model: noise it forward, learn to denoise it back</text>
    <text x="480" y="52" text-anchor="middle" font-size="12" fill="#56616f">one chain &#183; forward q adds a little noise each step &#183; a learned reverse pass walks it back to data</text>

    <!-- Chain region background -->
    <rect x="24" y="92" width="576" height="244" rx="10" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5 4"/>

    <!-- Forward process caption (top of chain) -->
    <text x="312" y="112" text-anchor="middle" font-size="12" fill="#56616f"><tspan font-weight="700">forward process q:</tspan> add a little Gaussian noise each step</text>

    <!-- ============================ TILES ============================ -->

    <!-- x0 : clean data (blue filled, a little picture) -->
    <rect x="40" y="128" width="70" height="72" rx="8" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
    <circle cx="60" cy="152" r="6" fill="#2563eb"/>
    <polygon points="68,182 84,160 100,182" fill="#cfe0fd" stroke="#2563eb" stroke-width="1"/>
    <line x1="48" y1="190" x2="102" y2="190" stroke="#2563eb" stroke-width="1.2"/>
    <text x="75" y="216" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2733">x<tspan dy="3" font-size="9">0</tspan></text>
    <text x="75" y="229" text-anchor="middle" font-size="10" fill="#56616f">clean data</text>

    <!-- x1 : slightly noisy -->
    <rect x="160" y="128" width="70" height="72" rx="8" fill="#eef4ff" stroke="#94a3b8" stroke-width="1.5"/>
    <circle cx="180" cy="152" r="5" fill="none" stroke="#94a3b8" stroke-width="1.2"/>
    <polygon points="188,182 200,162 212,182" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1"/>
    <line x1="168" y1="188" x2="222" y2="188" stroke="#94a3b8" stroke-width="1"/>
    <g fill="#94a3b8">
      <rect x="206" y="140" width="3.5" height="3.5"/><rect x="218" y="150" width="3.5" height="3.5"/>
      <rect x="172" y="168" width="3.5" height="3.5"/><rect x="196" y="190" width="3.5" height="3.5"/>
    </g>
    <text x="195" y="216" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2733">x<tspan dy="3" font-size="9">1</tspan></text>
    <text x="195" y="229" text-anchor="middle" font-size="10" fill="#56616f">a little noise</text>

    <!-- x2 : more noise -->
    <rect x="280" y="128" width="70" height="72" rx="8" fill="#eef1f5" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="288" y1="186" x2="342" y2="186" stroke="#cbd5e1" stroke-width="1"/>
    <g fill="#94a3b8">
      <rect x="294" y="138" width="3.5" height="3.5"/><rect x="310" y="146" width="3.5" height="3.5"/>
      <rect x="326" y="140" width="3.5" height="3.5"/><rect x="340" y="150" width="3.5" height="3.5"/>
      <rect x="300" y="160" width="3.5" height="3.5"/><rect x="320" y="168" width="3.5" height="3.5"/>
      <rect x="290" y="178" width="3.5" height="3.5"/><rect x="334" y="182" width="3.5" height="3.5"/>
      <rect x="308" y="192" width="3.5" height="3.5"/>
    </g>
    <text x="315" y="216" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2733">x<tspan dy="3" font-size="9">2</tspan></text>
    <text x="315" y="229" text-anchor="middle" font-size="10" fill="#56616f">more noise</text>

    <!-- x_{T-1} : almost noise -->
    <rect x="400" y="128" width="70" height="72" rx="8" fill="#eef1f5" stroke="#94a3b8" stroke-width="1.5"/>
    <g fill="#94a3b8">
      <rect x="410" y="138" width="3.5" height="3.5"/><rect x="426" y="140" width="3.5" height="3.5"/>
      <rect x="442" y="136" width="3.5" height="3.5"/><rect x="456" y="146" width="3.5" height="3.5"/>
      <rect x="412" y="154" width="3.5" height="3.5"/><rect x="430" y="156" width="3.5" height="3.5"/>
      <rect x="448" y="160" width="3.5" height="3.5"/><rect x="406" y="168" width="3.5" height="3.5"/>
      <rect x="424" y="170" width="3.5" height="3.5"/><rect x="444" y="174" width="3.5" height="3.5"/>
      <rect x="458" y="180" width="3.5" height="3.5"/><rect x="414" y="184" width="3.5" height="3.5"/>
      <rect x="434" y="188" width="3.5" height="3.5"/><rect x="452" y="192" width="3.5" height="3.5"/>
    </g>
    <text x="435" y="216" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2733">x<tspan dy="3" font-size="9">T&#8722;1</tspan></text>
    <text x="435" y="229" text-anchor="middle" font-size="10" fill="#56616f">almost noise</text>

    <!-- xT : pure noise (gray, dense static) -->
    <rect x="520" y="128" width="70" height="72" rx="8" fill="#e9edf2" stroke="#94a3b8" stroke-width="1.5"/>
    <g fill="#94a3b8">
      <rect x="528" y="136" width="3.5" height="3.5"/><rect x="540" y="140" width="3.5" height="3.5"/>
      <rect x="554" y="137" width="3.5" height="3.5"/><rect x="566" y="142" width="3.5" height="3.5"/>
      <rect x="578" y="138" width="3.5" height="3.5"/><rect x="532" y="150" width="3.5" height="3.5"/>
      <rect x="546" y="148" width="3.5" height="3.5"/><rect x="560" y="152" width="3.5" height="3.5"/>
      <rect x="572" y="150" width="3.5" height="3.5"/><rect x="582" y="156" width="3.5" height="3.5"/>
      <rect x="530" y="162" width="3.5" height="3.5"/><rect x="544" y="164" width="3.5" height="3.5"/>
      <rect x="558" y="160" width="3.5" height="3.5"/><rect x="570" y="166" width="3.5" height="3.5"/>
      <rect x="580" y="168" width="3.5" height="3.5"/><rect x="534" y="176" width="3.5" height="3.5"/>
      <rect x="548" y="178" width="3.5" height="3.5"/><rect x="562" y="174" width="3.5" height="3.5"/>
      <rect x="576" y="180" width="3.5" height="3.5"/><rect x="536" y="190" width="3.5" height="3.5"/>
      <rect x="552" y="188" width="3.5" height="3.5"/><rect x="568" y="192" width="3.5" height="3.5"/>
    </g>
    <text x="555" y="216" text-anchor="middle" font-size="13" font-weight="700" fill="#1f2733">x<tspan dy="3" font-size="9">T</tspan></text>
    <text x="555" y="229" text-anchor="middle" font-size="10" fill="#56616f">pure noise</text>

    <!-- ============================ ARROWS ============================ -->
    <!-- Forward (slate, left -> right) at y=150 -->
    <line x1="112" y1="150" x2="158" y2="150" stroke="#94a3b8" stroke-width="2" marker-end="url(#arwg)"/>
    <line x1="232" y1="150" x2="278" y2="150" stroke="#94a3b8" stroke-width="2" marker-end="url(#arwg)"/>
    <line x1="352" y1="150" x2="398" y2="150" stroke="#94a3b8" stroke-width="2" marker-end="url(#arwg)"/>
    <line x1="472" y1="150" x2="518" y2="150" stroke="#94a3b8" stroke-width="2" marker-end="url(#arwg)"/>

    <!-- Reverse (blue, right -> left) at y=182 -->
    <line x1="158" y1="182" x2="112" y2="182" stroke="#2563eb" stroke-width="2" marker-end="url(#arw)"/>
    <line x1="278" y1="182" x2="232" y2="182" stroke="#2563eb" stroke-width="2" marker-end="url(#arw)"/>
    <line x1="398" y1="182" x2="352" y2="182" stroke="#2563eb" stroke-width="2" marker-end="url(#arw)"/>
    <line x1="518" y1="182" x2="472" y2="182" stroke="#2563eb" stroke-width="2" marker-end="url(#arw)"/>

    <!-- ============================ U-NET GLYPH ============================ -->
    <!-- connector from a reverse step down to the denoiser -->
    <line x1="375" y1="184" x2="375" y2="250" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#arwg)"/>

    <!-- encoder / decoder trapezoid pair (shallow V) -->
    <line x1="350" y1="256" x2="400" y2="256" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 3"/>
    <polygon points="340,254 365,261 365,281 340,288" fill="#e8f0fe" stroke="#2563eb" stroke-width="1.5"/>
    <polygon points="385,261 410,254 410,288 385,281" fill="#e8f0fe" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="365" y1="271" x2="385" y2="271" stroke="#2563eb" stroke-width="1.5"/>
    <text x="375" y="304" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">U-Net denoiser</text>

    <!-- Reverse process caption (bottom of chain) -->
    <text x="312" y="326" text-anchor="middle" font-size="12" fill="#2563eb"><tspan font-weight="700">reverse process p<tspan dy="3" font-size="9">&#952;</tspan><tspan dy="-3">:</tspan></tspan> a U-Net denoises one step at a time</text>

    <!-- ============================ CALLOUT ============================ -->
    <rect x="620" y="120" width="316" height="140" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="1.5"/>
    <text x="778" y="145" text-anchor="middle" font-size="12" font-weight="700" fill="#1f2733">How it's trained &amp; sampled</text>
    <text x="778" y="167" text-anchor="middle" font-size="11" fill="#56616f">Train the U-Net to predict the added</text>
    <text x="778" y="183" text-anchor="middle" font-size="11" fill="#56616f">noise <tspan fill="#2563eb" font-weight="600">&#949;</tspan> &#8212; or, equivalently, the clean</text>
    <text x="778" y="199" text-anchor="middle" font-size="11" fill="#56616f">sample <tspan fill="#2563eb" font-weight="600">x<tspan dy="3" font-size="9">0</tspan></tspan>. The two targets agree.</text>
    <text x="778" y="223" text-anchor="middle" font-size="11" fill="#56616f">To sample: start from pure noise x<tspan dy="3" font-size="9">T</tspan></text>
    <text x="778" y="239" text-anchor="middle" font-size="11" fill="#56616f">and run the reverse chain back to x<tspan dy="3" font-size="9">0</tspan>.</text>

  </g>
</svg>
