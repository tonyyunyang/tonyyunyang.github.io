<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" role="img">
  <title>What makes Diffusion Weights non-standard: the target is the future</title>
  <desc>Two stacked rows contrast the denoiser target. Top row, a normal image DDPM: a clean sample x0 has noise added to become x_t, a U-Net denoises it, and the prediction targets the same clean x0 (a reconstructor). Bottom row, Diffusion Weights: a current-epoch weight latent z_tau has noise added, a conditioned U-Net predicts a future-epoch weight latent z_tau+delta (the next checkpoint), shown advancing along a training-time axis (a forecaster).</desc>

  <defs>
    <marker id="arw" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arwg" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arwGr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#15803d"/>
    </marker>
    <marker id="arwAm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#b45309"/>
    </marker>
  </defs>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">

    <!-- Title + subtitle -->
    <text x="480" y="30" text-anchor="middle" font-size="18" font-weight="700" fill="#1f2733">What makes Diffusion Weights non-standard: the target is the future, not the same sample</text>
    <text x="480" y="50" text-anchor="middle" font-size="12" fill="#56616f">Same diffusion machinery, but the denoiser forecasts a future weight checkpoint instead of reconstructing its own input</text>

    <!-- =================== TOP ROW: Normal denoiser =================== -->
    <rect x="24" y="64" width="912" height="168" rx="10" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5 4"/>
    <text x="40" y="85" font-size="13" font-weight="700" fill="#15803d">Normal denoiser <tspan font-weight="400" font-size="11" fill="#56616f">&#8212; standard image DDPM</tspan></text>

    <!-- Box A: x0 clean -->
    <rect x="40" y="122" width="88" height="56" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
    <text x="84" y="148" text-anchor="middle" font-size="14" font-weight="600" fill="#1f2733">x<tspan dy="3" font-size="9">0</tspan></text>
    <text x="84" y="166" text-anchor="middle" font-size="10" fill="#56616f">clean sample</text>

    <!-- A -> B -->
    <line x1="128" y1="150" x2="182" y2="150" stroke="#2563eb" stroke-width="2" marker-end="url(#arw)"/>
    <rect x="132" y="132" width="46" height="12" fill="#f7f8fa"/>
    <text x="155" y="142" text-anchor="middle" font-size="9" fill="#2563eb">add noise</text>

    <!-- Box B: x_t noisy -->
    <rect x="184" y="122" width="92" height="56" rx="10" fill="#eef1f6" stroke="#94a3b8" stroke-width="2"/>
    <text x="230" y="148" text-anchor="middle" font-size="14" font-weight="600" fill="#1f2733">x<tspan dy="3" font-size="9">t</tspan></text>
    <text x="230" y="166" text-anchor="middle" font-size="10" fill="#56616f">noisy</text>

    <!-- B -> U -->
    <line x1="276" y1="150" x2="288" y2="150" stroke="#2563eb" stroke-width="2" marker-end="url(#arw)"/>

    <!-- U-Net box -->
    <rect x="290" y="122" width="104" height="56" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
    <text x="342" y="148" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb">U-Net F<tspan dy="3" font-size="9">&#968;</tspan></text>
    <text x="342" y="166" text-anchor="middle" font-size="10" fill="#56616f">(denoiser)</text>

    <!-- U -> C -->
    <line x1="394" y1="150" x2="430" y2="150" stroke="#2563eb" stroke-width="2" marker-end="url(#arw)"/>
    <rect x="396" y="132" width="34" height="12" fill="#f7f8fa"/>
    <text x="412" y="142" text-anchor="middle" font-size="9" fill="#2563eb">predict</text>

    <!-- Box C: x0_hat -->
    <rect x="432" y="122" width="96" height="56" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
    <text x="480" y="148" text-anchor="middle" font-size="14" font-weight="600" fill="#1f2733">x&#770;<tspan dy="3" font-size="9">0</tspan></text>
    <text x="480" y="166" text-anchor="middle" font-size="10" fill="#56616f">prediction</text>

    <!-- C -> green target -->
    <line x1="528" y1="150" x2="614" y2="150" stroke="#15803d" stroke-width="2" marker-end="url(#arwGr)"/>
    <rect x="536" y="132" width="72" height="12" fill="#f7f8fa"/>
    <text x="572" y="142" text-anchor="middle" font-size="9" fill="#15803d">&#10003; same as input</text>

    <!-- green target box -->
    <rect x="620" y="116" width="304" height="70" rx="10" fill="#f0fdf4" stroke="#15803d" stroke-width="2"/>
    <text x="772" y="131" text-anchor="middle" font-size="9" font-weight="700" fill="#15803d" letter-spacing="1">DENOISER TARGET</text>
    <text x="772" y="148" text-anchor="middle" font-size="12.5" font-weight="700" fill="#15803d">target = the same clean sample</text>
    <text x="772" y="163" text-anchor="middle" font-size="10" fill="#56616f">x&#770;<tspan dy="3" font-size="8">0</tspan><tspan dy="-3" font-size="10"> should equal the original x</tspan><tspan dy="3" font-size="8">0</tspan></text>
    <text x="772" y="177" text-anchor="middle" font-size="9.5" fill="#56616f">(a reconstructor)</text>

    <!-- dashed loop-back: target IS the input -->
    <path d="M84,178 C 84,214 470,214 658,188" fill="none" stroke="#15803d" stroke-width="1.4" stroke-dasharray="6 4" marker-end="url(#arwGr)"/>
    <rect x="300" y="203" width="184" height="12" fill="#f7f8fa"/>
    <text x="392" y="213" text-anchor="middle" font-size="9.5" fill="#15803d">the target points back to the input</text>

    <!-- =================== BOTTOM ROW: Diffusion Weights =================== -->
    <rect x="24" y="246" width="912" height="196" rx="10" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5 4"/>
    <text x="40" y="267" font-size="13" font-weight="700" fill="#b45309">Diffusion Weights <tspan font-weight="400" font-size="11" fill="#56616f">&#8212; weight-space forecaster</tspan></text>

    <!-- Box A: z_tau -->
    <rect x="40" y="302" width="88" height="56" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
    <text x="84" y="328" text-anchor="middle" font-size="14" font-weight="600" fill="#1f2733">z<tspan dy="3" font-size="9">&#964;</tspan></text>
    <text x="84" y="346" text-anchor="middle" font-size="9.5" fill="#56616f">current weight latent</text>

    <!-- A -> B -->
    <line x1="128" y1="330" x2="182" y2="330" stroke="#2563eb" stroke-width="2" marker-end="url(#arw)"/>
    <rect x="132" y="312" width="46" height="12" fill="#f7f8fa"/>
    <text x="155" y="322" text-anchor="middle" font-size="9" fill="#2563eb">add noise</text>

    <!-- Box B: noisy z_tau -->
    <rect x="184" y="302" width="92" height="56" rx="10" fill="#eef1f6" stroke="#94a3b8" stroke-width="2"/>
    <text x="230" y="328" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2733">noisy z<tspan dy="3" font-size="9">&#964;</tspan></text>
    <text x="230" y="346" text-anchor="middle" font-size="10" fill="#56616f">noisy</text>

    <!-- B -> U -->
    <line x1="276" y1="330" x2="288" y2="330" stroke="#2563eb" stroke-width="2" marker-end="url(#arw)"/>

    <!-- conditioned U-Net box -->
    <rect x="290" y="302" width="104" height="56" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
    <text x="342" y="328" text-anchor="middle" font-size="12" font-weight="600" fill="#2563eb">U-Net F<tspan dy="3" font-size="9">&#968;</tspan></text>
    <text x="342" y="346" text-anchor="middle" font-size="10" fill="#56616f">(conditioned)</text>

    <!-- U -> C -->
    <line x1="394" y1="330" x2="430" y2="330" stroke="#2563eb" stroke-width="2" marker-end="url(#arw)"/>
    <rect x="396" y="312" width="34" height="12" fill="#f7f8fa"/>
    <text x="412" y="322" text-anchor="middle" font-size="9" fill="#2563eb">predict</text>

    <!-- Box C: z_tau+delta -->
    <rect x="432" y="302" width="96" height="56" rx="10" fill="#fff7ed" stroke="#b45309" stroke-width="2"/>
    <text x="480" y="328" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2733">z<tspan dy="3" font-size="9">&#964;+&#948;</tspan></text>
    <text x="480" y="346" text-anchor="middle" font-size="9.5" fill="#56616f">future latent</text>

    <!-- C -> amber target -->
    <line x1="528" y1="330" x2="614" y2="330" stroke="#b45309" stroke-width="2" marker-end="url(#arwAm)"/>
    <rect x="536" y="312" width="72" height="12" fill="#f7f8fa"/>
    <text x="572" y="322" text-anchor="middle" font-size="9" fill="#b45309">&#8800; input &#183; it's later</text>

    <!-- amber target box -->
    <rect x="620" y="296" width="304" height="70" rx="10" fill="#fff7ed" stroke="#b45309" stroke-width="2"/>
    <text x="772" y="311" text-anchor="middle" font-size="9" font-weight="700" fill="#b45309" letter-spacing="1">DENOISER TARGET</text>
    <text x="772" y="328" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b45309">a FUTURE-epoch weight latent</text>
    <text x="772" y="343" text-anchor="middle" font-size="10" fill="#56616f">the next checkpoint z<tspan dy="3" font-size="8">&#964;+&#948;</tspan></text>
    <text x="772" y="357" text-anchor="middle" font-size="9.5" fill="#56616f">(a forecaster, not a reconstructor)</text>

    <!-- horizon arrow: training-time axis tau -> tau+delta -->
    <text x="282" y="397" text-anchor="middle" font-size="9.5" fill="#56616f">training time (epochs)</text>
    <line x1="60" y1="408" x2="524" y2="408" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#arwg)"/>
    <line x1="84" y1="402" x2="84" y2="414" stroke="#b45309" stroke-width="1.6"/>
    <line x1="480" y1="402" x2="480" y2="414" stroke="#b45309" stroke-width="1.6"/>
    <text x="84" y="427" text-anchor="middle" font-size="10" font-weight="600" fill="#b45309">&#964;</text>
    <text x="84" y="437" text-anchor="middle" font-size="8" fill="#56616f">now</text>
    <text x="480" y="427" text-anchor="middle" font-size="10" font-weight="600" fill="#b45309">&#964;+&#948;</text>
    <text x="480" y="437" text-anchor="middle" font-size="8" fill="#56616f">next checkpoint</text>

    <!-- =================== Caption strip =================== -->
    <rect x="24" y="456" width="912" height="34" rx="10" fill="#eef1f6" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="480" y="478" text-anchor="middle" font-size="12" fill="#1f2733">Same diffusion machinery. <tspan font-weight="700" fill="#b45309">Different target.</tspan> The &#8216;denoiser&#8217; is really a future-state forecaster.</text>

  </g>
</svg>
