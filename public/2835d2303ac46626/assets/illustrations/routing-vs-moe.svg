<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img">
  <title>Routing vs MoE vs Ensembling</title>
  <desc>Three side-by-side panels comparing Routing (post-hoc model choice), Mixture of Experts (internal differentiable experts), and Ensembling (run all then combine).</desc>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-neutral" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#1f2733">Routing vs MoE vs Ensembling</text>

  <!-- Dividers between panels -->
  <line x1="267" y1="48" x2="267" y2="368" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="534" y1="48" x2="534" y2="368" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- PANEL 1: ROUTING (x: 0–267) -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- Panel 1 heading -->
  <text x="133" y="64" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#2563eb">Routing</text>

  <!-- Query box -->
  <rect x="75" y="76" width="116" height="32" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="133" y="97" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#1f2733">Query</text>

  <!-- Arrow query→router -->
  <line x1="133" y1="108" x2="133" y2="128" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Router box -->
  <rect x="75" y="130" width="116" height="32" rx="10" fill="#f7f8fa" stroke="#94a3b8" stroke-width="2"/>
  <text x="133" y="151" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#1f2733">Router</text>

  <!-- Router → Model A (chosen, highlighted) -->
  <line x1="133" y1="162" x2="70" y2="210" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Router → Model B (not chosen) -->
  <line x1="133" y1="162" x2="133" y2="210" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-neutral)"/>
  <!-- Router → Model C (not chosen) -->
  <line x1="133" y1="162" x2="196" y2="210" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-neutral)"/>

  <!-- Model boxes -->
  <rect x="42" y="212" width="56" height="30" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="70" y="232" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#1f2733">Model A</text>

  <rect x="105" y="212" width="56" height="30" rx="10" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="133" y="232" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#94a3b8">Model B</text>

  <rect x="168" y="212" width="56" height="30" rx="10" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="196" y="232" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#94a3b8">Model C</text>

  <!-- "picks ONE" label -->
  <text x="133" y="260" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">picks ONE model</text>

  <!-- Arrow Model A → Output -->
  <line x1="70" y1="242" x2="133" y2="290" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Output box -->
  <rect x="75" y="292" width="116" height="30" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="133" y="312" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#1f2733">Output</text>

  <!-- Caption -->
  <text x="133" y="356" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">post-hoc model choice</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- PANEL 2: MoE (x: 267–534) -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- Panel 2 heading -->
  <text x="400" y="64" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#2563eb">MoE</text>

  <!-- Query box -->
  <rect x="342" y="76" width="116" height="32" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="97" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#1f2733">Query</text>

  <!-- Arrow query→model boundary -->
  <line x1="400" y1="108" x2="400" y2="128" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Model outer border -->
  <rect x="288" y="130" width="224" height="162" rx="10" fill="#f7f8fa" stroke="#94a3b8" stroke-width="2"/>
  <text x="400" y="148" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" font-style="italic">one model</text>

  <!-- Gating network box inside model -->
  <rect x="342" y="154" width="116" height="28" rx="8" fill="#e8f0fe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="400" y="173" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#1f2733">Gating Network</text>

  <!-- Gating → Experts (top-k active) -->
  <!-- Expert 1 (active) -->
  <line x1="374" y1="182" x2="330" y2="218" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Expert 2 (active) -->
  <line x1="400" y1="182" x2="400" y2="218" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Expert 3 (inactive) -->
  <line x1="426" y1="182" x2="470" y2="218" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrow-neutral)"/>

  <!-- Expert boxes -->
  <rect x="296" y="220" width="68" height="28" rx="8" fill="#e8f0fe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="330" y="239" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#1f2733">Expert 1</text>

  <rect x="366" y="220" width="68" height="28" rx="8" fill="#e8f0fe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="400" y="239" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#1f2733">Expert 2</text>

  <rect x="436" y="220" width="68" height="28" rx="8" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="470" y="239" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#94a3b8">Expert 3</text>

  <!-- top-k note -->
  <text x="400" y="264" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">top-k active</text>

  <!-- Combine line inside model -->
  <line x1="330" y1="248" x2="400" y2="278" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="248" x2="400" y2="278" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Combined output inside model box -->
  <rect x="356" y="278" width="88" height="6" rx="3" fill="#2563eb" opacity="0.2"/>

  <!-- Arrow model→Output -->
  <line x1="400" y1="292" x2="400" y2="308" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Output box -->
  <rect x="342" y="310" width="116" height="30" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="400" y="330" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#1f2733">Output</text>

  <!-- Caption -->
  <text x="400" y="356" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">internal, differentiable experts</text>

  <!-- ═══════════════════════════════════════════════════ -->
  <!-- PANEL 3: ENSEMBLING (x: 534–800) -->
  <!-- ═══════════════════════════════════════════════════ -->

  <!-- Panel 3 heading -->
  <text x="667" y="64" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#2563eb">Ensembling</text>

  <!-- Query box -->
  <rect x="609" y="76" width="116" height="32" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="667" y="97" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#1f2733">Query</text>

  <!-- Arrows to ALL models -->
  <line x1="620" y1="108" x2="576" y2="148" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="667" y1="108" x2="667" y2="148" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="714" y1="108" x2="758" y2="148" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Model boxes (all active) -->
  <rect x="542" y="150" width="68" height="30" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="576" y="170" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#1f2733">Model A</text>

  <rect x="631" y="150" width="72" height="30" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="667" y="170" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#1f2733">Model B</text>

  <rect x="724" y="150" width="68" height="30" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="758" y="170" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#1f2733">Model C</text>

  <!-- ALL label -->
  <text x="667" y="198" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">all models run</text>

  <!-- Arrows to combine box -->
  <line x1="576" y1="180" x2="630" y2="228" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="667" y1="180" x2="667" y2="228" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="758" y1="180" x2="704" y2="228" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Combine/Vote box -->
  <rect x="601" y="230" width="132" height="32" rx="10" fill="#f7f8fa" stroke="#94a3b8" stroke-width="2"/>
  <text x="667" y="251" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#1f2733">Combine / Vote</text>

  <!-- Arrow combine→output -->
  <line x1="667" y1="262" x2="667" y2="290" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Output box -->
  <rect x="609" y="292" width="116" height="30" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="667" y="312" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#1f2733">Output</text>

  <!-- Caption -->
  <text x="667" y="356" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">run all, then combine</text>

  <!-- Bottom rule -->
  <line x1="40" y1="370" x2="760" y2="370" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>

</svg>
