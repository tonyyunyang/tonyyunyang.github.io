<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img">
  <title>Scaling Laws (Chinchilla)</title>
  <desc>Log-log chart showing loss vs compute (FLOPs) for different model sizes, with a compute-optimal frontier and Chinchilla annotation (~20 tokens/param).</desc>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#1f2733"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#1f2733">Scaling Laws (Chinchilla)</text>

  <!-- Chart area: x=80..740, y=60..360 -->

  <!-- Axis lines -->
  <line x1="80" y1="60" x2="80" y2="360" stroke="#1f2733" stroke-width="2"/>
  <line x1="80" y1="360" x2="740" y2="360" stroke="#1f2733" stroke-width="2"/>

  <!-- Y-axis arrow -->
  <line x1="80" y1="60" x2="80" y2="52" stroke="#1f2733" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- X-axis arrow -->
  <line x1="740" y1="360" x2="748" y2="360" stroke="#1f2733" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Axis labels -->
  <text x="400" y="395" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1f2733">Compute (FLOPs) — log scale</text>
  <text x="22" y="215" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1f2733" transform="rotate(-90,22,215)">Loss — log scale</text>

  <!-- Tick labels on x-axis (log scale labels) -->
  <text x="130" y="378" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">10²²</text>
  <text x="260" y="378" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">10²³</text>
  <text x="390" y="378" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">10²⁴</text>
  <text x="520" y="378" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">10²⁵</text>
  <text x="650" y="378" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">10²⁶</text>

  <!-- Tick lines on x-axis -->
  <line x1="130" y1="360" x2="130" y2="365" stroke="#94a3b8" stroke-width="1"/>
  <line x1="260" y1="360" x2="260" y2="365" stroke="#94a3b8" stroke-width="1"/>
  <line x1="390" y1="360" x2="390" y2="365" stroke="#94a3b8" stroke-width="1"/>
  <line x1="520" y1="360" x2="520" y2="365" stroke="#94a3b8" stroke-width="1"/>
  <line x1="650" y1="360" x2="650" y2="365" stroke="#94a3b8" stroke-width="1"/>

  <!-- Tick labels on y-axis -->
  <text x="72" y="90" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">high</text>
  <text x="72" y="360" text-anchor="end" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">low</text>

  <!-- Grid lines (light) -->
  <line x1="130" y1="60" x2="130" y2="360" stroke="#94a3b8" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="260" y1="60" x2="260" y2="360" stroke="#94a3b8" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="390" y1="60" x2="390" y2="360" stroke="#94a3b8" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="520" y1="60" x2="520" y2="360" stroke="#94a3b8" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="650" y1="60" x2="650" y2="360" stroke="#94a3b8" stroke-width="0.5" stroke-dasharray="4,4"/>

  <!--
    Model size curves: each curve is a descending power-law line on log-log axes.
    Larger models have lower loss at their optimal compute, but converge to it later.
    Each curve spans a portion of the x range then flattens (diminishing returns).
    We use polyline paths. Curves are offset vertically: smaller models start higher loss,
    larger models start lower but need more compute.

    Curve 1 — smallest model (1B params): starts top-left, falls steeply, flattens early
    Curve 2 — 3B params
    Curve 3 — 7B params
    Curve 4 — 13B params
    Curve 5 — 30B+ params: starts lower, falls more gradually, needs most compute
  -->

  <!-- Curve 1: ~1B model — high loss, falls fast, flattens early -->
  <path d="M100,100 C160,105 220,125 290,165 C350,195 420,230 520,270 C600,295 680,308 740,315"
        fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="none"/>

  <!-- Curve 2: ~3B model -->
  <path d="M130,88 C190,93 250,112 320,150 C390,182 460,215 560,250 C630,268 700,278 740,282"
        fill="none" stroke="#94a3b8" stroke-width="2"/>

  <!-- Curve 3: ~7B model -->
  <path d="M170,80 C230,84 300,100 370,132 C440,160 520,192 620,224 C680,238 720,244 740,247"
        fill="none" stroke="#94a3b8" stroke-width="2"/>

  <!-- Curve 4: ~13B model -->
  <path d="M220,74 C290,77 360,91 440,118 C510,143 590,170 690,196 C720,204 740,208 740,210"
        fill="none" stroke="#94a3b8" stroke-width="2"/>

  <!-- Curve 5: ~30B+ model — lowest loss but needs most compute -->
  <path d="M300,70 C370,72 440,82 520,104 C590,123 660,146 730,168 C735,170 740,172 740,173"
        fill="none" stroke="#94a3b8" stroke-width="2"/>

  <!-- Model size labels at the start (top-left) of each curve, one per curve -->
  <text x="105" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="start">1B</text>
  <text x="134" y="89" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="start">3B</text>
  <text x="173" y="81" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="start">7B</text>
  <text x="220" y="70" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="start">13B</text>
  <text x="290" y="64" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="start">30B+</text>
  <text x="685" y="52" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f" text-anchor="middle">model size</text>

  <!--
    Compute-optimal frontier: lower envelope connecting the minima of each iso-model curve.
    On log-log axes this is also a descending line/curve connecting the optimal points.
    Points:
      1B curve min ~(290, 165)
      3B curve min ~(390, 150)
      7B curve min ~(490, 160) — shift right
      ...
    The frontier is the lower envelope touching each model curve at its optimal point.
    Optimal points (where more compute helps less than switching to bigger model):
      ~(160, 108) for 1B
      ~(250, 96)  for 3B
      ~(330, 83)  for 7B
      ~(420, 74)  for 13B
      ~(540, 66)  for 30B+
  -->

  <!-- Compute-optimal frontier — bold blue line tracing the LOWER envelope (lowest loss) of the gray curves -->
  <path d="M100,110 C160,115 220,135 290,175 C350,205 420,240 520,280 C600,305 680,318 740,325"
        fill="none" stroke="#2563eb" stroke-width="2.5"/>

  <!-- Frontier label, placed in open space below the frontier with a thin leader line -->
  <line x1="286" y1="250" x2="338" y2="201" stroke="#2563eb" stroke-width="1.2"/>
  <text x="128" y="255" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#2563eb">compute-optimal frontier</text>

  <!-- Chinchilla annotation box -->
  <rect x="410" y="100" width="310" height="72" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="565" y="121" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#2563eb">Chinchilla (Hoffmann et al. 2022)</text>
  <text x="565" y="141" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#1f2733">Scale params &amp; tokens together</text>
  <text x="565" y="160" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#1f2733">~20 tokens / param (N ∝ D)</text>

  <!-- Arrow from annotation down to a point on the blue compute-optimal frontier -->
  <line x1="512" y1="174" x2="503" y2="266" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Dot on the frontier at the annotation point -->
  <circle cx="500" cy="272" r="5" fill="#2563eb"/>

  <!-- Secondary note: Kaplan vs Chinchilla -->
  <text x="400" y="320" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">Each curve = fixed model size. Lower envelope = compute-optimal path.</text>
  <text x="400" y="336" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">Kaplan et al. 2020: C ≈ 6ND. Chinchilla: optimal N* ∝ D* (equal scaling).</text>

</svg>
