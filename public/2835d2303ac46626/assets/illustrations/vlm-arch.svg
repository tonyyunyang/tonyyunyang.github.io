<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img">
  <title>Vision-Language Model Architecture</title>
  <desc>Diagram showing a VLM pipeline: an image passes through a Vision Encoder (ViT) to produce visual tokens, which are projected by a Connector/Projector (MLP). Text passes through a Tokenizer to produce text tokens. Both token streams are concatenated into a combined sequence fed into an LLM decoder to produce output.</desc>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-gray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrow-dark" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1f2733"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="38" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#1f2733">Vision-Language Model Architecture</text>

  <!-- ====== LEFT BRANCH: Image path ====== -->

  <!-- Image box -->
  <rect x="40" y="74" width="110" height="44" rx="10" fill="#f7f8fa" stroke="#94a3b8" stroke-width="2"/>
  <text x="95" y="101" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1f2733">Image</text>

  <!-- Arrow: Image → Vision Encoder -->
  <line x1="150" y1="96" x2="191" y2="96" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Vision Encoder box -->
  <rect x="193" y="68" width="148" height="56" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="267" y="91" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1f2733">Vision Encoder</text>
  <text x="267" y="109" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#56616f">(ViT)</text>

  <!-- Arrow: Vision Encoder → visual tokens label -->
  <line x1="341" y1="96" x2="411" y2="96" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="377" y="89" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">visual tokens</text>

  <!-- Connector / Projector box -->
  <rect x="413" y="68" width="160" height="56" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="493" y="91" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1f2733">Connector / Projector</text>
  <text x="493" y="109" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#56616f">(MLP)</text>

  <!-- ====== RIGHT BRANCH: Text path ====== -->

  <!-- Text box -->
  <rect x="40" y="220" width="110" height="44" rx="10" fill="#f7f8fa" stroke="#94a3b8" stroke-width="2"/>
  <text x="95" y="247" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1f2733">Text</text>

  <!-- Arrow: Text → Tokenizer -->
  <line x1="150" y1="242" x2="191" y2="242" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Tokenizer box -->
  <rect x="193" y="216" width="148" height="52" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="267" y="247" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#1f2733">Tokenizer</text>

  <!-- Arrow: Tokenizer → text tokens label -->
  <line x1="341" y1="242" x2="411" y2="242" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="377" y="235" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">text tokens</text>

  <!-- ====== COMBINED TOKEN SEQUENCE ====== -->

  <!-- Arrow from Projector down to concat area -->
  <line x1="469" y1="124" x2="469" y2="170" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Arrow from Tokenizer right then down to concat area -->
  <line x1="469" y1="216" x2="469" y2="196" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Concatenation / combined sequence box -->
  <rect x="349" y="172" width="240" height="48" rx="10" fill="#f7f8fa" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 3"/>

  <!-- Token sequence visual inside box -->
  <!-- Visual tokens (blue) -->
  <rect x="362" y="184" width="26" height="24" rx="4" fill="#e8f0fe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="375" y="200" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="9" fill="#2563eb">v</text>
  <rect x="393" y="184" width="26" height="24" rx="4" fill="#e8f0fe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="406" y="200" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="9" fill="#2563eb">v</text>
  <rect x="424" y="184" width="26" height="24" rx="4" fill="#e8f0fe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="437" y="200" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="9" fill="#2563eb">v</text>

  <!-- Divider -->
  <line x1="456" y1="184" x2="456" y2="208" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="3 2"/>

  <!-- Text tokens (gray/neutral) -->
  <rect x="462" y="184" width="26" height="24" rx="4" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="475" y="200" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="9" fill="#56616f">t</text>
  <rect x="493" y="184" width="26" height="24" rx="4" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="506" y="200" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="9" fill="#56616f">t</text>
  <rect x="524" y="184" width="26" height="24" rx="4" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="537" y="200" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="9" fill="#56616f">t</text>

  <!-- Label: combined input sequence (below box, clear of the descending arrow and the text-tokens label) -->
  <text x="469" y="252" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">combined input sequence</text>

  <!-- Arrow: combined → LLM -->
  <line x1="589" y1="196" x2="630" y2="196" stroke="#1f2733" stroke-width="2" marker-end="url(#arrow-dark)"/>

  <!-- LLM box -->
  <rect x="632" y="164" width="130" height="64" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="697" y="191" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="700" fill="#1f2733">LLM</text>
  <text x="697" y="210" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#56616f">(decoder)</text>

  <!-- Arrow: LLM → output -->
  <line x1="697" y1="228" x2="697" y2="270" stroke="#1f2733" stroke-width="2" marker-end="url(#arrow-dark)"/>

  <!-- Output box -->
  <rect x="632" y="272" width="130" height="44" rx="10" fill="#f7f8fa" stroke="#94a3b8" stroke-width="2"/>
  <text x="697" y="299" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1f2733">Output</text>

  <!-- Legend -->
  <rect x="40" y="338" width="14" height="14" rx="3" fill="#e8f0fe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="60" y="350" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">visual tokens (v)</text>
  <rect x="180" y="338" width="14" height="14" rx="3" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="200" y="350" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">text tokens (t)</text>
  <rect x="310" y="338" width="14" height="14" rx="3" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4 2"/>
  <text x="330" y="350" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">concatenated sequence (visual ++ text)</text>
</svg>
