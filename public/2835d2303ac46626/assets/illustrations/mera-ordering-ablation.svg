<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 470" role="img">
  <title>MERA four-cycle ordering ablation: router accuracy by within-cycle schedule</title>
  <desc>Horizontal bar chart ranking six within-cycle track orderings by router accuracy on the 832-example held-out set, from Skill-parallel-Router then LLM at 76.0 percent up to the best Skill then LLM then Router at 87.3 percent.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/></marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#16a34a"/></marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#dc2626"/></marker>
  </defs>
  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">

    <!-- Header -->
    <text x="20" y="28" font-size="18" font-weight="700" fill="#1f2733">Four-cycle ordering ablation: router accuracy (MERA, Table 1)</text>
    <text x="20" y="49" font-size="11.5" fill="#56616f">Six within-cycle scheduling orders on the fixed 832-example held-out set &#183; || = tracks run in parallel that cycle.</text>
    <text x="20" y="66" font-size="11.5" fill="#56616f">Router accuracy = how often the cheap-vs-strong choice matches labels (NOT task success) &#183; MBPP LLM pass stays flat 46.5%&#8211;47.5% across all six.</text>

    <!-- Gridlines -->
    <g stroke="#e5e7eb" stroke-width="1">
      <line x1="390" y1="82" x2="390" y2="403"/>
      <line x1="560" y1="82" x2="560" y2="403"/>
      <line x1="730" y1="82" x2="730" y2="403"/>
      <line x1="900" y1="82" x2="900" y2="403"/>
    </g>
    <!-- Axis baseline at 70% -->
    <line x1="220" y1="82" x2="220" y2="403" stroke="#94a3b8" stroke-width="1.5"/>

    <!-- Tick labels -->
    <g font-size="11" fill="#56616f" text-anchor="middle">
      <text x="220" y="418">70%</text>
      <text x="390" y="418">75%</text>
      <text x="560" y="418">80%</text>
      <text x="730" y="418">85%</text>
      <text x="900" y="418">90%</text>
    </g>

    <!-- ===== Bars (sorted best at top) ===== -->

    <!-- BEST: Skill -> LLM -> Router : 87.3% -->
    <rect x="220" y="90" width="588" height="40" rx="10" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
    <text x="205" y="115" font-size="11.5" font-weight="700" fill="#166534" text-anchor="end">Skill &#8594; LLM &#8594; Router</text>
    <text x="234" y="115" font-size="10.5" fill="#14532d">4.4% fallback &#183; 51.8% cost</text>
    <text x="798" y="115" font-size="12" font-weight="700" fill="#15803d" text-anchor="end">&#9733; BEST</text>
    <text x="816" y="115" font-size="14" font-weight="700" fill="#15803d">87.3%</text>

    <!-- LLM -> Skill -> Router : 84.6% -->
    <rect x="220" y="144" width="496" height="40" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
    <text x="205" y="169" font-size="11.5" font-weight="600" fill="#1f2733" text-anchor="end">LLM &#8594; Skill &#8594; Router</text>
    <text x="724" y="169" font-size="13" font-weight="700" fill="#1f2733">84.6%</text>

    <!-- Skill || LLM -> Router : 82.7% -->
    <rect x="220" y="198" width="432" height="40" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
    <text x="205" y="223" font-size="11.5" font-weight="600" fill="#1f2733" text-anchor="end">Skill || LLM &#8594; Router</text>
    <text x="660" y="223" font-size="13" font-weight="700" fill="#1f2733">82.7%</text>

    <!-- Skill -> Router -> LLM : 81.6% -->
    <rect x="220" y="252" width="394" height="40" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
    <text x="205" y="277" font-size="11.5" font-weight="600" fill="#1f2733" text-anchor="end">Skill &#8594; Router &#8594; LLM</text>
    <text x="622" y="277" font-size="13" font-weight="700" fill="#1f2733">81.6%</text>

    <!-- Skill || Router || LLM : 80.7% -->
    <rect x="220" y="306" width="364" height="40" rx="10" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
    <text x="205" y="331" font-size="11.5" font-weight="600" fill="#1f2733" text-anchor="end">Skill || Router || LLM</text>
    <text x="592" y="331" font-size="13" font-weight="700" fill="#1f2733">80.7%</text>

    <!-- WORST: Skill || Router -> LLM : 76.0% -->
    <rect x="220" y="360" width="204" height="40" rx="10" fill="#fef2f2" stroke="#dc2626" stroke-width="2"/>
    <text x="205" y="385" font-size="11.5" font-weight="700" fill="#b91c1c" text-anchor="end">Skill || Router &#8594; LLM</text>
    <text x="432" y="385" font-size="13" font-weight="700" fill="#b91c1c">76.0%</text>
    <text x="480" y="385" font-size="11" fill="#b91c1c">(worst)</text>

    <!-- Axis title -->
    <text x="560" y="434" font-size="11" fill="#56616f" text-anchor="middle">Router accuracy on the 832-example held-out set (%) &#183; horizontal axis starts at 70%</text>

    <!-- Caption -->
    <text x="560" y="453" font-size="11" fill="#56616f" text-anchor="middle">Span 76.0%&#8211;87.3% is wide but single-seed: read the best order as the strongest observed operating point, not proven-optimal.</text>

  </g>
</svg>