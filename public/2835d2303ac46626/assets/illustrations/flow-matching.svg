<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img">
  <title>Flow Matching</title>
  <desc>Diagram showing flow matching: points transported from a noise distribution N(0,1) on the left to the data distribution on the right. Several near-straight arrows represent the learned velocity field v_theta(x,t). A curvy DDPM path is contrasted with a straight flow-matching optimal-transport path.</desc>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,7 L8,3.5 Z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-ddpm" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,7 L8,3.5 Z" fill="#f59e0b"/>
    </marker>
    <marker id="arrow-ot" markerWidth="8" markerHeight="8" refX="7" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,7 L8,3.5 Z" fill="#15803d"/>
    </marker>

    <!-- Noise blob (left) -->
    <radialGradient id="noiseGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8f0fe"/>
      <stop offset="100%" stop-color="#bfcffa"/>
    </radialGradient>
    <!-- Data blob (right) -->
    <radialGradient id="dataGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#86efac"/>
    </radialGradient>
  </defs>

  <!-- Title -->
  <text x="400" y="36" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#1f2733">Flow Matching</text>

  <!-- Noise blob (left) -->
  <ellipse cx="155" cy="215" rx="90" ry="115" fill="url(#noiseGrad)" stroke="#94a3b8" stroke-width="2"/>
  <text x="155" y="202" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1f2733">noise</text>
  <text x="155" y="220" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#2563eb">N(0,1)</text>

  <!-- Data blob (right) — slightly irregular ellipse approximated by a path -->
  <ellipse cx="640" cy="215" rx="95" ry="115" fill="url(#dataGrad)" stroke="#94a3b8" stroke-width="2"/>
  <text x="640" y="208" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1f2733">data</text>
  <text x="640" y="226" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">p_data</text>

  <!-- ── Velocity field arrows (near-straight, slight natural variation) ── -->
  <!-- Arrow 1: top stream -->
  <line x1="248" y1="138" x2="537" y2="128" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Arrow 2: upper-mid -->
  <line x1="243" y1="175" x2="537" y2="168" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Arrow 3: centre -->
  <line x1="246" y1="215" x2="537" y2="215" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Arrow 4: lower-mid -->
  <line x1="243" y1="255" x2="537" y2="262" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Arrow 5: bottom stream -->
  <line x1="248" y1="292" x2="537" y2="302" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Velocity field label on middle arrow -->
  <text x="388" y="205" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#2563eb" font-style="italic">v&#x03B8;(x,t)</text>

  <!-- ── Comparison paths (lower portion, with labels) ── -->

  <!-- DDPM curvy path -->
  <path d="M248,335 C310,295 370,375 430,340 C490,305 510,375 540,348" fill="none" stroke="#f59e0b" stroke-width="2.5" stroke-dasharray="6,3" marker-end="url(#arrow-ddpm)"/>
  <!-- Label for DDPM -->
  <text x="250" y="388" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#f59e0b" font-weight="600">DDPM path (curved)</text>

  <!-- Flow Matching OT straight path -->
  <line x1="248" y1="355" x2="537" y2="355" stroke="#15803d" stroke-width="2.5" marker-end="url(#arrow-ot)"/>
  <!-- Label for OT -->
  <text x="250" y="410" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#15803d" font-weight="600">flow matching / OT path (straight)</text>

  <!-- Note box -->
  <rect x="282" y="56" width="236" height="44" rx="8" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="400" y="73" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">learn velocity field;</text>
  <text x="400" y="89" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">straighter paths &#x2192; fewer sampling steps</text>

  <!-- t=0 and t=1 labels -->
  <text x="155" y="346" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">t = 0</text>
  <text x="640" y="346" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#56616f">t = 1</text>
</svg>
