<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" role="img">
  <title>Coreference: Identity vs Bridging</title>
  <desc>Two example sentences showing identity coreference (She→The buyer, it→the box) and bridging coreference (The door→the house, requiring world knowledge).</desc>

  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-amber" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="38" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="19" font-weight="700" fill="#1f2733" text-anchor="middle">Coreference: Identity vs Bridging</text>

  <!-- ── SECTION 1 label ── -->
  <text x="50" y="80" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#56616f" font-weight="600">Example 1 — Identity Coreference</text>

  <!-- Sentence 1 tokens rendered as pill boxes -->
  <!-- "The buyer opened the box . She found it damaged ." -->
  <!-- Token boxes, row y=115 (center), height 34 -->

  <!-- Token: "The" -->
  <rect x="50" y="100" width="46" height="34" rx="6" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="73" y="122" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#1f2733" text-anchor="middle">The</text>

  <!-- Token: "buyer" — antecedent, highlighted -->
  <rect x="100" y="100" width="58" height="34" rx="6" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="129" y="122" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#2563eb" text-anchor="middle">buyer</text>

  <!-- Token: "opened" -->
  <rect x="162" y="100" width="62" height="34" rx="6" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="193" y="122" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#1f2733" text-anchor="middle">opened</text>

  <!-- Token: "the" -->
  <rect x="228" y="100" width="38" height="34" rx="6" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="247" y="122" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#1f2733" text-anchor="middle">the</text>

  <!-- Token: "box" — antecedent for "it", highlighted -->
  <rect x="270" y="100" width="44" height="34" rx="6" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="292" y="122" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#2563eb" text-anchor="middle">box</text>

  <!-- Token: "." -->
  <rect x="318" y="100" width="24" height="34" rx="6" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="330" y="122" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#1f2733" text-anchor="middle">.</text>

  <!-- Token: "She" — anaphor, highlighted -->
  <rect x="346" y="100" width="40" height="34" rx="6" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="366" y="122" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#2563eb" text-anchor="middle">She</text>

  <!-- Token: "found" -->
  <rect x="390" y="100" width="50" height="34" rx="6" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="415" y="122" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#1f2733" text-anchor="middle">found</text>

  <!-- Token: "it" — anaphor, highlighted -->
  <rect x="444" y="100" width="34" height="34" rx="6" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="461" y="122" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#2563eb" text-anchor="middle">it</text>

  <!-- Token: "damaged" -->
  <rect x="482" y="100" width="70" height="34" rx="6" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="517" y="122" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#1f2733" text-anchor="middle">damaged</text>

  <!-- Token: "." -->
  <rect x="556" y="100" width="24" height="34" rx="6" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="568" y="122" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#1f2733" text-anchor="middle">.</text>

  <!-- Arc 1: "She" → "buyer"  (identity)
       She center-x=366, buyer center-x=129, top of box y=100
       Arc goes above the tokens. Use a path with quadratic bezier curving upward. -->
  <!-- Arc from She (366,100) to buyer (129,100) curving up to y~60 -->
  <path d="M 366 100 Q 247 44 129 100" fill="none" stroke="#2563eb" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <!-- Label centered above the raised apex (~18px clearance) -->
  <text x="247" y="54" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#2563eb" text-anchor="middle" font-style="italic">identity</text>

  <!-- Arc 2: "it" → "box" (identity)
       it center-x=461, box center-x=292, top of box y=100
       Shallower arc so it doesn't collide with arc 1 -->
  <path d="M 461 100 Q 382 74 301 100" fill="none" stroke="#2563eb" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrow-blue)"/>
  <!-- Label midpoint -->
  <text x="376" y="69" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#2563eb" text-anchor="middle" font-style="italic">identity</text>

  <!-- ── SECTION 2 label ── -->
  <text x="50" y="198" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#56616f" font-weight="600">Example 2 — Bridging Coreference</text>

  <!-- Sentence 2: "We entered the house . The door was open ." -->
  <!-- Token boxes, row center y=233, height 34 -->

  <!-- Token: "We" -->
  <rect x="50" y="218" width="38" height="34" rx="6" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="69" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#1f2733" text-anchor="middle">We</text>

  <!-- Token: "entered" -->
  <rect x="92" y="218" width="64" height="34" rx="6" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="124" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#1f2733" text-anchor="middle">entered</text>

  <!-- Token: "the" -->
  <rect x="160" y="218" width="38" height="34" rx="6" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="179" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#1f2733" text-anchor="middle">the</text>

  <!-- Token: "house" — antecedent, amber highlight -->
  <rect x="202" y="218" width="56" height="34" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="230" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#b45309" text-anchor="middle">house</text>

  <!-- Token: "." -->
  <rect x="262" y="218" width="24" height="34" rx="6" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="274" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#1f2733" text-anchor="middle">.</text>

  <!-- Token: "The" -->
  <rect x="290" y="218" width="38" height="34" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="309" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#b45309" text-anchor="middle">The</text>

  <!-- Token: "door" — anaphor, amber highlight -->
  <rect x="332" y="218" width="48" height="34" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="356" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" font-weight="600" fill="#b45309" text-anchor="middle">door</text>

  <!-- Token: "was" -->
  <rect x="384" y="218" width="42" height="34" rx="6" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="405" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#1f2733" text-anchor="middle">was</text>

  <!-- Token: "open" -->
  <rect x="430" y="218" width="48" height="34" rx="6" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="454" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#1f2733" text-anchor="middle">open</text>

  <!-- Token: "." -->
  <rect x="482" y="218" width="24" height="34" rx="6" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="494" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="13" fill="#1f2733" text-anchor="middle">.</text>

  <!-- Arc: "The door" (center of span: midpoint of "The" 309 and "door" 356 → 332) → "house" (230)
       Arc goes BELOW the tokens. Bottom of token box = 218+34=252 -->
  <!-- Arc from door-group (356,252) to house (230,252) curving downward -->
  <path d="M 356 252 Q 293 290 230 252" fill="none" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrow-amber)"/>
  <!-- Label -->
  <text x="293" y="308" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="11" fill="#b45309" text-anchor="middle" font-style="italic">bridging</text>

  <!-- ── Legend / Key ── -->
  <rect x="50" y="340" width="700" height="62" rx="10" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1.5"/>

  <!-- Legend title -->
  <text x="70" y="360" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" font-weight="600" fill="#56616f">Legend</text>

  <!-- Identity swatch -->
  <rect x="70" y="368" width="16" height="16" rx="3" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
  <text x="92" y="380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#1f2733">Identity coreference — same real-world entity</text>

  <!-- Bridging swatch -->
  <rect x="370" y="368" width="16" height="16" rx="3" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
  <text x="392" y="380" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="12" fill="#1f2733">Bridging — related entity (needs world knowledge)</text>

</svg>
