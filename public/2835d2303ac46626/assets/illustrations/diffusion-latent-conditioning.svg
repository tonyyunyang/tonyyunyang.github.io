<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 470" role="img">
  <title>Two upgrades every modern diffusion model uses</title>
  <desc>Two stacked bands. Top band: latent diffusion runs the whole noise/denoise chain in a small VAE latent space, so data is encoded to a tiny latent, diffused, then decoded back to data (cheap). Bottom band: conditioning steers a denoiser U-Net using a text embedding and a dataset embedding joined and injected via cross-attention or ControlNet, with classifier-free guidance strengthening the steer.</desc>

  <defs>
    <marker id="arw" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arwg" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">

    <!-- Title + subtitle -->
    <text x="480" y="30" text-anchor="middle" font-size="19" font-weight="700" fill="#1f2733">Two upgrades every modern diffusion model uses</text>
    <text x="480" y="50" text-anchor="middle" font-size="12" fill="#56616f">1. run diffusion in a small latent space &#183; 2. condition it to generate a specific thing</text>

    <!-- ===== Region backgrounds ===== -->
    <rect x="24" y="70" width="912" height="180" rx="10" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5 4"/>
    <rect x="24" y="270" width="912" height="180" rx="10" fill="#f7f8fa" stroke="#94a3b8" stroke-width="1" stroke-dasharray="5 4"/>

    <!-- ============================================================ -->
    <!-- BAND 1: latent diffusion -->
    <!-- ============================================================ -->
    <text x="40" y="94" text-anchor="start" font-size="14" font-weight="700" fill="#1f2733">1. Latent diffusion (run it small)</text>

    <!-- data x -->
    <rect x="50" y="144" width="68" height="52" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <polygon points="58,188 78,162 96,188" fill="#e8f0fe" stroke="#2563eb" stroke-width="1.5"/>
    <circle cx="99" cy="158" r="5" fill="#e8f0fe" stroke="#2563eb" stroke-width="1.5"/>
    <text x="84" y="212" text-anchor="middle" font-size="10" font-weight="600" fill="#1f2733">data x</text>
    <text x="84" y="223" text-anchor="middle" font-size="9" fill="#56616f">(an image)</text>

    <line x1="118" y1="170" x2="159" y2="170" stroke="#2563eb" stroke-width="2" marker-end="url(#arw)"/>

    <!-- VAE Encoder (narrowing right = compress) -->
    <polygon points="161,146 253,156 253,184 161,194" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
    <text x="207" y="167" text-anchor="middle" font-size="10" font-weight="600" fill="#2563eb">VAE</text>
    <text x="207" y="180" text-anchor="middle" font-size="10" font-weight="600" fill="#2563eb">Encoder</text>

    <line x1="253" y1="170" x2="296" y2="170" stroke="#2563eb" stroke-width="2" marker-end="url(#arw)"/>

    <!-- small latent z -->
    <rect x="298" y="163" width="14" height="14" rx="2" fill="#e8f0fe" stroke="#2563eb" stroke-width="1.5"/>
    <rect x="318" y="163" width="14" height="14" rx="2" fill="#e8f0fe" stroke="#2563eb" stroke-width="1.5"/>
    <rect x="338" y="163" width="14" height="14" rx="2" fill="#e8f0fe" stroke="#2563eb" stroke-width="1.5"/>
    <text x="325" y="212" text-anchor="middle" font-size="10" font-weight="600" fill="#1f2733">latent z</text>
    <text x="325" y="223" text-anchor="middle" font-size="9" fill="#56616f">(tiny)</text>

    <line x1="352" y1="170" x2="395" y2="170" stroke="#2563eb" stroke-width="2" marker-end="url(#arw)"/>

    <!-- compact diffusion chain on z -->
    <text x="527" y="136" text-anchor="middle" font-size="10" font-weight="600" fill="#2563eb">compact diffusion chain on z</text>
    <rect x="397" y="142" width="260" height="78" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="5 4"/>

    <!-- tile A: clean latent -->
    <rect x="433" y="152" width="40" height="38" rx="3" fill="#e8f0fe" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="438" y1="164" x2="468" y2="164" stroke="#2563eb" stroke-width="0.8"/>
    <line x1="438" y1="176" x2="468" y2="176" stroke="#2563eb" stroke-width="0.8"/>

    <!-- noise / denoise arrows A<->B -->
    <text x="490" y="158" text-anchor="middle" font-size="7.5" fill="#2563eb">noise</text>
    <line x1="473" y1="163" x2="507" y2="163" stroke="#2563eb" stroke-width="1.6" marker-end="url(#arw)"/>
    <line x1="507" y1="180" x2="473" y2="180" stroke="#2563eb" stroke-width="1.6" marker-end="url(#arw)"/>
    <text x="490" y="190" text-anchor="middle" font-size="7.5" fill="#56616f">denoise</text>

    <!-- tile B: mid noise -->
    <rect x="507" y="152" width="40" height="38" rx="3" fill="#e8f0fe" stroke="#94a3b8" stroke-width="1.5"/>
    <g fill="#94a3b8">
      <rect x="513" y="160" width="3" height="3"/><rect x="525" y="168" width="3" height="3"/>
      <rect x="519" y="180" width="3" height="3"/><rect x="535" y="162" width="3" height="3"/>
      <rect x="531" y="178" width="3" height="3"/>
    </g>

    <!-- noise / denoise arrows B<->C -->
    <line x1="547" y1="163" x2="581" y2="163" stroke="#2563eb" stroke-width="1.6" marker-end="url(#arw)"/>
    <line x1="581" y1="180" x2="547" y2="180" stroke="#2563eb" stroke-width="1.6" marker-end="url(#arw)"/>

    <!-- tile C: pure noise -->
    <rect x="581" y="152" width="40" height="38" rx="3" fill="#eef1f5" stroke="#94a3b8" stroke-width="1.5"/>
    <g fill="#94a3b8">
      <rect x="585" y="156" width="3" height="3"/><rect x="593" y="164" width="3" height="3"/>
      <rect x="589" y="178" width="3" height="3"/><rect x="603" y="158" width="3" height="3"/>
      <rect x="611" y="170" width="3" height="3"/><rect x="599" y="184" width="3" height="3"/>
      <rect x="613" y="182" width="3" height="3"/><rect x="585" y="184" width="3" height="3"/>
      <rect x="601" y="172" width="3" height="3"/><rect x="615" y="160" width="3" height="3"/>
    </g>

    <text x="527" y="210" text-anchor="middle" font-size="9" fill="#56616f">noise &#8596; denoise (DDPM / DDIM)</text>

    <line x1="657" y1="170" x2="702" y2="170" stroke="#2563eb" stroke-width="2" marker-end="url(#arw)"/>

    <!-- VAE Decoder (widening right = expand) -->
    <polygon points="704,156 796,146 796,194 704,184" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
    <text x="752" y="167" text-anchor="middle" font-size="10" font-weight="600" fill="#2563eb">VAE</text>
    <text x="752" y="180" text-anchor="middle" font-size="10" font-weight="600" fill="#2563eb">Decoder</text>

    <line x1="796" y1="170" x2="839" y2="170" stroke="#2563eb" stroke-width="2" marker-end="url(#arw)"/>

    <!-- reconstructed data -->
    <rect x="841" y="144" width="68" height="52" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <polygon points="849,188 869,162 887,188" fill="#e8f0fe" stroke="#2563eb" stroke-width="1.5"/>
    <circle cx="890" cy="158" r="5" fill="#e8f0fe" stroke="#2563eb" stroke-width="1.5"/>
    <text x="875" y="211" text-anchor="middle" font-size="9" font-weight="600" fill="#1f2733">reconstructed</text>
    <text x="875" y="222" text-anchor="middle" font-size="9" fill="#56616f">data x</text>

    <!-- band 1 takeaway -->
    <text x="527" y="237" text-anchor="middle" font-size="10" fill="#56616f">diffusion happens in the small latent space (cheap)</text>

    <!-- ============================================================ -->
    <!-- BAND 2: conditioning -->
    <!-- ============================================================ -->
    <text x="40" y="294" text-anchor="start" font-size="14" font-weight="700" fill="#1f2733">2. Conditioning (generate a specific thing)</text>
    <text x="40" y="310" text-anchor="start" font-size="11" fill="#56616f">steer the denoiser toward what you want</text>

    <!-- condition stack: text + dataset embeddings -->
    <rect x="64" y="320" width="150" height="40" rx="8" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
    <text x="139" y="338" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">text embedding</text>
    <text x="139" y="352" text-anchor="middle" font-size="8.5" fill="#56616f">(your prompt)</text>

    <rect x="64" y="386" width="150" height="40" rx="8" fill="#e8f0fe" stroke="#2563eb" stroke-width="2"/>
    <text x="139" y="404" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">dataset embedding</text>
    <text x="139" y="418" text-anchor="middle" font-size="8.5" fill="#56616f">(a reference set)</text>

    <!-- join node -->
    <line x1="214" y1="340" x2="258" y2="366" stroke="#2563eb" stroke-width="2"/>
    <line x1="214" y1="406" x2="258" y2="380" stroke="#2563eb" stroke-width="2"/>
    <rect x="258" y="358" width="44" height="30" rx="8" fill="#ffffff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="280" y="377" text-anchor="middle" font-size="9" font-weight="600" fill="#1f2733">join</text>

    <!-- condition -> U-Net -->
    <text x="370" y="359" text-anchor="middle" font-size="10" font-weight="600" fill="#2563eb">cross-attention / ControlNet</text>
    <line x1="302" y1="373" x2="438" y2="373" stroke="#2563eb" stroke-width="2" marker-end="url(#arw)"/>

    <!-- denoiser U-Net -->
    <rect x="440" y="326" width="180" height="96" rx="10" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
    <!-- U-Net glyph -->
    <rect x="466" y="342" width="22" height="14" rx="2" fill="#e8f0fe" stroke="#2563eb" stroke-width="1.5"/>
    <rect x="478" y="360" width="18" height="12" rx="2" fill="#e8f0fe" stroke="#2563eb" stroke-width="1.5"/>
    <rect x="488" y="376" width="14" height="10" rx="2" fill="#e8f0fe" stroke="#2563eb" stroke-width="1.5"/>
    <rect x="534" y="376" width="14" height="10" rx="2" fill="#e8f0fe" stroke="#2563eb" stroke-width="1.5"/>
    <rect x="540" y="360" width="18" height="12" rx="2" fill="#e8f0fe" stroke="#2563eb" stroke-width="1.5"/>
    <rect x="548" y="342" width="22" height="14" rx="2" fill="#e8f0fe" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="502" y1="381" x2="534" y2="381" stroke="#2563eb" stroke-width="1.5"/>
    <line x1="488" y1="349" x2="548" y2="349" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 3"/>
    <line x1="496" y1="366" x2="540" y2="366" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="530" y="411" text-anchor="middle" font-size="11" font-weight="600" fill="#2563eb">denoiser U-Net</text>
    <text x="530" y="438" text-anchor="middle" font-size="9" fill="#56616f">(the same denoiser used in the chain above)</text>

    <!-- classifier-free guidance note -->
    <rect x="648" y="336" width="270" height="84" rx="10" fill="#fff7ed" stroke="#b45309" stroke-width="2"/>
    <text x="783" y="362" text-anchor="middle" font-size="11" font-weight="700" fill="#b45309">Classifier-free guidance</text>
    <text x="783" y="381" text-anchor="middle" font-size="9.5" fill="#1f2733">run conditioned vs. unconditioned,</text>
    <text x="783" y="395" text-anchor="middle" font-size="9.5" fill="#1f2733">then push harder along the difference</text>
    <text x="783" y="412" text-anchor="middle" font-size="10" font-weight="600" fill="#b45309">&#8594; strengthens the steer</text>
    <line x1="648" y1="378" x2="622" y2="378" stroke="#94a3b8" stroke-width="1.8" stroke-dasharray="6 4" marker-end="url(#arwg)"/>

  </g>
</svg>
